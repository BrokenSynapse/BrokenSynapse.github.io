<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BIPAC.LMX</title><link rel="stylesheet" href="../scripts/lmi-theme.css"><script src="../scripts/lmi-module-sdk.js"></script></head><body><main class="lmi-module"><header class="module-head"><div><h1 class="module-title">BIPAC.LMX</h1><div class="module-sub">Package manager / visible desktop app control</div></div><button id="sync" class="btn secondary">Sync Desktop</button></header><section class="module-body"><div class="card"><h2>Installed Packages</h2><div id="apps" class="list"></div><div id="status" class="status"></div></div></section></main><script>
let manifest=[];function installed(){return JSON.parse(localStorage.getItem('LMI_INSTALLED_APPS')||'null')||manifest.map(a=>a.id)}function save(ids){localStorage.setItem('LMI_INSTALLED_APPS',JSON.stringify(ids));LMI.refreshApps();render()}
function render(){const ids=installed();const root=document.getElementById('apps');root.innerHTML='';manifest.forEach(a=>{const on=ids.includes(a.id);const d=document.createElement('div');d.className='list-item row';d.innerHTML=`<span class="pill">${a.icon}</span><div style="flex:1"><strong>${a.name}</strong><div class="muted">${a.description||''}<br>${a.path}</div></div><button class="btn ${on?'bad':'good'}">${on?'Uninstall':'Install'}</button>`;d.querySelector('button').onclick=()=>{let n=installed(); if(on)n=n.filter(x=>x!==a.id); else n.push(a.id); save([...new Set(n)])};root.appendChild(d)});}
LMI.ready('bipac',async()=>{try{manifest=await (await fetch('../module-manifest.json',{cache:'no-store'})).json()}catch{manifest=[]}render();});document.getElementById('sync').onclick=()=>{LMI.refreshApps();document.getElementById('status').textContent='Desktop refreshed.'};
</script></body></html>
