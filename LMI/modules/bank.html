<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Bank.LMX</title><link rel="stylesheet" href="../scripts/lmi-theme.css"><script src="../scripts/lmi-module-sdk.js"></script></head><body><main class="lmi-module"><header class="module-head"><div><h1 class="module-title">Bank.LMX</h1><div class="module-sub">Balance, ledger, and account activity</div></div><button id="refresh" class="btn secondary">Refresh</button></header><section class="module-body"><div class="grid"><div class="card col-4"><h2>Available Balance</h2><div id="bal" class="big-number">—</div><div id="owner" class="muted"></div></div><div class="card col-8"><h2>Ledger</h2><div class="table-wrap"><table><thead><tr><th>Date</th><th>Memo</th><th>Amount</th></tr></thead><tbody id="ledger"></tbody></table></div><div id="status" class="status"></div></div></div></section></main><script>
let ctx;function mock(){return {balance:777.77,currency:'DINARI',ledger:[{date:new Date().toLocaleDateString(),memo:'Local terminal initialized',amount:0},{date:'—',memo:'Relay not connected / local preview',amount:777.77}]}}
async function load(){status.textContent='Loading...';let data;try{data=await LMI.api('bank.getAccount',{});if(data.data)data=data.data}catch(e){data=mock();status.textContent=e.message}bal.textContent=(data.balance??0).toLocaleString()+' '+(data.currency||'DINARI');owner.textContent=ctx?.user?.displayName||ctx?.user?.tag||'Local';ledger.innerHTML=(data.ledger||[]).map(x=>`<tr><td>${x.date||''}</td><td>${x.memo||''}</td><td>${Number(x.amount||0).toFixed(2)}</td></tr>`).join('');}
LMI.ready('bank',c=>{ctx=c;load()});refresh.onclick=load;
</script></body></html>
