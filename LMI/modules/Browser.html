<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Browser.LMX</title><link rel="stylesheet" href="../scripts/lmi-theme.css"><script src="../scripts/lmi-module-sdk.js"></script></head><body><main class="lmi-module"><header class="module-head"><div><h1 class="module-title">Browser.LMX</h1><div class="module-sub">LDRQE relay browser. Some sites block iframe embedding.</div></div></header><section class="module-body" style="display:flex;flex-direction:column;gap:10px"><div class="row"><input id="url" style="flex:1" value="https://example.com"><button id="go" class="btn">Open</button></div><iframe id="frame" style="flex:1;min-height:450px;border:1px solid var(--line);background:#fff"></iframe></section></main><script>function openUrl(){let u=url.value.trim();if(!/^https?:\/\//i.test(u))u='https://'+u;frame.src=u}go.onclick=openUrl;LMI.ready('browser',openUrl);</script></body></html>
