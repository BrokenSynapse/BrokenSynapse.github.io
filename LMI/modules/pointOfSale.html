<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PointOfSale.LMX</title><link rel="stylesheet" href="../scripts/lmi-theme.css"><script src="../scripts/lmi-module-sdk.js"></script></head><body><main class="lmi-module"><header class="module-head"><div><h1 class="module-title">PointOfSale.LMX</h1><div class="module-sub">Catalog search, cart, and tender terminal</div></div><span id="total" class="pill">0.00 DINARI</span></header><section class="module-body"><div class="split"><div class="card"><h2>Catalog</h2><div class="row"><input id="q" placeholder="SKU, UPC, item name"><button id="search" class="btn">Search</button><button id="showAll" class="btn secondary">Show Sample</button></div><div id="results" class="list" style="margin-top:12px"></div></div><div class="card"><h2>Cart</h2><div id="cart" class="list"></div><div class="hr"></div><div class="row"><button id="clear" class="btn bad">Clear</button><button id="tender" class="btn good">Tender</button></div><div id="status" class="status"></div></div></div></section></main><script>
const sample=[{sku:'OIL-5W30',name:'Synthetic 5W-30 Oil',price:9.99},{sku:'FLT-7317',name:'Oil Filter 7317',price:7.77},{sku:'BAT-24F',name:'Battery 24F',price:149.99},{sku:'BRK-PAD',name:'Ceramic Brake Pads',price:44.95}];let items=[],cart=[];function money(n){return Number(n||0).toFixed(2)+' DINARI'}function renderResults(list){results.innerHTML=list.map((x,i)=>`<div class="list-item"><div class="row"><div style="flex:1"><strong>${x.name}</strong><div class="muted">${x.sku||x.upc||''}</div></div><span class="pill">${money(x.price)}</span><button class="btn" data-i="${i}">Add</button></div></div>`).join('');results.querySelectorAll('button').forEach(b=>b.onclick=()=>{cart.push(list[+b.dataset.i]);renderCart()})}function renderCart(){cart.innerHTML=cart.length?cart.map((x,i)=>`<div class="list-item row"><div style="flex:1"><strong>${x.name}</strong><div class="muted">${x.sku||''}</div></div><span>${money(x.price)}</span><button class="btn bad" data-i="${i}">×</button></div>`).join(''):'<div class="muted">Cart empty.</div>';cart.querySelectorAll('button').forEach(b=>b.onclick=()=>{cart.splice(+b.dataset.i,1);renderCart()});total.textContent=money(cart.reduce((s,x)=>s+Number(x.price||0),0))}async function doSearch(){status.textContent='Searching...';try{let r=await LMI.api('catalog.search',{query:q.value});items=r.items||r.results||r.data||[]; if(!Array.isArray(items))items=[]; if(!items.length)items=sample.filter(x=>x.name.toLowerCase().includes(q.value.toLowerCase())||x.sku.toLowerCase().includes(q.value.toLowerCase()));}catch(e){items=sample.filter(x=>!q.value||x.name.toLowerCase().includes(q.value.toLowerCase())||x.sku.toLowerCase().includes(q.value.toLowerCase()));status.textContent=e.message}renderResults(items)}search.onclick=doSearch;showAll.onclick=()=>renderResults(sample);clear.onclick=()=>{cart=[];renderCart()};tender.onclick=()=>{status.className='status good';status.textContent='Tender request staged. Backend action: pos.tender'};LMI.ready('pointOfSale',()=>{renderResults(sample);renderCart()});
</script></body></html>
