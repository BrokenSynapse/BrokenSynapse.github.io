<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>L.M.I. Desktop</title><link rel="stylesheet" href="scripts/lmi-theme.css"><style>
html,body{overflow:hidden}.auth-locked .desktop{display:none}.logged-in .login-screen{display:none}.login-screen{height:100vh;display:flex;align-items:center;justify-content:center;background:#000;padding:20px}.login-stack{width:min(1040px,96vw);display:flex;flex-direction:column;align-items:center;gap:20px}.login-logo{width:min(520px,74vw);filter:drop-shadow(0 0 18px rgba(164,92,255,.7))}.login-panel{width:100%;border:1px solid var(--line);border-left:7px solid var(--accent);background:rgba(3,1,7,.92);padding:26px 32px;box-shadow:0 0 40px rgba(164,92,255,.38)}.login-title{margin:0 0 18px;font-size:clamp(19px,2.05vw,30px);white-space:nowrap;letter-spacing:.12em;text-shadow:0 0 10px #fff,0 0 18px var(--accent)}.login-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.relay-row{display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:end}.login-status{min-height:22px;color:#cdbbff;margin-top:14px;font-size:13px}@media(max-width:760px){.login-grid,.relay-row{grid-template-columns:1fr}.login-title{white-space:normal}.login-panel{padding:18px}}.desktop{height:100vh;overflow:hidden;background:radial-gradient(circle at 18% 14%,rgba(164,92,255,.13),transparent 21%),linear-gradient(180deg,#07020d,#020104 68%,#000);}.topbar{height:46px;border-bottom:1px solid var(--line2);display:flex;align-items:center;justify-content:space-between;padding:0 14px;background:rgba(5,2,9,.96);box-shadow:0 0 24px rgba(164,92,255,.25);}.brand{letter-spacing:.22em;font-weight:900;text-shadow:0 0 10px #fff,0 0 18px var(--accent)}.operator{font-size:12px;color:#d8c9ff}.workspace{position:relative;height:calc(100vh - 82px);overflow:hidden}.desktop-icon{position:absolute;width:110px;min-height:118px;background:transparent;color:#fff;border:1px solid transparent;text-align:center;padding:6px}.desktop-icon:hover,.desktop-icon.selected{border-color:var(--line);background:rgba(164,92,255,.12);box-shadow:var(--shadow)}.icon-box{display:flex;align-items:center;justify-content:center;margin:0 auto 8px;width:72px;height:72px;border:1px solid var(--line);background:rgba(13,5,24,.82);font-size:27px;font-weight:900;text-shadow:0 0 12px #fff}.desktop-icon strong{display:block;font-size:13px}.desktop-icon em{display:block;color:#b7a6d8;font-size:10px;font-style:normal}.window-layer{position:absolute;inset:0;pointer-events:none}.lmi-window{position:absolute;border:1px solid var(--line);background:#090510;box-shadow:0 18px 70px rgba(0,0,0,.75),0 0 18px rgba(164,92,255,.45);display:flex;flex-direction:column;pointer-events:auto;min-width:420px;min-height:280px}.lmi-window.minimized{display:none}.win-titlebar{height:34px;background:#0b0513;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px;padding-left:10px;user-select:none}.win-title{font-weight:900;letter-spacing:.08em}.win-icon{margin-right:7px}.win-controls{display:flex;height:100%}.win-controls button{width:38px;border:0;border-left:1px solid var(--line);background:#09030f;color:#fff}.win-controls button:hover{background:#4a1a87}.win-frame{border:0;width:100%;height:100%;background:#fff;flex:1}.resize-handle{position:absolute;right:0;bottom:0;width:18px;height:18px;cursor:nwse-resize;background:linear-gradient(135deg,transparent 50%,var(--accent) 50%)}.taskbar{height:36px;border-top:1px solid var(--line2);background:#030105;display:flex;align-items:center;gap:8px;padding:4px 8px}.start-btn,.task-btn{height:28px;border:1px solid var(--line);background:#0b0513;color:#fff;padding:0 12px}.task-btn.active{background:#281044}.clock{margin-left:auto;color:#e6dbff;font-size:12px}</style></head><body class="auth-locked">
<section class="login-screen"><div class="login-stack"><img class="login-logo" src="assets/lmi-logo.png" alt="LMI"><div class="login-panel"><h1 class="login-title">PLEASE SUBMIT AN LMI EMPLOYEE TAG AND HASH</h1><div class="field"><label>LMI API Key / Relay Link</label><div class="relay-row"><input id="relayUrl" type="password" autocomplete="off" placeholder="Paste relay link / endpoint"><button id="saveRelay" class="btn secondary">Cache Locally</button><button id="forgetRelay" class="btn secondary">Forget</button></div></div><div class="login-grid"><div class="field"><label>Employee Tag</label><input id="loginUsername" placeholder="Employee tag"></div><div class="field"><label>Hash</label><input id="loginPassword" type="password" placeholder="Hash"></div></div><div class="row" style="margin-top:12px"><button id="loginButton" class="btn">Submit Tag</button></div><div id="loginStatus" class="login-status">Awaiting credentials...</div></div></div></section>
<main class="desktop"><header class="topbar"><div class="brand">L.M.I. DESKTOP</div><div id="operatorPlate" class="operator">Operator: —</div></header><section class="workspace"><div id="desktopIcons"></div><div id="windowLayer" class="window-layer"></div></section><footer class="taskbar"><button class="start-btn">LMI</button><div id="taskGroup" class="row"></div><div id="clock" class="clock"></div></footer></main>
<script src="scripts/lmi-config.js"></script><script src="scripts/lmi-api.js"></script><script src="scripts/lmi-auth.js"></script><script src="scripts/lmi-window-manager.js"></script><script src="scripts/lmi-desktop.js"></script></body></html>
