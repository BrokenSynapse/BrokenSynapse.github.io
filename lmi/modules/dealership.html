<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Dealership.LMX</title><link rel="stylesheet" href="../scripts/lmi-theme.css"><script src="../scripts/lmi-module-sdk.js"></script></head><body><main class="lmi-module"><header class="module-head"><div><h1 class="module-title">Dealership.LMX</h1><div class="module-sub">Vehicle catalog and dealership terminal</div></div><span id="count" class="pill">0 vehicles</span></header><section class="module-body"><div class="grid"><div class="card col-4"><h2>Search</h2><div class="field"><label>Query</label><input id="q" placeholder="manufacturer, model, fuel, drivetrain"></div><button id="search" class="btn">Search Vehicles</button><div id="status" class="status"></div></div><div class="card col-8"><h2>Results</h2><div id="results" class="list"></div></div></div></section></main><script>
const sample=[{id:'v_local',manufacturer:'LPEX',model:'Alex',paint:'Carbon Spec',price:14999,engine:'Alex V10',fuel:'100 Octane',drivetrain:'RWD',hp:465,description:'Local fallback vehicle entry.'}];
function money(n){return '$'+Number(n||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}
function card(v){return `<div class="list-item"><div class="row"><div style="flex:1"><strong>${v.manufacturer||''} ${v.model||''}</strong><div class="muted">${v.paint||''} / ${v.engine||''} / ${v.fuel||''} / ${v.drivetrain||''}</div></div><span class="pill">${money(v.price)}</span></div><div class="muted">${v.description||''}</div><div class="row"><span class="pill">HP ${v.hp||'—'}</span><span class="pill">TQ ${v.tq||'—'}</span><span class="pill">0-60 ${v.zeroToSixty||'—'}</span></div>${v.image?`<img src="${v.image}" style="max-width:220px;max-height:120px;object-fit:contain;margin-top:8px">`:''}</div>`}
async function load(){status.textContent='Searching vehicle catalog...';let list=[];try{const r=await LMI.api('vehicles.search',{query:q.value});list=r.vehicles||r.items||[];status.className='status good';status.textContent='Backend returned '+list.length+' vehicles.'}catch(e){list=sample;status.className='status warn';status.textContent='Local fallback: '+e.message}results.innerHTML=list.map(card).join('')||'<div class="muted">No vehicles found.</div>';count.textContent=list.length+' vehicles'}
search.onclick=load;LMI.ready('dealership',load);
</script></body></html>
