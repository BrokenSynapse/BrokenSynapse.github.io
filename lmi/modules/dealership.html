<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Dealership.LMX</title><link rel="stylesheet" href="../scripts/lmi-theme.css"><script src="../scripts/lmi-module-sdk.js"></script></head><body><main class="lmi-module"><header class="module-head"><div><h1 class="module-title">Dealership.LMX</h1><div class="module-sub">Vehicle filtering, additions, new / used purchase</div></div><button id="load" class="btn secondary">Refresh</button></header><section class="module-body"><div class="grid"><div class="card col-4"><h2>Filters / Additions</h2><div class="field"><label>Search</label><input id="q" placeholder="model, maker, engine"></div><div class="field"><label>Manufacturer</label><select id="mfg"></select></div><div class="field"><label>Drivetrain</label><select id="drive"></select></div><div class="field"><label>Fuel</label><select id="fuel"></select></div><div class="field"><label>Addition</label><select id="addition"><option value="none">No addition</option><option value="armor">Armor package (+12%)</option><option value="tow">Tow / utility package (+7%)</option><option value="lux">Luxury interior (+5%)</option><option value="methanol">Methanol tune (+9%)</option></select></div><button id="apply" class="btn">Apply Filter</button><div id="status" class="status"></div></div><div class="card col-8"><h2>Vehicles</h2><div id="vehicles" class="panel-scroll" style="max-height:calc(100vh - 165px)"></div></div></div></section></main><script>
let all=[];const fallback=[{id:'force',manufacturer:'LPEX',model:'FORCE',type:'Hot Hatch',engine:'Turbo I4',fuel:'CNG',transmission:'A10HT',drivetrain:'AWD',price:34999,hp:312,tq:340,description:'Rally-biased heavy offroad hatchback with ridiculous utility manners.'},{id:'roadkill',manufacturer:'Atlas',model:'Roadkill 4x4',type:'Heavy Utility',engine:'CNG V8',fuel:'CNG',transmission:'A10HT',drivetrain:'4x4',price:184999,hp:680,tq:1200,description:'Tractor trailer / heavy utility truck built like it hates paved roads.'}];
const addMap={none:0,armor:.12,tow:.07,lux:.05,methanol:.09};function fmtD(n){return 'D'+Number(n||0).toLocaleString(undefined,{minimumFractionDigits:3,maximumFractionDigits:3})}function val(v){return v==null?'':String(v)}
function fill(){const f=(id,arr,label)=>{document.getElementById(id).innerHTML=`<option value="">All ${label}</option>`+[...new Set(arr.filter(Boolean))].sort().map(x=>`<option>${x}</option>`).join('')};f('mfg',all.map(v=>v.manufacturer),'manufacturers');f('drive',all.map(v=>v.drivetrain),'drivetrains');f('fuel',all.map(v=>v.fuel),'fuels')}
function price(v,used=false){let base=Number(v.price||0)*(1+(addMap[addition.value]||0)); if(used)base*=0.62; return base}
function visible(){const s=q.value.toLowerCase();return all.filter(v=>(!s||JSON.stringify(v).toLowerCase().includes(s))&&(!mfg.value||v.manufacturer===mfg.value)&&(!drive.value||v.drivetrain===drive.value)&&(!fuel.value||v.fuel===fuel.value))}
function render(){const rows=visible();vehicles.innerHTML=rows.map((v,i)=>`<div class="catalog-card vehicle-card"><div><strong>${val(v.manufacturer)} ${val(v.model)}</strong><div class="muted">${val(v.type)} / ${val(v.engine)} / ${val(v.transmission)} / ${val(v.fuel)} / ${val(v.drivetrain)}</div><div class="tagrow"><span class="tag">${v.hp||'?'} hp</span><span class="tag">${v.tq||'?'} tq</span><span class="tag">${v.zeroToSixty||v.z60||'?'} 0-60</span></div>${v.image?`<img class="vehicle-img" src="${v.image}">`:''}<p>${v.description||''}</p></div><div><div class="price">New ${fmtD(price(v,false))}</div><button class="btn good" data-i="${i}" data-kind="new">Buy New</button><div class="price" style="margin-top:10px">Used ${fmtD(price(v,true))}</div><button class="btn secondary" data-i="${i}" data-kind="used">Buy Used</button></div></div>`).join('')||'<div class="muted">No vehicles found.</div>';vehicles.querySelectorAll('button[data-i]').forEach(b=>b.onclick=()=>buy(rows[+b.dataset.i],b.dataset.kind))}
async function loadVehicles(){try{let r=await LMI.api('vehicles.search',{query:'',limit:500});all=r.vehicles||r.items||[];status.className='status good';status.textContent='Loaded '+all.length+' vehicles.'}catch(e){all=fallback;status.className='status warn';status.textContent='Fallback vehicles: '+e.message}fill();render()}
async function buy(v,kind){const amount=price(v,kind==='used');try{await LMI.api('vehicles.buy',{vehicleId:v.id,kind,amount,addition:addition.value,manufacturer:v.manufacturer,model:v.model,vehicle:v});status.className='status good';status.textContent=`Purchased ${kind} ${v.manufacturer} ${v.model} for ${fmtD(amount)}.`}catch(e){status.className='status bad';status.textContent='Purchase failed: '+e.message}}
[q,mfg,drive,fuel,addition].forEach?.(()=>{});apply.onclick=render;load.onclick=loadVehicles;q.oninput=render;mfg.onchange=render;drive.onchange=render;fuel.onchange=render;addition.onchange=render;LMI.ready('dealership',loadVehicles);</script></body></html>
