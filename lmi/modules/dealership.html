<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Dealership.LMX</title><link rel="stylesheet" href="../scripts/lmi-theme.css"><script src="../scripts/lmi-module-sdk.js"></script></head><body><main class="lmi-module"><header class="module-head"><div><h1 class="module-title">Dealership.LMX</h1><div class="module-sub">Vehicle catalog, filters, additions, and purchase terminal</div></div><span id="count" class="pill">0 vehicles</span></header><section class="module-body"><div class="grid"><div class="card col-4"><h2>Filter</h2><div class="field"><label>Query</label><input id="q" placeholder="manufacturer, model, fuel, drivetrain"></div><div class="field"><label>Manufacturer</label><select id="mfg"><option value="">Any</option></select></div><div class="field"><label>Fuel</label><select id="fuel"><option value="">Any</option></select></div><div class="field"><label>Drivetrain</label><select id="drive"><option value="">Any</option></select></div><div class="field"><label>Addition / Package</label><select id="addition"><option value="none">None</option><option value="armor">Ceramic armor package (+250,000)</option><option value="luxury">Executive interior (+125,000)</option><option value="tow">Heavy utility tow package (+75,000)</option><option value="track">Track calibration (+90,000)</option></select></div><button id="search" class="btn">Search Vehicles</button><div id="status" class="status"></div></div><div class="card col-8"><h2>Results</h2><div id="results" class="list"></div></div></div></section></main><script>
let all=[];const addPrices={none:0,armor:250000,luxury:125000,tow:75000,track:90000};const sample=[{id:'v_local',manufacturer:'LPEX',model:'Alex',paint:'Carbon Spec',price:14999,engine:'Alex V10',fuel:'100 Octane',drivetrain:'RWD',hp:465,description:'Local fallback vehicle entry.'}];function money(n){return '$'+Number(n||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}function val(v){return [...new Set(all.map(x=>x[v]).filter(Boolean))].sort()}function fillFilters(){const cur=[mfg.value,fuel.value,drive.value];mfg.innerHTML='<option value="">Any</option>'+val('manufacturer').map(x=>`<option>${x}</option>`).join('');fuel.innerHTML='<option value="">Any</option>'+val('fuel').map(x=>`<option>${x}</option>`).join('');drive.innerHTML='<option value="">Any</option>'+val('drivetrain').map(x=>`<option>${x}</option>`).join('');[mfg.value,fuel.value,drive.value]=cur}function filterList(){let s=q.value.toLowerCase();return all.filter(v=>(!s||JSON.stringify(v).toLowerCase().includes(s))&&(!mfg.value||v.manufacturer===mfg.value)&&(!fuel.value||v.fuel===fuel.value)&&(!drive.value||v.drivetrain===drive.value))}function card(v){let add=addition.value,addPrice=addPrices[add]||0,base=Number(v.price||0),used=Math.round(base*.74),newTotal=base+addPrice,usedTotal=used+addPrice;return `<div class="list-item vehicle-card"><div class="row"><div style="flex:1"><strong>${v.manufacturer||''} ${v.model||''}</strong><div class="muted">${v.paint||''} / ${v.engine||''} / ${v.fuel||''} / ${v.drivetrain||''}</div></div><span class="pill">New ${money(newTotal)}</span></div><div class="muted">${v.description||''}</div><div class="row" style="margin-top:8px"><span class="pill">HP ${v.hp||'—'}</span><span class="pill">TQ ${v.tq||'—'}</span><span class="pill">0-60 ${v.zeroToSixty||'—'}</span>${add!=='none'?`<span class="pill">Package ${add} +${money(addPrice)}</span>`:''}</div>${v.image?`<img src="${v.image}" class="vehicle-img">`:''}<div class="row" style="margin-top:10px"><button class="btn good buy" data-id="${v.id}" data-kind="new" data-price="${newTotal}">Buy New</button><button class="btn secondary buy" data-id="${v.id}" data-kind="used" data-price="${usedTotal}">Buy Used ${money(usedTotal)}</button></div></div>`}function render(){const list=filterList();results.innerHTML=list.map(card).join('')||'<div class="muted">No vehicles found.</div>';count.textContent=list.length+' vehicles';results.querySelectorAll('.buy').forEach(b=>b.onclick=async()=>{const v=all.find(x=>String(x.id)===String(b.dataset.id));status.textContent='Sending purchase request...';try{await LMI.api('vehicles.buy',{vehicleId:v.id,model:v.model,manufacturer:v.manufacturer,kind:b.dataset.kind,addition:addition.value,amount:Number(b.dataset.price)});status.className='status good';status.textContent='Purchase staged and ledger updated: '+v.model}catch(e){status.className='status bad';status.textContent='Purchase failed: '+e.message}})}async function load(){status.textContent='Loading vehicle catalog...';try{const r=await LMI.api('vehicles.search',{query:''});all=r.vehicles||r.items||[];status.className='status good';status.textContent='Backend returned '+all.length+' vehicles.'}catch(e){all=sample;status.className='status warn';status.textContent='Local fallback: '+e.message}fillFilters();render()}[q,mfg,fuel,drive,addition].forEach(el=>el.oninput=render);search.onclick=render;LMI.ready('dealership',load);
</script></body></html>
