<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Dealership.LMX</title><link rel="stylesheet" href="../scripts/lmi-theme.css"><script src="../scripts/lmi-module-sdk.js"></script><style>.dealer-layout{display:grid;grid-template-columns:410px minmax(540px,1fr);gap:12px;height:100%;min-height:0}.dealer-stack,.dealer-results{overflow:auto;min-height:0}.dealer-box{border:1px solid var(--line2);background:#07030c;padding:10px;margin-bottom:9px}.dealer-box label{display:flex;justify-content:space-between;color:var(--muted);font-weight:900;font-size:11px;text-transform:uppercase}.dealer-box select,.dealer-box input{width:100%;margin-top:6px}.vehicle-card2{display:grid;grid-template-columns:150px 1fr 180px;gap:14px;align-items:start;border:1px solid var(--line2);border-left:5px solid var(--accent);padding:12px;background:#07030c;margin-bottom:10px}.vehicle-card2 img{width:150px;max-height:120px;object-fit:contain;border:1px solid var(--line2);background:#020104}.vname{font-size:19px;font-weight:900;color:var(--accent2)}.vpills{display:flex;gap:6px;flex-wrap:wrap;margin:7px 0}.vpills span{border:1px solid var(--line2);padding:2px 7px;color:var(--muted);font-size:12px}.buycol{text-align:right}.buycol .price{font-size:18px;margin:4px 0}.used{color:#8dbbff}.summaryBox{border:1px solid var(--line);padding:10px;background:#050209}@media(max-width:1050px){.dealer-layout{grid-template-columns:1fr;height:auto}.dealer-results{max-height:520px}.vehicle-card2{grid-template-columns:1fr}.buycol{text-align:left}.vehicle-card2 img{width:100%;max-height:180px}}</style></head><body><main class="lmi-module"><header class="module-head"><div><h1 class="module-title">Dealership.LMX</h1><div class="module-sub">old vehicle-sheet cascade / sheet-native extras / buy new or used</div></div><button id="load" class="btn secondary">Refresh</button></header><section class="module-body window-fill"><div class="dealer-layout"><section class="card dealer-stack"><h2>Vehicle Builder</h2><div class="dealer-box"><label>Keyword</label><input id="kw" placeholder="search all vehicle fields"></div><div id="filters"></div><div id="extraBox" class="dealer-box"></div><div class="summaryBox"><div class="muted">Current Build</div><strong id="buildSummary">No selection.</strong><div id="matchSummary" class="muted"></div></div><div class="row" style="margin-top:10px"><button id="clear" class="btn secondary">Clear</button><button id="search" class="btn">Search</button></div><div id="status" class="status"></div></section><section class="card" style="display:flex;flex-direction:column"><h2>Vehicles</h2><div id="vehicles" class="dealer-results"></div></section></div></section></main><script>
let all=[], filtersState={}, selectedExtra='';const ORDER=[['type','Vehicle Type'],['manufacturer','Manufacturer'],['model','Vehicle'],['paint','Paint Option'],['engine','Engine'],['fuel','Fuel'],['transmission','Transmission'],['drivetrain','Drivetrain']];const fallback=[{id:'force',manufacturer:'LPEX',model:'FORCE',type:'Hot Hatch',engine:'Turbo I4',fuel:'CNG',transmission:'A10HT',drivetrain:'AWD',price:34999,hp:312,tq:340,description:'Rally-biased heavy offroad hatchback with ridiculous utility manners.'},{id:'roadkill',manufacturer:'Atlas',model:'Roadkill 4x4',type:'Heavy Utility',engine:'CNG V8',fuel:'CNG',transmission:'A10HT',drivetrain:'4x4',price:184999,hp:680,tq:1200,description:'Tractor trailer / heavy utility truck built like it hates paved roads.'}];
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function fmtD(n){return LMI.money.format(n)}function norm(s){return String(s||'').trim().toLowerCase()}function val(v,k){return String(v[k]||'').trim()}function matches(v,through=ORDER.length-1){for(let i=0;i<=through;i++){let k=ORDER[i][0], want=filtersState[k]; if(want&&norm(val(v,k))!==norm(want))return false}return true}function current(){const q=norm(kw.value);return all.filter(v=>matches(v)&&(!q||JSON.stringify(v).toLowerCase().includes(q)))}function optionsFor(k){let idx=ORDER.findIndex(x=>x[0]===k);return [...new Set(all.filter(v=>matches(v,idx-1)).map(v=>val(v,k)).filter(Boolean))].sort((a,b)=>a.localeCompare(b))}
function extraOptions(){const seen=new Map(); for(const v of current()){const name=String(v.extra||v.extras||v.addition||'').trim(); if(!name)continue; const price=Number(v.extraPrice||v.extrasPrice||0); const key=name+'|||'+price; seen.set(key,{name,price,key})}return [...seen.values()].sort((a,b)=>a.name.localeCompare(b.name))}function selectedExtraObj(v){if(!selectedExtra)return null;let [name,price]=selectedExtra.split('|||'); if(norm(name)!==norm(v.extra||v.extras||v.addition||''))return null; return {name,price:Number(price)||0}}
function basePrice(v){return Number(v.price||0)}function total(v,used){let ex=selectedExtraObj(v);let p=basePrice(v)+(ex?ex.price:0); if(used)p=Math.round(p*.72); return p}
function renderFilters(){filters.innerHTML=ORDER.map(([k,label],i)=>{let opts=optionsFor(k), disabled=i>0&&!filtersState[ORDER[i-1][0]];return `<div class="dealer-box"><label>${label}<span>${opts.length} option${opts.length===1?'':'s'}</span></label><select data-k="${k}" ${disabled?'disabled':''}><option value="">Select ${label.toLowerCase()}</option>${opts.map(o=>`<option ${filtersState[k]===o?'selected':''}>${esc(o)}</option>`).join('')}</select></div>`}).join('');filters.querySelectorAll('select[data-k]').forEach(sel=>sel.onchange=()=>{const k=sel.dataset.k, idx=ORDER.findIndex(x=>x[0]===k);filtersState[k]=sel.value;for(let j=idx+1;j<ORDER.length;j++)filtersState[ORDER[j][0]]='';selectedExtra='';renderAll()})}
function renderExtras(){const ex=extraOptions();extraBox.innerHTML=`<label>Factory Extras<span>${ex.length?ex.length+' available':'none'}</span></label><select id="extraSel" ${ex.length?'':'disabled'}><option value="">No factory extra</option>${ex.map(e=>`<option value="${esc(e.key)}" ${selectedExtra===e.key?'selected':''}>${esc(e.name)}${e.price?' (+'+fmtD(e.price)+')':''}</option>`).join('')}</select>`;extraSel.onchange=()=>{selectedExtra=extraSel.value;renderAll()}}
function renderSummary(){let path=ORDER.map(([k])=>filtersState[k]).filter(Boolean);let ex=selectedExtra?selectedExtra.split('|||')[0]:'';buildSummary.textContent=(path.join(' / ')||'No selection')+(ex?' + '+ex:'');matchSummary.textContent=current().length+' matching configuration'+(current().length===1?'':'s')}
function renderVehicles(list=current()){if(!all.length){vehicles.innerHTML='<div class="muted">No dealership database synced yet.</div>';return}if(!ORDER.some(([k])=>filtersState[k])&&!kw.value){vehicles.innerHTML='<div class="muted">Select a vehicle type or search to begin.</div>';return}if(!list.length){vehicles.innerHTML='<div class="muted">No vehicles match that build.</div>';return}vehicles.innerHTML=list.slice(0,200).map((v,i)=>{let name=[v.manufacturer,v.model].filter(Boolean).join(' ')||'Unnamed Vehicle', ex=selectedExtraObj(v);return `<div class="vehicle-card2"><div>${v.image?`<img src="${esc(v.image)}" onerror="this.remove()">`:''}</div><div><div class="vname">${esc(name)}</div><div class="vpills">${ORDER.map(([k,l])=>val(v,k)?`<span>${esc(val(v,k))}</span>`:'').join('')}<span>${esc(v.hp||'?')} hp</span><span>${esc(v.tq||'?')} tq</span><span>${esc(v.zeroToSixty||v.z60||'?')} 0-60</span></div><p>${esc(v.description||'')}</p>${ex?`<div class="muted">Extra: ${esc(ex.name)} (+${fmtD(ex.price)})</div>`:''}</div><div class="buycol"><div class="price">New ${fmtD(total(v,false))}</div><button class="btn good" data-i="${i}" data-kind="new">Buy New</button><div class="price used">Used ${fmtD(total(v,true))}</div><button class="btn secondary" data-i="${i}" data-kind="used">Buy Used</button></div></div>`}).join('');vehicles.querySelectorAll('button[data-i]').forEach(b=>b.onclick=()=>buy(list[+b.dataset.i],b.dataset.kind))}
function renderAll(){renderFilters();renderExtras();renderSummary();renderVehicles()}
async function loadVehicles(){status.textContent='Loading vehicles…';try{let r=await LMI.api('vehicles.search',{query:'',limit:5000},{label:'Loading dealership vehicles…'});all=r.vehicles||r.items||[];status.className='status good';status.textContent='Loaded '+all.length+' vehicle rows.'}catch(e){all=fallback;status.className='status warn';status.textContent='Fallback vehicles: '+e.message}renderAll()}async function buy(v,kind){const amount=total(v,kind==='used');try{await LMI.api('vehicles.buy',{vehicleId:v.id,kind,amount,addition:selectedExtra,manufacturer:v.manufacturer,model:v.model,vehicle:v},{label:'Writing vehicle sale…'});status.className='status good';status.textContent=`Purchased ${kind} ${v.manufacturer} ${v.model} for ${fmtD(amount)}.`}catch(e){status.className='status bad';status.textContent='Purchase failed: '+e.message}}
kw.oninput=()=>renderVehicles();search.onclick=()=>renderVehicles();clear.onclick=()=>{filtersState={};selectedExtra='';kw.value='';renderAll()};load.onclick=loadVehicles;LMI.ready('dealership',loadVehicles);
</script></body></html>
