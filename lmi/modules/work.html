<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Work.LMX</title><link rel="stylesheet" href="../scripts/lmi-theme.css"><script src="../scripts/lmi-module-sdk.js"></script></head><body><main class="lmi-module"><header class="module-head"><div><h1 class="module-title">Work.LMX</h1><div class="module-sub">Occupation payout minigame suite</div></div><span id="scorePill" class="pill">Score 0</span></header><section class="module-body"><div class="grid"><div class="card col-4"><h2>Job</h2><div class="field"><label>Occupation</label><select id="job"><option value="counter">Counter Gremlin</option><option value="driver">Parts Runner</option><option value="exec">Executive Nothing</option></select></div><div class="field"><label>Minigame</label><select id="game"><option value="mash">Button Mash</option><option value="snake">Snake</option><option value="nothing">Executive Nothing</option></select></div><div class="row"><button id="start" class="btn">Start</button><button id="cash" class="btn good">Cash Out</button></div><div id="status" class="status"></div><div class="big-number" id="payout">0.00 DINARI</div></div><div class="card col-8"><h2 id="gameTitle">Game</h2><div id="gameArea"></div></div></div></section></main><script>
let score=0,running=false,dir='right',snake,timer,food;function setScore(n){score=n;scorePill.textContent='Score '+score;payout.textContent=(score*0.77).toFixed(2)+' DINARI'}function mash(){gameTitle.textContent='Button Mash';gameArea.innerHTML=`<div class="row"><img id="gif" src="../assets/work/Blowjob.gif" style="max-width:360px;border:1px solid var(--line)"><button id="mashBtn" class="btn" style="font-size:28px;padding:22px">MASH</button></div><p class="muted">Each hit alternates the embedded work GIF and adds score.</p>`;let flip=false;mashBtn.onclick=()=>{setScore(score+1);flip=!flip;gif.src=flip?'../assets/work/Riding.gif':'../assets/work/Blowjob.gif'}}function executive(){gameTitle.textContent='Executive Nothing';gameArea.innerHTML='<div class="card"><div class="big-number">Do absolutely nothing.</div><p class="muted">Score increases through managerial aura.</p></div>';clearInterval(timer);timer=setInterval(()=>{if(running)setScore(score+1)},1000)}function snakeGame(){gameTitle.textContent='Snake';gameArea.innerHTML='<canvas id="c" width="520" height="360" style="border:1px solid var(--line);background:#020104;max-width:100%"></canvas><p class="muted">Arrow keys / WASD.</p>';const ctx=c.getContext('2d'),cell=20;snake=[{x:5,y:5}];food={x:12,y:8};dir='right';clearInterval(timer);timer=setInterval(()=>{if(!running)return;let h={...snake[0]};if(dir==='right')h.x++;if(dir==='left')h.x--;if(dir==='up')h.y--;if(dir==='down')h.y++;if(h.x<0||h.y<0||h.x>=26||h.y>=18||snake.some(p=>p.x===h.x&&p.y===h.y)){running=false;status.textContent='Crashed. Start again.';return}snake.unshift(h);if(h.x===food.x&&h.y===food.y){setScore(score+5);food={x:Math.floor(Math.random()*26),y:Math.floor(Math.random()*18)}}else snake.pop();ctx.clearRect(0,0,c.width,c.height);ctx.fillStyle='#a45cff';snake.forEach(p=>ctx.fillRect(p.x*cell,p.y*cell,cell-2,cell-2));ctx.fillStyle='#fff';ctx.fillRect(food.x*cell,food.y*cell,cell-2,cell-2)},120)}document.addEventListener('keydown',e=>{const k=e.key.toLowerCase();if(k==='arrowup'||k==='w')dir='up';if(k==='arrowdown'||k==='s')dir='down';if(k==='arrowleft'||k==='a')dir='left';if(k==='arrowright'||k==='d')dir='right'});start.onclick=()=>{running=true;setScore(0);clearInterval(timer);if(game.value==='mash')mash();if(game.value==='snake')snakeGame();if(game.value==='nothing')executive();status.textContent='Shift active.'};cash.onclick=async()=>{running=false;const amount=score*.77;status.textContent='Cashed out '+amount.toFixed(2)+' DINARI locally.';try{await LMI.api('work.cashOut',{job:job.value,score,amount});status.textContent+=' Relay notified.'}catch{}};LMI.ready('work',()=>{mash();setScore(0)});
</script></body></html>
