<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Work.LMX</title><link rel="stylesheet" href="../scripts/lmi-theme.css"><script src="../scripts/lmi-module-sdk.js"></script><style>.exec-stage{position:relative;height:430px;border:1px solid var(--line2);background:#020104;overflow:hidden}.redbox{position:absolute;background:#b00024;color:#fff;border:2px solid #ff6b9a;box-shadow:0 0 16px #ff1b55;padding:8px;font-weight:900;min-width:74px;text-align:center}.redbox:hover{filter:brightness(1.25)}.interpNote{color:var(--muted);font-size:12px}.work-stage img{image-rendering:auto}.fpsLight{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--good);box-shadow:0 0 10px var(--good)}</style></head><body><main class="lmi-module"><header class="module-head"><div><h1 class="module-title">Work.LMX</h1><div class="module-sub">occupation payout minigame suite</div></div><span id="scorePill" class="pill">Score 0</span></header><section class="module-body"><div class="grid"><div class="card col-4"><h2>Job</h2><div class="field"><label>Occupation</label><select id="job"><option value="counter">Counter Gremlin</option><option value="driver">Parts Runner</option><option value="exec">Executive Nothing</option><option value="warehouse">Warehouse Cryptid</option></select></div><div class="field"><label>Minigame</label><select id="game"><option value="mash">Interpolated Frame-Advance Button Mash</option><option value="snake">Snake</option><option value="nothing">Executive Nothing</option></select></div><div class="row"><button id="start" class="btn">Start</button><button id="cash" class="btn good">Cash Out</button></div><div id="status" class="status"></div><div class="big-number" id="payout">Ł0.000</div></div><div class="card col-8"><h2 id="gameTitle">Game</h2><div id="gameArea"></div></div></div></section></main><script>
let score=0,running=false,dir='right',snake,timer,food,frame=0,targetFrame=0,frames=[],animTimer=null,boxTimer=null;const rate=.77;function fmtD(n){return LMI.money.format(n)}function setScore(n){score=Math.max(0,Math.floor(n));scorePill.textContent='Score '+score;payout.textContent=fmtD(score*rate)}function frameList(stem,n){return Array.from({length:n},(_,i)=>`../assets/work/frames/${stem}_${String(i).padStart(2,'0')}.webp`)}function stopTimers(){clearInterval(timer);clearInterval(animTimer);clearInterval(boxTimer)}
function mash(){gameTitle.textContent='Interpolated Frame-Advance Button Mash';frames=[...frameList('blowjob',31),...frameList('riding',15)];frame=0;targetFrame=0;gameArea.innerHTML=`<div class="work-stage"><img id="frameImg" src="${frames[0]}" alt="work frame"><button id="mashBtn" class="btn mash">MASH</button></div><p class="interpNote"><span class="fpsLight"></span> Each click queues one source GIF frame; the display catches up at ~25fps so full-speed tapping looks animated instead of teleporting.</p>`;animTimer=setInterval(()=>{if(!frames.length)return;if(frame!==targetFrame){frame=(frame+1)%frames.length;frameImg.src=frames[frame];}},40);mashBtn.onclick=()=>{if(!running)running=true;targetFrame=(targetFrame+1)%frames.length;setScore(score+1)}}
function executive(){gameTitle.textContent='Executive Nothing';gameArea.innerHTML='<div id="execStage" class="exec-stage"><div style="padding:16px" class="big-number">Do absolutely nothing.</div><p style="padding:0 16px" class="muted">Money appears through managerial aura. Red crisis boxes remove money if you click them, so do not help.</p></div>';timer=setInterval(()=>{if(running)setScore(score+1)},900);boxTimer=setInterval(()=>{if(!running)return;const b=document.createElement('button');b.className='redbox';b.textContent=['URGENT','EMAIL','MEETING','ACTION ITEM','SYNERGY'][Math.floor(Math.random()*5)];const st=execStage.getBoundingClientRect();b.style.left=Math.floor(Math.random()*Math.max(1,st.width-110))+'px';b.style.top=Math.floor(70+Math.random()*Math.max(1,st.height-120))+'px';b.onclick=()=>{setScore(score-7);b.textContent='-'+fmtD(7*rate);setTimeout(()=>b.remove(),160)};execStage.appendChild(b);setTimeout(()=>b.remove(),2200)},800)}
function snakeGame(){gameTitle.textContent='Snake';gameArea.innerHTML='<canvas id="c" width="520" height="360" style="border:1px solid var(--line);background:#020104;max-width:100%"></canvas><p class="muted">Arrow keys / WASD. Eat white pixels, avoid crashing into your own corporate growth.</p>';const ctx=c.getContext('2d'),cell=20;snake=[{x:5,y:5}];food={x:12,y:8};dir='right';timer=setInterval(()=>{if(!running)return;let h={...snake[0]};if(dir==='right')h.x++;if(dir==='left')h.x--;if(dir==='up')h.y--;if(dir==='down')h.y++;if(h.x<0||h.y<0||h.x>=26||h.y>=18||snake.some(p=>p.x===h.x&&p.y===h.y)){running=false;status.textContent='Crashed. Start again or cash out what survived.';return}snake.unshift(h);if(h.x===food.x&&h.y===food.y){setScore(score+5);food={x:Math.floor(Math.random()*26),y:Math.floor(Math.random()*18)}}else snake.pop();ctx.clearRect(0,0,c.width,c.height);ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--accent')||'#a45cff';snake.forEach(p=>ctx.fillRect(p.x*cell,p.y*cell,cell-2,cell-2));ctx.fillStyle='#fff';ctx.fillRect(food.x*cell,food.y*cell,cell-2,cell-2)},120)}document.addEventListener('keydown',e=>{const k=e.key.toLowerCase();if(k==='arrowup'||k==='w')dir='up';if(k==='arrowdown'||k==='s')dir='down';if(k==='arrowleft'||k==='a')dir='left';if(k==='arrowright'||k==='d')dir='right'});function startGame(){running=true;setScore(0);stopTimers();if(game.value==='mash')mash();if(game.value==='snake')snakeGame();if(game.value==='nothing')executive();status.className='status good';status.textContent='Shift active.'}start.onclick=startGame;cash.onclick=async()=>{running=false;stopTimers();const amount=Number((score*rate).toFixed(3));status.className='status';status.textContent='Sending payout '+fmtD(amount)+'...';try{const r=await LMI.api('work.cashOut',{job:job.value,game:game.value,score,amount},{label:'Writing work payout…'});status.className='status good';status.textContent='Paid '+fmtD((r.amount||amount))+' to ledger.';setScore(0)}catch(e){status.className='status bad';status.textContent='Cash out failed: '+e.message}};LMI.ready('work',()=>{mash();setScore(0)});
</script></body></html>
