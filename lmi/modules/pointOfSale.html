<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PointOfSale.LMX</title><link rel="stylesheet" href="../scripts/lmi-theme.css"><script src="../scripts/lmi-module-sdk.js"></script></head><body><main class="lmi-module"><header class="module-head"><div><h1 class="module-title">PointOfSale.LMX</h1><div class="module-sub">Catalog lookup, customer account, cart, tender terminal</div></div><div class="row"><span id="total" class="pill">D0.000</span><button id="loadAll" class="btn secondary">Load Catalog</button></div></header><section class="module-body"><div class="pos-layout"><div class="card pos-search"><h2>Lookup</h2><div class="toolbar"><input id="q" placeholder="SKU, UPC, item name, category"><button id="search" class="btn">Search</button></div><div class="toolbar"><select id="category"><option value="">All categories</option></select><select id="quality"><option value="">Any quality</option></select></div><div id="results" class="panel-scroll" style="max-height:calc(100vh - 270px)"></div></div><div class="card pos-customer"><h2>Customer</h2><div class="toolbar"><input id="custQ" placeholder="Name, tag, phone"><button id="custSearch" class="btn secondary">Find</button></div><div id="selectedCustomer" class="muted">No customer selected.</div><div id="customerList" class="list" style="margin-top:8px"></div></div><div class="card pos-cart"><h2>Cart</h2><div id="cartList" class="list panel-scroll" style="max-height:250px"></div><div class="summary-row"><span>Subtotal</span><strong id="subtotal">D0.000</strong></div><div class="summary-row"><span>Discount</span><strong id="discount">D0.000</strong></div><div class="summary-row total"><span>Total</span><strong id="grand">D0.000</strong></div><div class="row"><button id="clear" class="btn bad">Clear</button><button id="tender" class="btn good">Tender</button></div><div id="status" class="status"></div></div></div></section></main><script>
let catalog=[],cart=[],foundCustomers=[],customer=null;const sample=[{sku:'RBPeach8',name:'Red Bull Peach Edition 12oz',price:2.49,category:'Food / Drink / Beverages / Energy Drink',quality:'Best'},{sku:'DRT9FHN',name:"Doritos Flamin' Hot Nacho",price:5.49,category:'Food / Drink / Food / Chips',quality:'Good'},{sku:'6088',name:'50 CAL Lead Round Balls',price:19.99,category:'Ammunition / Muzzleloading / Round Ball',quality:'Better'}];
function fmtD(n){return 'D'+Number(n||0).toLocaleString(undefined,{minimumFractionDigits:3,maximumFractionDigits:3})}function itemPrice(it){return Number(it.price||it.cents/100||0)}function discountPct(){return Number(customer?.discountPct||customer?.disc||0)}function finalPrice(it){return itemPrice(it)*(1-discountPct()/100)}
function fillCats(){const cats=[...new Set(catalog.map(i=>i.category).filter(Boolean))].sort();category.innerHTML='<option value="">All categories</option>'+cats.map(c=>`<option>${c}</option>`).join('');const qs=[...new Set(catalog.map(i=>i.quality).filter(Boolean))].sort();quality.innerHTML='<option value="">Any quality</option>'+qs.map(c=>`<option>${c}</option>`).join('')}
function visible(){const text=q.value.toLowerCase(),cat=category.value,qual=quality.value;return catalog.filter(i=>(!text||JSON.stringify(i).toLowerCase().includes(text))&&(!cat||i.category===cat)&&(!qual||i.quality===qual)).slice(0,100)}
function renderResults(){const rows=visible();results.innerHTML=rows.map((i,idx)=>`<div class="catalog-card"><div><strong>${i.name||i.nm}</strong><div class="muted">${i.sku||i.upc||i.id||''} / ${i.category||''}</div><div class="tagrow"><span class="tag">${i.quality||'standard'}</span>${discountPct()?`<span class="tag">${discountPct()}% customer discount</span>`:''}</div></div><div><div class="price">${fmtD(finalPrice(i))}</div>${discountPct()?`<div class="muted"><s>${fmtD(itemPrice(i))}</s></div>`:''}<button class="btn" data-i="${idx}">Add</button></div></div>`).join('')||'<div class="muted">No catalog results.</div>';results.querySelectorAll('button[data-i]').forEach(b=>b.onclick=()=>{add(rows[+b.dataset.i])})}
function add(i){const key=i.id||i.sku||i.name;let r=cart.find(x=>x.key===key);if(r)r.qty++;else cart.push({key,item:i,qty:1});renderCart()}
function totals(){let sub=cart.reduce((s,r)=>s+itemPrice(r.item)*r.qty,0);let dis=sub*discountPct()/100;return{sub,dis,total:sub-dis}}
function renderCart(){cartList.innerHTML=cart.map((r,i)=>`<div class="list-item"><div class="row"><div style="flex:1"><strong>${r.item.name}</strong><div class="muted">${fmtD(finalPrice(r.item))} × <input class="qty" data-i="${i}" type="number" min="1" value="${r.qty}"></div></div><button class="btn bad" data-rm="${i}">×</button></div></div>`).join('')||'<div class="muted">Cart empty.</div>';cartList.querySelectorAll('.qty').forEach(inp=>inp.onchange=()=>{cart[+inp.dataset.i].qty=Math.max(1,+inp.value||1);renderCart()});cartList.querySelectorAll('[data-rm]').forEach(b=>b.onclick=()=>{cart.splice(+b.dataset.rm,1);renderCart()});const t=totals();subtotal.textContent=fmtD(t.sub);discount.textContent='-'+fmtD(t.dis);grand.textContent=fmtD(t.total);total.textContent=fmtD(t.total);renderResults()}
async function loadCatalog(){status.textContent='Polling catalog…';try{let r=await LMI.api('catalog.search',{query:'',limit:500});catalog=r.items||r.results||[];status.className='status good';status.textContent='Catalog loaded: '+catalog.length+' items.'}catch(e){catalog=sample;status.className='status warn';status.textContent='Sample fallback: '+e.message}fillCats();renderResults()}
function renderCustomers(){customerList.innerHTML=foundCustomers.map((c,i)=>`<button class="list-item customer-btn" data-i="${i}"><strong>${c.name||c.cn||c.tag}</strong><div class="muted">${c.tag||''} / POS ${c.pos||''} / ${c.discountPct||c.disc||0}%</div></button>`).join('')||'<div class="muted">No customer results.</div>';customerList.querySelectorAll('button').forEach(b=>b.onclick=()=>{customer=foundCustomers[+b.dataset.i];selectedCustomer.innerHTML=`<strong>${customer.name||customer.cn||customer.tag}</strong><br>${discountPct()}% POS discount`;renderCart()})}
async function findCustomers(){try{let r=await LMI.api('core.search',{query:custQ.value});foundCustomers=r.customers||r.results||[]}catch(e){foundCustomers=[];status.className='status warn';status.textContent='Customer lookup failed: '+e.message}renderCustomers()}
search.onclick=renderResults;loadAll.onclick=loadCatalog;category.onchange=renderResults;quality.onchange=renderResults;q.addEventListener('keydown',e=>{if(e.key==='Enter')renderResults()});custSearch.onclick=findCustomers;clear.onclick=()=>{cart=[];renderCart()};tender.onclick=async()=>{const t=totals();if(!cart.length){status.className='status warn';status.textContent='Cart empty.';return}try{await LMI.api('pos.tender',{customer,itemCount:cart.length,items:cart,total:t.total,subtotal:t.sub,discount:t.dis});status.className='status good';status.textContent='Tender complete. Ledger/transaction written.';cart=[];renderCart()}catch(e){status.className='status bad';status.textContent='Tender failed: '+e.message}};LMI.ready('pointOfSale',()=>{loadCatalog();renderCart()});</script></body></html>
