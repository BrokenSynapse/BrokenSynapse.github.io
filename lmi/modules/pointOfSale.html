<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PointOfSale.LMX</title><link rel="stylesheet" href="../scripts/lmi-theme.css"><script src="../scripts/lmi-module-sdk.js"></script></head><body><main class="lmi-module pos-apex"><header class="module-head"><div><h1 class="module-title">PointOfSale.LMX</h1><div class="module-sub">Catalog lookup, customer account, cart, tender terminal</div></div><span id="total" class="pill">D0.000</span></header><section class="module-body"><div class="pos-layout"><div class="card pos-search"><h2>Lookup</h2><div class="row"><input id="q" placeholder="SKU, UPC, item name, category" style="flex:1"><button id="search" class="btn">Search</button><button id="loadAll" class="btn secondary">Load Catalog</button></div><div class="row" style="margin-top:10px"><select id="category"><option value="">All categories</option></select><select id="quality"><option value="">Any quality</option><option>Good</option><option>Better</option><option>Best</option></select></div><div id="status" class="status"></div><div id="results" class="list results-pos"></div></div><div class="card pos-customer"><h2>Customer</h2><div class="row"><input id="custQ" placeholder="name, tag, account" style="flex:1"><button id="custSearch" class="btn secondary">Find</button></div><div id="customers" class="list"></div><div id="selectedCustomer" class="selected-customer muted">No customer selected.</div></div><div class="card pos-cart"><h2>Cart</h2><div id="cart" class="list"></div><div class="hr"></div><div class="summary-row"><span>Subtotal</span><strong id="subtotal">D0.000</strong></div><div class="summary-row"><span>Discount</span><strong id="discount">D0.000</strong></div><div class="summary-row total"><span>Total</span><strong id="grand">D0.000</strong></div><div class="row" style="margin-top:12px"><button id="clear" class="btn bad">Clear</button><button id="tender" class="btn good">Tender</button></div></div></div></section></main><script>
let catalog=[],filtered=[],cart=[],customers=[],customer=null;const sample=[{sku:'OIL-5W30',name:'Synthetic 5W-30 Oil',price:9.99,category:'Oil'},{sku:'FLT-7317',name:'Oil Filter 7317',price:7.77,category:'Filters'},{sku:'BAT-24F',name:'Battery 24F',price:149.99,category:'Electrical'},{sku:'BRK-PAD',name:'Ceramic Brake Pads',price:44.95,category:'Brakes'}];function fmtD(n){return 'D'+Number(n||0).toLocaleString(undefined,{minimumFractionDigits:3,maximumFractionDigits:3})}function itemPrice(x){return Number(x.price||x.pr||0)}function fillCats(){let cats=[...new Set(catalog.map(x=>x.category||x.c1).filter(Boolean))].sort();category.innerHTML='<option value="">All categories</option>'+cats.map(c=>`<option>${c}</option>`).join('')}function applyFilter(){let qv=q.value.toLowerCase(),cat=category.value,qual=quality.value.toLowerCase();filtered=catalog.filter(x=>(!qv||JSON.stringify(x).toLowerCase().includes(qv))&&(!cat||String(x.category||x.c1||'')===cat)&&(!qual||String(x.quality||x.q||'').toLowerCase()===qual));renderResults()}function renderResults(){results.innerHTML=filtered.map((x,i)=>`<div class="list-item pos-result"><div style="flex:1"><strong>${x.name||x.nm}</strong><div class="muted">${x.sku||x.pn||x.upc||''} ${x.category?' / '+x.category:''}</div></div><span class="pill">${fmtD(itemPrice(x))}</span><button class="btn" data-i="${i}">Add</button></div>`).join('')||'<div class="muted">No items found.</div>';results.querySelectorAll('button').forEach(b=>b.onclick=()=>{addItem(filtered[+b.dataset.i])})}function addItem(x){let found=cart.find(c=>(c.sku||c.id)===(x.sku||x.id));if(found)found.qty++;else cart.push({...x,qty:1});renderCart()}function totals(){let sub=cart.reduce((s,x)=>s+itemPrice(x)*(x.qty||1),0);let discPct=Number(customer?.discountPct||customer?.disc||0);let dis=sub*discPct/100;return {sub,dis,total:Math.max(0,sub-dis)}}function renderCart(){cart.innerHTML=cart.map((x,i)=>`<div class="list-item"><div class="row"><div style="flex:1"><strong>${x.name||x.nm}</strong><div class="muted">${x.sku||x.pn||''}</div></div><input type="number" min="1" value="${x.qty||1}" data-i="${i}" class="qty"><span>${fmtD(itemPrice(x)*(x.qty||1))}</span><button class="btn bad" data-rm="${i}">×</button></div></div>`).join('')||'<div class="muted">Cart empty.</div>';cart.querySelectorAll('.qty').forEach(inp=>inp.onchange=()=>{cart[+inp.dataset.i].qty=Math.max(1,+inp.value||1);renderCart()});cart.querySelectorAll('[data-rm]').forEach(b=>b.onclick=()=>{cart.splice(+b.dataset.rm,1);renderCart()});let t=totals();subtotal.textContent=fmtD(t.sub);discount.textContent='-'+fmtD(t.dis);grand.textContent=fmtD(t.total);total.textContent=fmtD(t.total)}function renderCustomers(){customers.innerHTML=customers.length?customers.map((c,i)=>`<button class="list-item customer-btn" data-i="${i}"><strong>${c.name||c.characterName||c.cn||c.tag}</strong><div class="muted">${c.tag||''} / POS ${c.pos||''} / ${c.discountPct||c.disc||0}%</div></button>`).join(''):'<div class="muted">No customer results.</div>';customers.querySelectorAll('button').forEach(b=>b.onclick=()=>{customer=customers[+b.dataset.i];selectedCustomer.innerHTML=`<strong>${customer.name||customer.cn||customer.tag}</strong><br>${customer.discountPct||customer.disc||0}% POS discount`;renderCart()})}async function loadCatalog(){status.textContent='Polling catalog...';try{let r=await LMI.api('catalog.search',{query:''});catalog=r.items||r.results||[];status.className='status good';status.textContent='Catalog loaded: '+catalog.length+' items.'}catch(e){catalog=sample;status.className='status warn';status.textContent='Sample fallback: '+e.message}fillCats();applyFilter()}async function findCustomers(){try{let r=await LMI.api('core.search',{query:custQ.value});customers=r.customers||r.results||[];}catch(e){customers=[];status.className='status warn';status.textContent='Customer lookup failed: '+e.message}renderCustomers()}search.onclick=applyFilter;loadAll.onclick=loadCatalog;category.onchange=applyFilter;quality.onchange=applyFilter;q.addEventListener('keydown',e=>{if(e.key==='Enter')applyFilter()});custSearch.onclick=findCustomers;clear.onclick=()=>{cart=[];renderCart()};tender.onclick=async()=>{let t=totals();if(!cart.length){status.className='status warn';status.textContent='Cart empty.';return}status.textContent='Tendering '+fmtD(t.total)+'...';try{await LMI.api('pos.tender',{customer,itemCount:cart.length,items:cart,total:t.total,subtotal:t.sub,discount:t.dis});status.className='status good';status.textContent='Tender complete. Ledger/transaction written.';cart=[];renderCart()}catch(e){status.className='status bad';status.textContent='Tender failed: '+e.message}};LMI.ready('pointOfSale',()=>{loadCatalog();renderCart()});
</script></body></html>
