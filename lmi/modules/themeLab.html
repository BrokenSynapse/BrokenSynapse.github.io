<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ThemeLab.LMX</title><link rel="stylesheet" href="../scripts/lmi-theme.css"><script src="../scripts/lmi-module-sdk.js"></script></head><body><main class="lmi-module"><header class="module-head"><div><h1 class="module-title">ThemeLab.LMX</h1><div class="module-sub">Live color changer / see what each variable does in real time</div></div><button id="reset" class="btn secondary">Reset</button></header><section class="module-body"><div class="grid"><div class="card col-5"><h2>Theme Variables</h2><div class="subgrid" id="controls"></div><div class="row" style="margin-top:12px"><button id="apply" class="btn good">Apply Live</button><button id="save" class="btn secondary">Save Local</button></div><div id="status" class="status"></div></div><div class="card col-7"><h2>Live Preview</h2><div class="desktop-preview"><div class="preview-window"><div class="preview-title">Window Title / --panel2 + --line</div><div class="preview-card"><b>Card / --panel</b><p class="muted">Muted text / --muted. Accent button below.</p><button class="btn">Accent Button</button> <button class="btn good">Good</button> <button class="btn bad">Bad</button></div></div></div><h3>Swatches</h3><div class="subgrid" id="swatches"></div></div></div></section></main><script>
const defaults={'--bg':'#020104','--panel':'#08050d','--panel2':'#12091f','--text':'#ffffff','--muted':'#b8a8d6','--line':'#8d54ff','--line2':'#5b2ea6','--accent':'#a45cff','--accent2':'#ffffff','--good':'#88ffbd','--bad':'#ff6b9a','--warn':'#ffd166'};let vars={...defaults,...JSON.parse(localStorage.getItem('LMI_THEME_VARS')||'{}')};function render(){controls.innerHTML=Object.entries(vars).map(([k,v])=>`<div class="field"><label>${k}</label><input type="color" data-k="${k}" value="${v}"><input data-t="${k}" value="${v}"></div>`).join('');controls.querySelectorAll('input[type=color]').forEach(i=>i.oninput=()=>{vars[i.dataset.k]=i.value;controls.querySelector(`[data-t="${i.dataset.k}"]`).value=i.value;doApply()});controls.querySelectorAll('input[data-t]').forEach(i=>i.onchange=()=>{vars[i.dataset.t]=i.value;doApply();render()});drawSwatches();doApply()}function drawSwatches(){swatches.innerHTML=Object.entries(vars).map(([k,v])=>`<div><div class="swatch" style="background:${v}"></div><div class="muted">${k}<br>${v}</div></div>`).join('')}function doApply(){LMI.broadcastTheme(vars);drawSwatches()}apply.onclick=doApply;save.onclick=()=>{localStorage.setItem('LMI_THEME_VARS',JSON.stringify(vars));status.className='status good';status.textContent='Saved in localStorage. Open modules pick it up automatically.'};reset.onclick=()=>{vars={...defaults};localStorage.removeItem('LMI_THEME_VARS');render()};LMI.ready('themeLab',render);</script></body></html>
