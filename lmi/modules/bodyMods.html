<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BodyMods.LMX</title><link rel="stylesheet" href="../scripts/lmi-theme.css"><script src="../scripts/lmi-module-sdk.js"></script></head><body><main class="lmi-module"><header class="module-head"><div><h1 class="module-title">BodyMods.LMX</h1><div class="module-sub">Body modification registry / status map</div></div></header><section class="module-body"><div class="grid"><div class="card col-4"><h2>Body Map</h2><div id="bodymap" style="display:grid;gap:8px"><button class="btn secondary" data-part="Cranial">Cranial</button><button class="btn secondary" data-part="Torso">Torso</button><button class="btn secondary" data-part="Left Arm">Left Arm</button><button class="btn secondary" data-part="Right Arm">Right Arm</button><button class="btn secondary" data-part="Legs">Legs</button></div></div><div class="card col-8"><h2 id="part">Registry</h2><div class="field"><label>Modification / note</label><input id="note"></div><button id="add" class="btn">Add local entry</button><div id="entries" class="list" style="margin-top:12px"></div></div></div></section></main><script>
let current='Cranial';function all(){return JSON.parse(localStorage.getItem('LMI_BODYMODS')||'{}')}function save(o){localStorage.setItem('LMI_BODYMODS',JSON.stringify(o))}function render(){part.textContent=current+' Registry';const o=all();entries.innerHTML=(o[current]||[]).map((x,i)=>`<div class="list-item row"><span style="flex:1">${x}</span><button class="btn bad" data-i="${i}">×</button></div>`).join('')||'<div class="muted">No entries.</div>';entries.querySelectorAll('button').forEach(b=>b.onclick=()=>{const o=all();o[current].splice(+b.dataset.i,1);save(o);render()})}bodymap.querySelectorAll('button').forEach(b=>b.onclick=()=>{current=b.dataset.part;render()});add.onclick=()=>{const o=all();o[current]=o[current]||[];o[current].push(note.value||'Unspecified modification');save(o);note.value='';render()};LMI.ready('bodyMods',render);
</script></body></html>
