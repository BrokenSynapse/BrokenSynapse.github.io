<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BodyMods.LMX</title><link rel="stylesheet" href="../scripts/lmi-theme.css"><script src="../scripts/lmi-module-sdk.js"></script></head><body><main class="lmi-module"><header class="module-head"><div><h1 class="module-title">BodyMods.LMX</h1><div class="module-sub">Body modification registry / install locations</div></div><button id="refresh" class="btn secondary">Refresh</button></header><section class="module-body"><div class="grid"><div class="card col-3"><h2>Body Map</h2><div id="bodymap" class="body-map"></div></div><div class="card col-5"><h2>Parts Catalog</h2><div class="row"><input id="q" placeholder="filter parts" style="flex:1"><select id="slotFilter"><option value="">All slots</option></select></div><div id="parts" class="list" style="margin-top:12px"></div></div><div class="card col-4"><h2 id="part">Selected Slot</h2><div class="field"><label>Selected Part</label><select id="modSelect"></select></div><div class="field"><label>Install note</label><input id="note" placeholder="optional install note"></div><button id="install" class="btn good">Install / Register</button><div id="status" class="status"></div><h3 style="margin-top:16px">Installed Entries</h3><div id="entries" class="list"></div></div></div></section></main><script>
let current='torso',slots=[],mods=[],installed=[];const fallbackSlots=['cranial','ocular','torso','leftArm','rightArm','spine','legs','skin','internal'];const fallbackMods=[{mid:'mod_skin',nm:'Synthetic Skin',slot:'skin',desc:'Full-body polymer synthetic skin sheath.'},{mid:'mod_eye',nm:'Low-Light Optical Pair',slot:'ocular',desc:'Night/low-light ocular implant.'},{mid:'mod_spine',nm:'Signal Spine Bus',slot:'spine',desc:'Internal data bus mounted along spine.'},{mid:'mod_arm',nm:'Servo Tendon Bundle',slot:'leftArm',desc:'Powered tendon assist bundle.'},{mid:'mod_leg',nm:'Composite Leg Reinforcement',slot:'legs',desc:'Load-bearing lower-body reinforcement.'}];function nice(s){return String(s||'').replace(/([A-Z])/g,' $1').replace(/^./,c=>c.toUpperCase())}function loadLocal(){return JSON.parse(localStorage.getItem('LMI_BODYMODS_INSTALLED')||'[]')}function saveLocal(x){localStorage.setItem('LMI_BODYMODS_INSTALLED',JSON.stringify(x))}async function load(){status.textContent='Loading body registry...';try{let s=await LMI.api('body.slots',{});slots=(s.slots||[]).map(x=>typeof x==='string'?x:(x.slot||x.k||x.id)).filter(Boolean);let m=await LMI.api('body.mods',{});mods=m.mods||[];let i=await LMI.api('body.installed',{});installed=i.installed||[]}catch(e){slots=fallbackSlots;mods=fallbackMods;installed=loadLocal();status.className='status warn';status.textContent='Local fallback: '+e.message}if(!slots.length)slots=fallbackSlots;if(!mods.length)mods=fallbackMods;renderAll()}function renderMap(){bodymap.innerHTML=slots.map(s=>`<button class="body-slot ${s===current?'active':''}" data-slot="${s}">${nice(s)}</button>`).join('');bodymap.querySelectorAll('button').forEach(b=>b.onclick=()=>{current=b.dataset.slot;renderAll()});slotFilter.innerHTML='<option value="">All slots</option>'+slots.map(s=>`<option value="${s}">${nice(s)}</option>`).join('');}function compatible(m){const sl=String(m.slot||m.slots||m.bodySlot||'').toLowerCase();return !sl||sl==='any'||sl.includes(current.toLowerCase())}function visibleMods(){const text=q.value.toLowerCase(),sf=slotFilter.value;return mods.filter(m=>(!sf||String(m.slot||'').toLowerCase().includes(sf.toLowerCase()))&&(!text||JSON.stringify(m).toLowerCase().includes(text)))}function renderParts(){const list=visibleMods();parts.innerHTML=list.map((m,i)=>`<div class="list-item"><div class="row"><div style="flex:1"><strong>${m.nm||m.name||m.mod||m.mid}</strong><div class="muted">${nice(m.slot||'any')} / ${m.desc||m.note||''}</div></div><button class="btn secondary" data-mid="${m.mid||m.id||i}">Select</button></div></div>`).join('')||'<div class="muted">No parts found.</div>';parts.querySelectorAll('button').forEach(b=>b.onclick=()=>{modSelect.value=b.dataset.mid});modSelect.innerHTML=list.map((m,i)=>`<option value="${m.mid||m.id||i}">${m.nm||m.name||m.mod||m.mid}</option>`).join('')}function renderEntries(){part.textContent=nice(current)+' Registry';const rows=installed.filter(x=>String(x.slot||'').toLowerCase()===current.toLowerCase());entries.innerHTML=rows.map(x=>`<div class="list-item"><strong>${x.name||x.modName||x.mid}</strong><div class="muted">${x.note||''}<br>${x.t||x.installedAt||''}</div></div>`).join('')||'<div class="muted">No entries for this slot.</div>'}function renderAll(){renderMap();renderParts();renderEntries()}q.oninput=renderParts;slotFilter.onchange=renderParts;install.onclick=async()=>{const m=mods.find(x=>String(x.mid||x.id)===String(modSelect.value))||mods[0];const row={mid:m?.mid||m?.id||modSelect.value,name:m?.nm||m?.name||m?.mod||modSelect.value,slot:current,note:note.value,t:new Date().toISOString()};try{await LMI.api('body.install',row);installed.unshift(row);status.className='status good';status.textContent='Installed / registered to relay.'}catch(e){installed.unshift(row);saveLocal(installed);status.className='status warn';status.textContent='Local install only: '+e.message}note.value='';renderEntries()};refresh.onclick=load;LMI.ready('bodyMods',load);
</script></body></html>
