<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BodyMods.LMX</title><link rel="stylesheet" href="../scripts/lmi-theme.css"><script src="../scripts/lmi-module-sdk.js"></script></head><body><main class="lmi-module"><header class="module-head"><div><h1 class="module-title">BodyMods.LMX</h1><div class="module-sub">Full body map / selectable install locations / registry</div></div><button id="refresh" class="btn secondary">Refresh</button></header><section class="module-body"><div class="grid"><div class="card col-3"><h2>Body Mockup</h2><div id="mock" class="mockup"></div><h3>Slots</h3><div id="bodymap" class="body-map"></div></div><div class="card col-5"><h2>Parts Catalog</h2><div class="toolbar"><input id="q" placeholder="filter parts"><select id="slotFilter"><option value="">All slots</option></select><select id="typeFilter"><option value="">All types</option></select></div><div id="parts" class="panel-scroll" style="max-height:calc(100vh - 210px)"></div></div><div class="card col-4"><h2 id="slotTitle">Registry</h2><div class="field"><label>Install location</label><select id="loc"></select></div><div class="field"><label>Selected Part</label><select id="modSelect"></select></div><div class="field"><label>Install note</label><input id="note" placeholder="optional install note"></div><button id="install" class="btn good">Install / Register</button><div id="status" class="status"></div><h3>Installed Entries</h3><div id="entries" class="list panel-scroll" style="max-height:260px"></div></div></div></section></main><script>
let current='torso',slots=[],mods=[],installed=[],selectedMid='';
const fallbackSlots=['head','eyes','ears','mouth','neck','torso','heart','lungs','spine','left_arm','right_arm','left_hand','right_hand','skin','blood','immune_system','endocrine_system','nervous_system','skeleton','musculature','metabolism','genome','pain_response','subdermal_layer','left_leg','right_leg'];
const fallbackMods=[{mid:'SZ-12',nm:'SZ-12 Subdermal',slot:'skin,subdermal_layer,torso',type:'LMEX',desc:'Construction Nanite Array'},{mid:'A-17',nm:'A-17 Genome',slot:'genome,blood',type:'Stabilized Almathi',desc:'Adaptive genome rewrite scaffold'},{mid:'NS-BUS',nm:'Signal Spine Bus',slot:'spine,nervous_system',type:'Data Bus',desc:'Spinal internal data relay'},{mid:'OCU-LUX',nm:'Low Light Optical Pair',slot:'eyes,head',type:'Optical',desc:'Low-light ocular implant pair'}];
function nice(s){return String(s||'').replace(/_/g,' ').replace(/([A-Z])/g,' $1').replace(/^./,c=>c.toUpperCase())}function slotsOf(m){return String(m.slot||m.slots||m.bodySlot||'any').split(/[;,/]+/).map(x=>x.trim()).filter(Boolean)}function loadLocal(){return JSON.parse(localStorage.getItem('LMI_BODYMODS_INSTALLED')||'[]')}function saveLocal(x){localStorage.setItem('LMI_BODYMODS_INSTALLED',JSON.stringify(x))}
async function load(){status.textContent='Loading body registry…';try{const pack=await LMI.api('body.bundle',{}, {label:'Loading body registry…'}).catch(async()=>null);if(pack){slots=pack.slots||[];mods=pack.mods||[];installed=pack.installed||[]}else{slots=(await LMI.api('body.slots',{})).slots||[];mods=(await LMI.api('body.mods',{})).mods||[];installed=(await LMI.api('body.installed',{})).installed||[]}status.className='status good';status.textContent='Registry synced.'}catch(e){slots=fallbackSlots;mods=fallbackMods;installed=loadLocal();status.className='status warn';status.textContent='Local fallback: '+e.message}if(!slots.length)slots=fallbackSlots;if(!mods.length)mods=fallbackMods;renderAll()}
function renderMock(){const zones=[['head','Head','head'],['left_arm','L Arm','armL'],['torso','Torso','torso'],['right_arm','R Arm','armR'],['left_leg','L Leg','legL'],['right_leg','R Leg','legR']];mock.innerHTML=zones.map(z=>`<button class="mockpart ${z[2]} ${current===z[0]?'active':''}" data-slot="${z[0]}">${z[1]}</button>`).join('');mock.querySelectorAll('button').forEach(b=>b.onclick=()=>{current=b.dataset.slot;renderAll()})}
function renderFilters(){bodymap.innerHTML=slots.map(s=>`<button class="body-slot ${s===current?'active':''}" data-slot="${s}">${nice(s)}</button>`).join('');bodymap.querySelectorAll('button').forEach(b=>b.onclick=()=>{current=b.dataset.slot;renderAll()});slotFilter.innerHTML='<option value="">All slots</option>'+slots.map(s=>`<option value="${s}">${nice(s)}</option>`).join('');loc.innerHTML=slots.map(s=>`<option value="${s}">${nice(s)}</option>`).join('');loc.value=current;const types=[...new Set(mods.map(m=>m.type||m.t||'').filter(Boolean))];typeFilter.innerHTML='<option value="">All types</option>'+types.map(t=>`<option>${t}</option>`).join('')}
function visibleMods(){const text=q.value.toLowerCase(),sf=slotFilter.value,tf=typeFilter.value;return mods.filter(m=>(!sf||slotsOf(m).some(s=>s.toLowerCase()===sf.toLowerCase()))&&(!tf||String(m.type||m.t)===tf)&&(!text||JSON.stringify(m).toLowerCase().includes(text)))}
function renderParts(){const list=visibleMods();parts.innerHTML=list.map((m,i)=>`<div class="catalog-card"><div><strong>${m.nm||m.name||m.mod||m.mid}</strong><div class="muted">${m.desc||m.note||''}</div><div class="tagrow">${slotsOf(m).map(s=>`<span class="tag">${nice(s)}</span>`).join('')}<span class="tag">${m.type||m.t||'mod'}</span></div></div><button class="btn secondary" data-mid="${m.mid||m.id||i}">Select</button></div>`).join('')||'<div class="muted">No parts found.</div>';parts.querySelectorAll('button').forEach(b=>b.onclick=()=>{selectedMid=b.dataset.mid;modSelect.value=selectedMid});modSelect.innerHTML=list.map((m,i)=>`<option value="${m.mid||m.id||i}">${m.nm||m.name||m.mod||m.mid}</option>`).join('');if(selectedMid&&[...modSelect.options].some(o=>o.value===selectedMid))modSelect.value=selectedMid;else selectedMid=modSelect.value}
function renderEntries(){slotTitle.textContent=nice(current)+' Registry';loc.value=current;const rows=installed.filter(x=>String(x.slot||'').toLowerCase()===current.toLowerCase());entries.innerHTML=rows.map(x=>`<div class="list-item"><strong>${x.name||x.modName||x.mid}</strong><div class="muted">${x.note||''}<br>${x.t||x.installedAt||''}</div></div>`).join('')||'<div class="muted">No entries for this location.</div>'}
function renderAll(){renderMock();renderFilters();renderParts();renderEntries()}q.oninput=renderParts;slotFilter.onchange=renderParts;typeFilter.onchange=renderParts;loc.onchange=()=>{current=loc.value;renderAll()};install.onclick=async()=>{const m=mods.find(x=>String(x.mid||x.id)===String(modSelect.value))||mods[0];const row={mid:m?.mid||m?.id||modSelect.value,name:m?.nm||m?.name||m?.mod||modSelect.value,slot:loc.value||current,note:note.value,t:new Date().toISOString()};try{await LMI.api('body.install',row);installed.unshift(row);status.className='status good';status.textContent='Installed / registered to relay.'}catch(e){installed.unshift(row);saveLocal(installed);status.className='status warn';status.textContent='Saved locally: '+e.message}current=row.slot;note.value='';renderAll()};refresh.onclick=load;LMI.ready('bodyMods',load);</script></body></html>
