<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BodyMods.LMX</title><link rel="stylesheet" href="../scripts/lmi-theme.css"><script src="../scripts/lmi-module-sdk.js"></script><style>.bm-layout{display:grid;grid-template-columns:280px minmax(380px,1fr) 340px;gap:12px;height:100%;min-height:0}.tree,.registry{overflow:auto;min-height:0}.tree details{border:1px solid var(--line2);background:#07030c;margin-bottom:7px}.tree summary{cursor:pointer;padding:9px 10px;font-weight:900;letter-spacing:.04em}.tree .type summary{padding-left:22px;color:var(--accent2)}.tree button{display:block;width:100%;text-align:left;border:0;border-top:1px solid rgba(141,84,255,.25);background:#050209;color:var(--text);padding:8px 12px 8px 34px}.tree button:hover,.tree button.active{background:color-mix(in srgb,var(--accent) 24%,var(--panel));}.slotDrop{width:100%}.installGrid{display:grid;grid-template-columns:1fr;gap:8px}.bm-layout .card{min-height:0}.partDetail{border:1px solid var(--line2);background:#050209;padding:12px;margin-bottom:10px}.slots-list{max-height:260px;overflow:auto}.mockup{margin-bottom:12px}@media(max-width:1050px){.bm-layout{grid-template-columns:1fr;height:auto}.tree,.registry{max-height:420px}}</style></head><body><main class="lmi-module"><header class="module-head"><div><h1 class="module-title">BodyMods.LMX</h1><div class="module-sub">nested body catalog / selectable install locations / registry</div></div><button id="refresh" class="btn secondary">Refresh</button></header><section class="module-body window-fill"><div class="bm-layout"><section class="card"><h2>Body Map</h2><div id="mock" class="mockup"></div><h3>Install Location</h3><select id="loc" class="slotDrop"></select><h3>All Slots</h3><div id="slotButtons" class="slots-list body-map"></div></section><section class="card" style="display:flex;flex-direction:column"><h2>Parts Catalog</h2><div class="toolbar"><input id="q" placeholder="filter parts"><select id="slotFilter"><option value="">All slots</option></select></div><div id="tree" class="tree"></div></section><section class="card" style="display:flex;flex-direction:column"><h2 id="slotTitle">Registry</h2><div class="partDetail"><h3>Selected Part</h3><select id="modSelect"></select><div id="partInfo" class="muted"></div><div class="field"><label>Install Note</label><textarea id="note" placeholder="optional install note"></textarea></div><button id="install" class="btn good">Install / Register</button></div><h3>Installed Entries</h3><div id="entries" class="registry"></div><div id="status" class="status"></div></section></div></section></main><script>
let slots=[],mods=[],installed=[],current='torso',selectedMid='';const fallbackSlots=['head','eyes','torso','left_arm','right_arm','left_leg','right_leg','skin','blood','immune_system','endocrine_system','nervous_system','skeleton','musculature','metabolism','genome','pain_response','subdermal_layer'];const fallbackMods=[{mid:'SZ-12',nm:'SZ-12 Subdermal',slot:'skin,subdermal_layer,torso',type:'Subdermal LMEX',desc:'Construction Nanite Array'},{mid:'A-17',nm:'A-17 Genome',slot:'genome,blood',type:'Stabilized Almathi',desc:'Adaptive genome rewrite scaffold'},{mid:'NS-BUS',nm:'Signal Spine Bus',slot:'spine,nervous_system',type:'Data Bus',desc:'Spinal internal data relay'},{mid:'OCU-LUX',nm:'Low Light Optical Pair',slot:'eyes,head',type:'Optical',desc:'Low-light ocular implant pair'}];
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function nice(s){return String(s||'').replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase())}function mid(m){return String(m.mid||m.id||m.modId||m.nm||m.name||'')}function mname(m){return m.nm||m.name||m.mod||m.mid||'Unnamed Mod'}function mtype(m){return m.type||m.t||m.kind||'Other'}function mdesc(m){return m.desc||m.description||m.note||''}function slotsOf(m){return String(m.slot||m.slots||m.bodySlot||m.location||'any').split(/[;,/]+/).map(x=>x.trim()).filter(Boolean)}function loadLocal(){try{return JSON.parse(localStorage.getItem('LMI_BODYMODS_INSTALLED')||'[]')}catch{return []}}function saveLocal(x){localStorage.setItem('LMI_BODYMODS_INSTALLED',JSON.stringify(x))}
async function load(){status.textContent='Loading body registry…';try{const pack=await LMI.api('body.bundle',{}, {label:'Loading body registry…'});slots=pack.slots||[];mods=pack.mods||[];installed=pack.installed||[];status.className='status good';status.textContent='Registry synced.'}catch(e){slots=fallbackSlots;mods=fallbackMods;installed=loadLocal();status.className='status warn';status.textContent='Local fallback: '+e.message}if(!slots.length)slots=fallbackSlots;if(!mods.length)mods=fallbackMods;if(!slots.includes(current))current=slots[0]||'torso';renderAll()}
function renderMock(){const zones=[['head','Head','head'],['left_arm','L Arm','armL'],['torso','Torso','torso'],['right_arm','R Arm','armR'],['left_leg','L Leg','legL'],['right_leg','R Leg','legR']];mock.innerHTML=zones.map(z=>`<button class="mockpart ${z[2]} ${current===z[0]?'active':''}" data-slot="${z[0]}">${z[1]}</button>`).join('');mock.querySelectorAll('button').forEach(b=>b.onclick=()=>{current=b.dataset.slot;loc.value=current;renderAll()})}
function renderFilters(){slotButtons.innerHTML=slots.map(s=>`<button class="body-slot ${s===current?'active':''}" data-slot="${esc(s)}">${nice(s)}</button>`).join('');slotButtons.querySelectorAll('button').forEach(b=>b.onclick=()=>{current=b.dataset.slot;loc.value=current;renderAll()});slotFilter.innerHTML='<option value="">All slots</option>'+slots.map(s=>`<option value="${esc(s)}">${nice(s)}</option>`).join('');slotFilter.value=slotFilter.value||'';loc.innerHTML=slots.map(s=>`<option value="${esc(s)}">${nice(s)}</option>`).join('');loc.value=current;}
function visibleMods(){const text=q.value.toLowerCase(),sf=slotFilter.value;return mods.filter(m=>(!sf||slotsOf(m).some(s=>s.toLowerCase()===sf.toLowerCase()))&&(!text||JSON.stringify(m).toLowerCase().includes(text)))}
function treeData(){const data={};for(const m of visibleMods()){for(const s of slotsOf(m)){const slot=s||'any', typ=mtype(m);data[slot]??={};data[slot][typ]??=[];data[slot][typ].push(m)}}return data}
function renderTree(){const data=treeData();const slotKeys=Object.keys(data).sort((a,b)=>a.localeCompare(b));tree.innerHTML=slotKeys.map(s=>`<details ${s===current?'open':''}><summary>${nice(s)} <span class="pill">${Object.values(data[s]).flat().length}</span></summary>${Object.keys(data[s]).sort().map(t=>`<details class="type" open><summary>${esc(t)} <span class="pill">${data[s][t].length}</span></summary>${data[s][t].map(m=>`<button data-mid="${esc(mid(m))}" class="${mid(m)===selectedMid?'active':''}">${esc(mname(m))}<br><span class="muted">${esc(mdesc(m))}</span></button>`).join('')}</details>`).join('')}</details>`).join('')||'<div class="muted">No matching body mods.</div>';tree.querySelectorAll('button[data-mid]').forEach(b=>b.onclick=()=>{selectedMid=b.dataset.mid;const m=mods.find(x=>mid(x)===selectedMid);const first=slotsOf(m)[0]; if(first){current=first;loc.value=first;} renderSelected(); renderTree(); renderEntries();});}
function renderSelected(){const list=visibleMods();modSelect.innerHTML=list.map(m=>`<option value="${esc(mid(m))}">${esc(mname(m))}</option>`).join('');if(selectedMid&&[...modSelect.options].some(o=>o.value===selectedMid))modSelect.value=selectedMid;else{selectedMid=modSelect.value||mid(list[0]||{})}const m=mods.find(x=>mid(x)===selectedMid)||list[0];partInfo.innerHTML=m?`${esc(mdesc(m))}<div class="tagrow">${slotsOf(m).map(s=>`<span class="tag">${nice(s)}</span>`).join('')}<span class="tag">${esc(mtype(m))}</span></div>`:'No part selected.'}
function renderEntries(){slotTitle.textContent=nice(current)+' Registry';const rows=installed.filter(x=>String(x.slot||'').toLowerCase()===current.toLowerCase());entries.innerHTML=rows.map(x=>`<div class="list-item"><strong>${esc(x.name||x.modName||x.mid)}</strong><div class="muted">${esc(x.note||'')}<br>${esc(x.t||x.installedAt||'')}</div></div>`).join('')||'<div class="muted">No entries for this location.</div>'}
function renderAll(){renderMock();renderFilters();renderTree();renderSelected();renderEntries()}q.oninput=()=>{renderTree();renderSelected()};slotFilter.onchange=()=>{renderTree();renderSelected()};loc.onchange=()=>{current=loc.value;renderAll()};modSelect.onchange=()=>{selectedMid=modSelect.value;renderSelected();renderTree()};install.onclick=async()=>{const m=mods.find(x=>mid(x)===selectedMid);const row={mid:mid(m)||selectedMid,name:mname(m),slot:loc.value||current,note:note.value,t:new Date().toISOString()};try{await LMI.api('body.install',row,{label:'Registering body mod…'});installed.unshift(row);status.className='status good';status.textContent='Installed / registered to relay.'}catch(e){installed.unshift(row);saveLocal(installed);status.className='status warn';status.textContent='Saved locally: '+e.message}current=row.slot;note.value='';renderAll()};refresh.onclick=load;LMI.ready('bodyMods',load);
</script></body></html>
