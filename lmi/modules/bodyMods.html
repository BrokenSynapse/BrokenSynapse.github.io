<body><main class="lmi-module"><header class="module-head"><div><h1 class="module-title">BodyMods.LMX</h1><div class="module-sub">GitHub Pages 3D mannequin loader / profile-mesh database hook / install registry</div></div><button id="refresh" class="btn secondary">Refresh</button></header><section class="module-body window-fill"><div class="bm-layout">
<section class="card" style="display:flex;flex-direction:column"><h2>Body Registry</h2><div class="tabs"><button id="tabSlots" class="active">Slots</button><button id="tabProfile">Profile</button></div><div id="slotPane"><div class="toolbar tight"><input id="slotSearch" placeholder="filter body classes"><select id="regionFilter"><option value="">All regions</option></select></div><div id="regionButtons" class="regionGrid"></div><div id="slotTree" class="slotTree"></div></div><div id="profilePane" class="panel-scroll" style="display:none"><div class="profileBox"><h3>Profile.LMX</h3><div class="field"><label>Profile ID</label><input id="profileId" placeholder="default"></div><div class="field-row"><div class="field"><label>Display Name</label><input id="displayName"></div><div class="field"><label>Employee Tag</label><input id="employeeTag"></div></div><div class="field"><label>Login Hash <span class="mini">optional update</span></label><input id="loginHash" type="password" placeholder="leave blank to keep current"></div><div class="field"><label>Base Mesh</label><select id="profileMesh"></select></div><div class="field"><label>Skin Tint</label><input id="skinTint" type="color" value="#d8b18f"></div><div id="sliders"></div><button id="saveProfile" class="btn good">Save Profile / Mesh Hook</button><button id="resetProfile" class="btn secondary">Reset Local Sliders</button><div id="profileStatus" class="status"></div></div></div></section>
<section class="card" style="display:flex;flex-direction:column"><h2>Live 3D Body Composite</h2><div id="body3d" class="body3d-wrap"><div class="body3d-overlay"><div class="hud"><strong id="hudRegion">Full Body</strong><br><span id="hudStats">0 installed / 0 classes</span></div><div class="hud">Mesh: <strong id="modelLabel">none</strong><br>DB: <strong id="dbLabel">local</strong></div></div><div class="viewControls"><select id="modelVariant"></select><button id="saveMeshHook" class="btn good">Save Mesh Hook</button><button id="resetCam" class="btn secondary">Reset Camera</button><button id="focusSel" class="btn secondary">Focus Selected</button></div></div></section>
<section class="card" style="display:flex;flex-direction:column"><h2 id="slotTitle">Full Body</h2><div class="partDetail"><h3>Selected Slot</h3><div id="slotInfo" class="muted">Select a slot or click the model.</div><div id="microSlots" class="microList"></div></div><div class="partDetail"><h3>Selected Part</h3><select id="modSelect"></select><div id="partInfo" class="muted"></div><div class="field"><label>Install Location</label><select id="loc"></select></div><div class="field"><label>Install Note</label><textarea id="note" placeholder="optional install note"></textarea></div><button id="install" class="btn good">Install / Register</button></div><h3>Installed Entries</h3><div id="entries" class="registry panel-scroll"></div><div id="status" class="status"></div></section>
</div></section></main>
<script type="module">
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';
const $=id=>document.getElementById(id); const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m])); const nice=s=>String(s||'').replace(/[_.-]+/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
let slots=[],mods=[],installed=[],slotRows=[],current='body',selectedMid='',ctx=null,scene,camera,renderer,controls,loader,avatarRoot=null,activeModel=null,raycaster,mouse,modelIndex=[],profile={};
const regions=['full_body','head','face','torso','abdomen','pelvis','left_arm','right_arm','left_hand','right_hand','left_leg','right_leg','left_foot','right_foot','spine','systemic'];
const slotSeed=[['body','','Full Body','full_body','Systemic'],['head','body','Head','head','Structural'],['head.face','head','Face','face','External'],['head.left_eye','head.face','Left Eye','face','Ocular'],['head.right_eye','head.face','Right Eye','face','Ocular'],['head.brain','head','Brain','head','Nervous'],['torso','body','Torso','torso','Structural'],['torso.chest','torso','Chest','torso','External'],['torso.heart','torso','Heart','torso','Cardiovascular'],['torso.lungs','torso','Lungs','torso','Respiratory'],['torso.spine','torso','Spine','spine','Nervous'],['pelvis','body','Pelvis','pelvis','Structural'],['left_arm','body','Left Arm','left_arm','Limb'],['left_arm.upper','left_arm','Left Upper Arm','left_arm','Muscle'],['left_arm.forearm','left_arm','Left Forearm','left_arm','Muscle'],['left_hand','left_arm','Left Hand','left_hand','Hand'],['right_arm','body','Right Arm','right_arm','Limb'],['right_arm.upper','right_arm','Right Upper Arm','right_arm','Muscle'],['right_arm.forearm','right_arm','Right Forearm','right_arm','Muscle'],['right_hand','right_arm','Right Hand','right_hand','Hand'],['left_leg','body','Left Leg','left_leg','Limb'],['left_leg.thigh','left_leg','Left Thigh','left_leg','Muscle'],['left_leg.calf','left_leg','Left Calf','left_leg','Muscle'],['left_foot','left_leg','Left Foot','left_foot','Foot'],['right_leg','body','Right Leg','right_leg','Limb'],['right_leg.thigh','right_leg','Right Thigh','right_leg','Muscle'],['right_leg.calf','right_leg','Right Calf','right_leg','Muscle'],['right_foot','right_leg','Right Foot','right_foot','Foot'],['skin','body','Skin','systemic','Dermal'],['skin.subdermal','skin','Subdermal Layer','systemic','Subdermal'],['blood','body','Blood','systemic','Cardiovascular'],['nervous_system','body','Nervous System','systemic','Nervous'],['skeleton','body','Skeleton','systemic','Skeletal'],['musculature','body','Musculature','systemic','Muscle'],['genome','body','Genome','systemic','Genetic']];
const defaults={profileId:'default',displayName:'',employeeTag:'',baseMesh:'human_base_3k',meshPath:'assets/body/models/HumanBodyBaseMesh3k.glb',skinTint:'#d8b18f',body:{height:1,shoulders:1,chest:1,waist:1,hips:1,arms:1,legs:1,muscle:1,bodyFat:1,head:1,hands:1,feet:1}};
const sliderDefs=[['height','Height',0.75,1.35],['shoulders','Shoulders',0.7,1.4],['chest','Chest',0.7,1.4],['waist','Waist',0.65,1.45],['hips','Hips',0.65,1.45],['arms','Arms',0.8,1.25],['legs','Legs',0.8,1.3],['muscle','Muscle',0.65,1.5],['bodyFat','Body Fat',0.65,1.55],['head','Head',0.8,1.2],['hands','Hands',0.75,1.25],['feet','Feet',0.75,1.25]];
function fallbackModels(){return [{id:'human_base_3k',label:'Human Body Base Mesh 3k',sex:'male',path:'assets/body/models/HumanBodyBaseMesh3k.glb'},{id:'female_base_3k',label:'Female Body Base Mesh 3k',sex:'female',path:'assets/body/models/FemaleBodyBaseMesh3k.glb'}]}
function normalizeProfile(p){p=Object.assign({},defaults,p||{}); p.body=Object.assign({},defaults.body,p.body||{}); const m=modelIndex.find(x=>x.id===p.baseMesh)||modelIndex.find(x=>x.path===p.meshPath)||modelIndex[0]; if(m){p.baseMesh=m.id;p.meshPath=m.path} return p}
function localProfileKey(){return 'LMI_BODY_PROFILE_'+((ctx&&ctx.user&&ctx.user.cid)||'local')}
function saveLocalProfile(){localStorage.setItem(localProfileKey(),JSON.stringify(profile))} function readLocalProfile(){try{return JSON.parse(localStorage.getItem(localProfileKey())||'{}')}catch{return {}}}
function regionOf(slot){slot=String(slot||'body').toLowerCase(); if(slot==='body')return 'full_body'; if(slot.includes('face')||slot.includes('eye')||slot.includes('mouth')||slot.includes('ear'))return 'face'; if(slot.includes('left_hand'))return 'left_hand'; if(slot.includes('right_hand'))return 'right_hand'; if(slot.includes('left_foot'))return 'left_foot'; if(slot.includes('right_foot'))return 'right_foot'; if(slot.includes('left_arm'))return 'left_arm'; if(slot.includes('right_arm'))return 'right_arm'; if(slot.includes('left_leg'))return 'left_leg'; if(slot.includes('right_leg'))return 'right_leg'; if(slot.includes('spine'))return 'spine'; if(slot.includes('torso')||slot.includes('heart')||slot.includes('lung')||slot.includes('chest'))return 'torso'; if(slot.includes('abdomen')||slot.includes('liver')||slot.includes('kidney')||slot.includes('stomach'))return 'abdomen'; if(slot.includes('pelvis'))return 'pelvis'; if(slot.includes('head')||slot.includes('brain'))return 'head'; return 'systemic'}
function normalizeSlots(raw){let rows=[]; if(Array.isArray(raw)&&raw.length&&typeof raw[0]==='object'){rows=raw.map(r=>({slotId:String(r.slot||r.id||r.label||'').trim(),parentSlot:String(r.parent||r.parentSlot||'').trim(),displayName:String(r.label||r.name||r.slot||'').trim(),region:String(r.region||'').trim(),system:String(r.system||r.note||'').trim()}))} else {rows=(raw&&raw.length?raw:slotSeed.map(r=>r[0])).map(s=>({slotId:String(s),parentSlot:'',displayName:nice(s),region:regionOf(s),system:'Body'}))} slotSeed.forEach(a=>{if(!rows.some(r=>r.slotId===a[0]))rows.push({slotId:a[0],parentSlot:a[1],displayName:a[2],region:a[3],system:a[4]})}); const ids=new Set(rows.map(r=>r.slotId)); rows.forEach(r=>{ if(!r.parentSlot && r.slotId!=='body'){ const i=r.slotId.lastIndexOf('.'); r.parentSlot=i>0?r.slotId.slice(0,i):'body'; } if(!ids.has(r.parentSlot)&&r.slotId!=='body')r.parentSlot='body'; if(!r.region)r.region=regionOf(r.slotId); if(!r.displayName)r.displayName=nice(r.slotId); }); return rows.sort((a,b)=>a.slotId.localeCompare(b.slotId));}
function mid(m){return String(m?.mid||m?.id||m?.sku||m?.nm||'')} function mname(m){return String(m?.nm||m?.name||m?.mid||'Unnamed')} function mdesc(m){return String(m?.desc||m?.description||m?.fx||'')} function mtype(m){return String(m?.type||m?.cat||m?.st||'BodyMod')} function slotsOf(m){return String(m?.slot||m?.validSlots||'body').split(/[;,]/).map(x=>x.trim()).filter(Boolean)}
async function loadModels(){try{const r=await fetch('../assets/body/models/manifest.json',{cache:'no-store'}); const j=await r.json(); modelIndex=(j.models||fallbackModels()).map(m=>Object.assign({},m,{path:m.path.replace(/^\.\.\//,'')}));}catch{modelIndex=fallbackModels()} modelVariant.innerHTML=profileMesh.innerHTML=modelIndex.map(m=>`<option value="${esc(m.id)}">${esc(m.label||m.id)} · ${esc(m.sex||'base')}</option>`).join('')}
function renderSliders(){sliders.innerHTML=sliderDefs.map(([k,l,min,max])=>`<div class="slider-grid"><label>${l}</label><input data-k="${k}" type="range" min="${min}" max="${max}" step="0.01" value="${Number(profile.body?.[k]||1)}"><b id="sv_${k}">${Number(profile.body?.[k]||1).toFixed(2)}</b></div>`).join(''); sliders.querySelectorAll('input').forEach(inp=>inp.oninput=()=>{profile.body[inp.dataset.k]=Number(inp.value); $('sv_'+inp.dataset.k).textContent=Number(inp.value).toFixed(2); applyBodyScale(); saveLocalProfile();});}
function fillProfileForm(){profileId.value=profile.profileId||'default'; displayName.value=profile.displayName||ctx?.user?.displayName||''; employeeTag.value=profile.employeeTag||ctx?.user?.tag||''; loginHash.value=''; skinTint.value=profile.skinTint||'#d8b18f'; profileMesh.value=modelVariant.value=profile.baseMesh||modelIndex[0]?.id||''; modelLabel.textContent=modelIndex.find(m=>m.id===profile.baseMesh)?.label||profile.baseMesh||'none'; renderSliders();}
function readProfileForm(){const m=modelIndex.find(x=>x.id===profileMesh.value)||modelIndex[0]; profile.profileId=profileId.value.trim()||'default'; profile.displayName=displayName.value.trim(); profile.employeeTag=employeeTag.value.trim(); profile.skinTint=skinTint.value||'#d8b18f'; if(m){profile.baseMesh=m.id;profile.meshPath=m.path;} return profile}
async function loadProfile(){try{const p=await LMI.api('body.profile.get',{profileId:'default'},{silent:true,timeout:12000}); profile=normalizeProfile(Object.assign({},readLocalProfile(),p.profile||{})); dbLabel.textContent=p.source||'relay';}catch(e){profile=normalizeProfile(readLocalProfile()); dbLabel.textContent='local'; profileStatus.className='status warn'; profileStatus.textContent='Profile using local fallback: '+e.message} fillProfileForm(); await loadAvatar(profile.baseMesh);}
async function saveProfileRelay(meshOnly=false){readProfileForm(); saveLocalProfile(); const payload={profileId:profile.profileId,profile,credentials:{tag:employeeTag.value.trim(),hash:loginHash.value.trim()}}; try{const action=meshOnly?'body.profile.meshSet':'body.profile.save'; await LMI.api(action,payload,{label:meshOnly?'Saving mesh hook…':'Saving Profile.LMX…'}); profileStatus.className='status good'; profileStatus.textContent=meshOnly?'Mesh hook saved to database.':'Profile.LMX saved to database.'; dbLabel.textContent='relay';}catch(e){profileStatus.className='status warn'; profileStatus.textContent='Saved locally only: '+e.message; dbLabel.textContent='local'} await loadAvatar(profile.baseMesh);}
async function loadRegistry(){status.textContent='Loading body registry…';try{const pack=await LMI.api('body.bundle',{}, {label:'Loading body registry…'});slots=pack.slots||[];mods=pack.mods||[];installed=pack.installed||[];status.className='status good';status.textContent='Registry synced.'}catch(e){slots=slotSeed.map(r=>r[0]);mods=[{mid:'SZ-12',nm:'SZ-12 Subdermal',slot:'skin.subdermal,torso',type:'Subdermal LMEX',desc:'Construction Nanite Array',thermalLoad:1,neuralBuffer:1},{mid:'A-17',nm:'A-17 Genome',slot:'genome,blood',type:'Stabilized Almathi',desc:'Adaptive genome rewrite scaffold',hepaticProcessing:2,renalClearance:1},{mid:'NS-BUS',nm:'Signal Spine Bus',slot:'torso.spine,nervous_system',type:'Data Bus',desc:'Spinal internal data relay',neuralBuffer:3},{mid:'OCU-LUX',nm:'Low Light Optical Pair',slot:'head.left_eye,head.right_eye',type:'Optical',desc:'Low-light ocular implant pair'}];try{installed=JSON.parse(localStorage.getItem('LMI_BODYMOD_LOCAL')||'[]')}catch{installed=[]}status.className='status warn';status.textContent='Local fallback: '+e.message} slotRows=normalizeSlots(slots); slots=slotRows.map(r=>r.slotId); if(!slots.includes(current))current='body'; renderAll();}
function renderRegions(){regionFilter.innerHTML='<option value="">All regions</option>'+regions.map(r=>`<option value="${r}">${nice(r)}</option>`).join('');regionButtons.innerHTML=regions.filter(r=>r!=='full_body').slice(0,14).map(r=>`<button data-region="${r}" class="${regionOf(current)===r?'active':''}">${nice(r)}</button>`).join('');regionButtons.querySelectorAll('button').forEach(b=>b.onclick=()=>{regionFilter.value=b.dataset.region;const first=slotRows.find(r=>r.region===b.dataset.region);if(first)current=first.slotId;renderAll();focusRegion(b.dataset.region);});}
function childrenOf(id){return slotRows.filter(r=>r.parentSlot===id)} function slotHasInstalled(id){return installed.some(x=>String(x.slot||'').toLowerCase()===id.toLowerCase())} function slotHasCatalog(id){return mods.some(m=>slotsOf(m).some(s=>s.toLowerCase()===id.toLowerCase()))}
function passSlotFilter(r){const text=slotSearch.value.toLowerCase();const rf=regionFilter.value; if(rf&&r.region!==rf)return false; if(text&&!(`${r.slotId} ${r.displayName} ${r.system} ${r.region}`.toLowerCase().includes(text))) return childrenOf(r.slotId).some(passSlotFilter); return true}
function renderSlotNode(id,depth=0){const row=slotRows.find(r=>r.slotId===id); if(!row)return''; const children=childrenOf(id).filter(passSlotFilter); const badges=`${slotHasInstalled(id)?'<span class="tag">installed</span>':''}${slotHasCatalog(id)?'<span class="tag">catalog</span>':''}`; if(children.length)return `<details ${id==='body'||id===current||current.startsWith(id+'.')?'open':''} class="${depth?'child':''}"><summary>${esc(row.displayName)} ${badges}</summary><button data-slot="${esc(id)}" class="${current===id?'active':''}">Select ${esc(row.displayName)}<br><span class="muted">${esc(row.system)} / ${esc(row.region)}</span></button>${children.map(c=>renderSlotNode(c.slotId,depth+1)).join('')}</details>`; return `<button data-slot="${esc(id)}" class="${current===id?'active':''}">${esc(row.displayName)} ${badges}<br><span class="muted">${esc(row.system)} / ${esc(row.region)}</span></button>`}
function renderSlotTree(){slotTree.innerHTML=renderSlotNode('body')||'<div class="muted">No body slots match.</div>';slotTree.querySelectorAll('button[data-slot]').forEach(b=>b.onclick=()=>{current=b.dataset.slot;renderAll();highlightRegion(regionOf(current));});}
function visibleMods(){return mods.filter(m=>slotsOf(m).some(s=>s.toLowerCase()===current.toLowerCase()||current==='body'||s.toLowerCase().startsWith(current.toLowerCase()+'.')||current.toLowerCase().startsWith(s.toLowerCase()+'.')))}
function renderSelectedSlot(){const row=slotRows.find(r=>r.slotId===current)||{displayName:nice(current),slotId:current,region:regionOf(current),system:'Custom'};slotTitle.textContent=row.displayName;hudRegion.textContent=row.displayName;const count=installed.filter(x=>String(x.slot||'').toLowerCase()===current.toLowerCase()||String(x.slot||'').startsWith(current+'.')).length;slotInfo.innerHTML=`<strong>${esc(row.slotId)}</strong><br>Region: ${esc(row.region)}<br>System: ${esc(row.system)}<br>${count} installed entries in this branch.`;const kids=childrenOf(current);microSlots.innerHTML=kids.slice(0,24).map(k=>`<button data-slot="${esc(k.slotId)}">${esc(k.displayName)}<br><span class="muted">${esc(k.system)}</span></button>`).join('');microSlots.querySelectorAll('button').forEach(b=>b.onclick=()=>{current=b.dataset.slot;renderAll();highlightRegion(regionOf(current));});}
function ratingsOf(m){const keys=['cardiovascularOutput','pressureTolerance','renalClearance','hepaticProcessing','thermalLoad','neuralBuffer','sleepState','glucoseElectrolyte'];return keys.map(k=>[k,Number(m?.[k]||0)]).filter(x=>x[1]>0)} function labelRating(k){return ({cardiovascularOutput:'Cardio Output',pressureTolerance:'Pressure Tol.',renalClearance:'Renal Clear.',hepaticProcessing:'Hepatic Proc.',thermalLoad:'Thermal Shed',neuralBuffer:'Neural Buffer',sleepState:'Sleep Stable',glucoseElectrolyte:'Glucose/Electro.'})[k]||k} function ratingBlock(m){const rs=ratingsOf(m);if(!rs.length)return '<div class="muted">No support ratings listed. Pharma compatibility contribution: 0.</div>';return '<div class="rating-grid">'+rs.map(([k,v])=>`<div class="rating-row"><span>${labelRating(k)}</span><div class="rating-track"><div class="rating-fill" style="width:${Math.max(0,Math.min(5,v))*20}%"></div></div><b>${v}/5</b></div>`).join('')+'</div><div class="support-note">Support Type: '+esc(m.supportType||'unspecified')+' / LMEX Certified: '+esc(m.lmexCertified||'')+'<br>'+esc(m.supportNotes||'')+'</div>'}
function renderModPane(){loc.innerHTML=slots.map(s=>`<option value="${esc(s)}">${nice(s)}</option>`).join('');loc.value=current;const list=visibleMods();modSelect.innerHTML=list.map(m=>`<option value="${esc(mid(m))}">${esc(mname(m))}</option>`).join('');if(selectedMid&&[...modSelect.options].some(o=>o.value===selectedMid))modSelect.value=selectedMid;else selectedMid=modSelect.value||mid(list[0]||{});const m=mods.find(x=>mid(x)===selectedMid)||list[0];partInfo.innerHTML=m?`${esc(mdesc(m))}<div class="tagrow">${slotsOf(m).map(s=>`<span class="tag">${nice(s)}</span>`).join('')}<span class="tag">${esc(mtype(m))}</span></div><h3 style="margin-top:10px">Pharma Support Ratings</h3>${ratingBlock(m)}`:'No catalog item for this body class yet.'}
function renderEntries(){const rows=installed.filter(x=>{const s=String(x.slot||'');return s.toLowerCase()===current.toLowerCase()||s.startsWith(current+'.')||current==='body'});entries.innerHTML=rows.map(x=>`<div class="entry"><b>${esc(x.name||x.mid)}</b><br><span class="mini">${esc(x.slot)} · ${esc(x.t||'')}</span><br>${esc(x.note||'')}</div>`).join('')||'<div class="muted">No installed entries in this branch.</div>'}
function renderAll(){renderRegions();renderSlotTree();renderSelectedSlot();renderModPane();renderEntries();hudStats.textContent=`${installed.length} installed / ${slotRows.length} classes`;}
function init3D(){const wrap=$('body3d');scene=new THREE.Scene();camera=new THREE.PerspectiveCamera(38,wrap.clientWidth/wrap.clientHeight,0.1,100);camera.position.set(0,1.25,6.2);renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.setSize(wrap.clientWidth,wrap.clientHeight);wrap.prepend(renderer.domElement);controls=new OrbitControls(camera,renderer.domElement);controls.target.set(0,1,0);controls.enableDamping=true;controls.update();loader=new GLTFLoader();raycaster=new THREE.Raycaster();mouse=new THREE.Vector2();scene.add(new THREE.AmbientLight(0xbba6ff,1.15));const key=new THREE.DirectionalLight(0xffffff,2.0);key.position.set(2,5,4);scene.add(key);const rim=new THREE.DirectionalLight(0x8d54ff,1.1);rim.position.set(-4,2,-3);scene.add(rim);wrap.addEventListener('pointerdown',onPick);window.addEventListener('resize',()=>{const w=wrap.clientWidth,h=wrap.clientHeight;camera.aspect=w/h;camera.updateProjectionMatrix();renderer.setSize(w,h)});animate()}
async function loadAvatar(modelId){if(!loader||!modelIndex.length)return; const m=modelIndex.find(x=>x.id===modelId)||modelIndex[0]; if(!m)return; profile.baseMesh=m.id; profile.meshPath=m.path; modelVariant.value=profileMesh.value=m.id; modelLabel.textContent=m.label||m.id; if(avatarRoot){scene.remove(avatarRoot); avatarRoot.traverse(o=>{if(o.geometry)o.geometry.dispose?.();}); avatarRoot=null;} status.textContent='Loading mesh '+(m.label||m.id)+'…'; try{const gltf=await loader.loadAsync('../'+m.path); avatarRoot=gltf.scene; avatarRoot.name='LMI_PROFILE_AVATAR'; normalizeAvatar(avatarRoot); scene.add(avatarRoot); applySkin(); applyBodyScale(); status.className='status good'; status.textContent='Mesh loaded from GitHub Pages asset path.';}catch(e){status.className='status bad';status.textContent='Mesh load failed: '+e.message}}
function normalizeAvatar(root){const box=new THREE.Box3().setFromObject(root);const size=box.getSize(new THREE.Vector3());const center=box.getCenter(new THREE.Vector3());root.position.sub(center);const scale=3.25/Math.max(size.y||1,0.001);root.scale.setScalar(scale);root.position.y=0; root.traverse(o=>{if(o.isMesh||o.isSkinnedMesh){o.userData.slot='body'; o.castShadow=false; o.frustumCulled=false; if(o.material){o.material=o.material.clone(); o.material.roughness=.75; o.material.metalness=.02;}}});}
function applySkin(){if(!avatarRoot)return; const c=new THREE.Color(profile.skinTint||'#d8b18f'); avatarRoot.traverse(o=>{if((o.isMesh||o.isSkinnedMesh)&&o.material){ if(Array.isArray(o.material))o.material.forEach(m=>m.color?.copy(c)); else o.material.color?.copy(c); }});}
function applyBodyScale(){if(!avatarRoot)return; const b=profile.body||defaults.body; avatarRoot.scale.setScalar(Number(b.height||1)); const bones={}; avatarRoot.traverse(o=>{if(o.isBone)bones[o.name.toLowerCase()]=o}); const set=(names,s)=>names.forEach(n=>{const bone=Object.entries(bones).find(([k])=>k.includes(n)); if(bone)bone[1].scale.setScalar(s)}); set(['head'],Number(b.head||1)); set(['leftarm','rightarm','leftforearm','rightforearm'],Number(b.arms||1)); set(['lefthand','righthand'],Number(b.hands||1)); set(['leftupleg','rightupleg','leftleg','rightleg'],Number(b.legs||1)); set(['leftfoot','rightfoot'],Number(b.feet||1)); avatarRoot.updateMatrixWorld(true);}
function onPick(e){if(!avatarRoot)return;const r=renderer.domElement.getBoundingClientRect();mouse.x=((e.clientX-r.left)/r.width)*2-1;mouse.y=-((e.clientY-r.top)/r.height)*2+1;raycaster.setFromCamera(mouse,camera);const hit=raycaster.intersectObject(avatarRoot,true)[0]; if(hit){current='body'; renderAll(); highlightRegion('full_body')}}
function highlightRegion(region){if(!avatarRoot)return; applySkin(); if(region==='full_body')return; const tint=new THREE.Color(0x8d54ff); avatarRoot.traverse(o=>{if((o.isMesh||o.isSkinnedMesh)&&o.material){const n=(o.name||'').toLowerCase(); if(n.includes(region.replace('_',''))||n.includes(region.split('_').pop())){ if(Array.isArray(o.material))o.material.forEach(m=>m.color?.copy(tint)); else o.material.color?.copy(tint); }}})}
function focusRegion(region){const map={head:[0,2.45,3.0],face:[0,2.55,2.45],torso:[0,1.35,3.5],left_arm:[-.85,1.25,3.3],right_arm:[.85,1.25,3.3],left_leg:[-.3,.15,3.5],right_leg:[.3,.15,3.5],left_foot:[-.3,-.95,2.7],right_foot:[.3,-.95,2.7]}; const p=map[region]||[0,1.1,5.2]; camera.position.set(...p); controls.target.set(0,region==='head'?2.2:1,0); controls.update(); highlightRegion(region)}
function animate(){requestAnimationFrame(animate);controls?.update();renderer?.render(scene,camera)}
modelVariant.onchange=async()=>{const m=modelIndex.find(x=>x.id===modelVariant.value); if(m){profile.baseMesh=m.id;profile.meshPath=m.path; profileMesh.value=m.id; saveLocalProfile(); await loadAvatar(m.id)}}; profileMesh.onchange=()=>{modelVariant.value=profileMesh.value; modelVariant.dispatchEvent(new Event('change'))}; skinTint.oninput=()=>{profile.skinTint=skinTint.value; applySkin(); saveLocalProfile()}; saveProfile.onclick=()=>saveProfileRelay(false); saveMeshHook.onclick=()=>saveProfileRelay(true); resetProfile.onclick=()=>{profile.body=Object.assign({},defaults.body); renderSliders(); applyBodyScale(); saveLocalProfile()}; resetCam.onclick=()=>{camera.position.set(0,1.25,6.2);controls.target.set(0,1,0);controls.update()}; focusSel.onclick=()=>focusRegion(regionOf(current)); slotSearch.oninput=renderAll; regionFilter.onchange=()=>{const first=slotRows.find(r=>!regionFilter.value||r.region===regionFilter.value);if(first)current=first.slotId;renderAll();focusRegion(regionFilter.value||'full_body')}; modSelect.onchange=()=>{selectedMid=modSelect.value;renderModPane();renderSlotTree()}; loc.onchange=()=>{current=loc.value;renderAll();highlightRegion(regionOf(current))}; install.onclick=async()=>{const m=mods.find(x=>mid(x)===selectedMid);const row={mid:mid(m)||selectedMid,name:mname(m),slot:loc.value||current,note:note.value,t:new Date().toISOString(),profileId:profile.profileId,baseMesh:profile.baseMesh,meshPath:profile.meshPath};try{await LMI.api('body.install',row,{label:'Registering body mod…'});installed.unshift(row);status.className='status good';status.textContent='Installed / registered to relay.'}catch(e){installed.unshift(row);localStorage.setItem('LMI_BODYMOD_LOCAL',JSON.stringify(installed));status.className='status warn';status.textContent='Saved locally: '+e.message}current=row.slot;note.value='';renderAll();}; refresh.onclick=async()=>{await loadRegistry(); await loadProfile()}; tabSlots.onclick=()=>{tabSlots.classList.add('active');tabProfile.classList.remove('active');slotPane.style.display='block';profilePane.style.display='none'}; tabProfile.onclick=()=>{tabProfile.classList.add('active');tabSlots.classList.remove('active');slotPane.style.display='none';profilePane.style.display='block'};
init3D(); LMI.ready('bodyMods',async(c)=>{ctx=c; await loadModels(); await loadRegistry(); await loadProfile();});
</script></body></html>
