<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Browser.LMX</title><link rel="stylesheet" href="../scripts/lmi-theme.css"><script src="../scripts/lmi-module-sdk.js"></script></head><body><main class="lmi-module"><header class="module-head"><div><h1 class="module-title">Browser.LMX</h1><div class="module-sub">LDRQE relay browser / deliberately rate-limited farcast terminal</div></div><span id="net" class="pill">IDLE</span></header><section class="module-body" style="display:flex;flex-direction:column;gap:10px"><div class="card"><div class="row"><input id="url" style="flex:1" value="https://example.com"><button id="go" class="btn">Queue Relay</button><button id="stop" class="btn secondary">Stop</button></div><div class="row" style="margin-top:10px"><label class="muted">LDRQE latency</label><input id="lag" type="range" min="800" max="9000" step="200" value="3200"><span id="lagText" class="pill">3.2s</span></div><div class="relay-bar"><span id="bar"></span></div><div id="status" class="status">Awaiting relay request.</div></div><iframe id="frame" style="flex:1;min-height:420px;border:1px solid var(--line);background:#fff"></iframe></section></main><script>
let timer=null, progressTimer=null, queuedUrl='';function cleanUrl(raw){let u=String(raw||'').trim();if(!u)return 'about:blank';if(!/^https?:\/\//i.test(u))u='https://'+u;return u}function setLagText(){lagText.textContent=(Number(lag.value)/1000).toFixed(1)+'s'}lag.oninput=setLagText;setLagText();function openUrl(){clearTimeout(timer);clearInterval(progressTimer);queuedUrl=cleanUrl(url.value);let delay=Number(lag.value)||3200;let start=Date.now();net.textContent='QUEUED';status.textContent='Routing through LDRQE relay: '+queuedUrl;bar.style.width='0%';go.disabled=true;progressTimer=setInterval(()=>{let p=Math.min(100,((Date.now()-start)/delay)*100);bar.style.width=p+'%';net.textContent=p<99?'SYNC '+Math.floor(p)+'%':'OPENING';},120);timer=setTimeout(()=>{clearInterval(progressTimer);bar.style.width='100%';frame.src=queuedUrl;net.textContent='LIVE';status.textContent='Relay opened. Some external pages may block iframe embedding.';go.disabled=false;},delay)}go.onclick=openUrl;stop.onclick=()=>{clearTimeout(timer);clearInterval(progressTimer);go.disabled=false;net.textContent='STOP';status.textContent='Relay request stopped.'};url.addEventListener('keydown',e=>{if(e.key==='Enter')openUrl()});LMI.ready('browser',()=>{});
</script></body></html>
