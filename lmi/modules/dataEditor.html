<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>DataForge.LMX</title><link rel="stylesheet" href="../scripts/lmi-theme.css"><script src="../scripts/lmi-module-sdk.js"></script></head><body><main class="lmi-module"><header class="module-head"><div><h1 class="module-title">DataForge.LMX</h1><div class="module-sub">Dedicated sheet-entry module for characters, POS items, vehicles, body mods, apps, themes</div></div><button id="loadSchema" class="btn secondary">Reload Schema</button></header><section class="module-body"><div class="grid"><div class="card col-4"><h2>Entry Type</h2><div class="field"><label>Document section / sheet</label><select id="kind"></select></div><div id="hint" class="muted"></div><div class="row" style="margin-top:12px"><button id="blank" class="btn secondary">Blank</button><button id="example" class="btn secondary">Example</button><button id="submit" class="btn good">Append / Save</button></div><div id="status" class="status"></div></div><div class="card col-8"><h2 id="formTitle">Form</h2><div id="form" class="subgrid"></div><h3>Preview Blob</h3><pre id="preview" class="output"></pre></div></div></section></main><script>
const schemas={
character:{label:'Character / Core Profile',sheet:'core',hint:'Creates or updates a login/customer profile. tag + hash are the login fields.',fields:['cid','tag','hash','cn','pt','pos','ph','disc','pnote','al','th','wp','av','occ','bid','cur','st','note'],example:{cid:'c_ultima',tag:'Ultima',hash:'777',cn:'Ultima Leviathus',pt:'Employee',pos:'CEO',disc:0,al:'Admin',th:'Purple',bid:'ACC-ULTIMA',cur:'DINARI',st:'Active'}},
posItem:{label:'POS Item / Catalog',sheet:'catalog',hint:'Adds an item the POS can search, scan, discount, and tender.',fields:['iid','pn','upc','nm','mfg','cents','q','c1','c2','c3','img','desc'],example:{iid:'item_redbull_peach',pn:'RBPeach8',upc:'',nm:'Red Bull Peach Edition 12oz',mfg:'Red Bull',cents:249,q:'Best',c1:'Food',c2:'Drink',c3:'Energy Drink',desc:'Peach edition energy drink.'}},
vehicle:{label:'Vehicle',sheet:'vehicles',hint:'Adds a dealership vehicle. cents is base new price in cents.',fields:['vid','type','mfg','model','paint','eng','fuel','trans','drive','hp','tq','z60','cents','img','extra','extraCents','desc'],example:{vid:'roadkill4x4',type:'Heavy Utility',mfg:'Atlas',model:'Roadkill 4x4',paint:'Industrial Black',eng:'CNG V8',fuel:'CNG',trans:'A10HT',drive:'4x4',hp:680,tq:1200,cents:18499900,desc:'CNG heavy utility truck.'}},
bodyMod:{label:'Body Mod',sheet:'mods',hint:'Adds installable body mod. slot can contain comma-separated compatible locations.',fields:['mid','nm','slot','type','cents','img','desc','note'],example:{mid:'SZ-12',nm:'SZ-12 Subdermal',slot:'skin,subdermal_layer,torso',type:'LMEX',cents:777000,desc:'Construction Nanite Array'}},
bodySlot:{label:'Body Slot',sheet:'bodySlots',hint:'Adds a selectable install location to BodyMods.LMX.',fields:['slot','label','region','ord','note'],example:{slot:'subdermal_layer',label:'Subdermal Layer',region:'skin',ord:220,note:'Under-skin mesh / nanite installations'}},
app:{label:'BIPAC App',sheet:'dictApps',hint:'Adds a module to the package manager / desktop manifest.',fields:['k','id','nm','path','ico','desc','w','h','min'],example:{k:'d',id:'dataEditor',nm:'DataForge.LMX',path:'/lmi/modules/dataEditor.html',ico:'DF',desc:'Sheet entry formatter',w:980,h:720,min:'FALSE'}},
theme:{label:'Theme',sheet:'themes',hint:'Stores a named theme preset for manual use in ThemeLab.',fields:['id','name','bg','panel','panel2','text','muted','line','line2','accent','accent2','good','bad','warn','wallpaper'],example:{id:'purpleWhite',name:'LMI Purple White',bg:'#020104',panel:'#08050d',panel2:'#12091f',text:'#ffffff',muted:'#b8a8d6',line:'#8d54ff',line2:'#5b2ea6',accent:'#a45cff',accent2:'#ffffff',good:'#88ffbd',bad:'#ff6b9a',warn:'#ffd166'}}
};
function current(){return schemas[kind.value]}function renderKind(){kind.innerHTML=Object.entries(schemas).map(([k,s])=>`<option value="${k}">${s.label}</option>`).join('');renderForm(true)}function makeId(prefix){return prefix+'_'+Date.now().toString(36)}function renderForm(useExample=false){const s=current();formTitle.textContent=s.label;hint.textContent=s.hint;form.innerHTML=s.fields.map(f=>`<div class="field"><label>${f}</label><input data-f="${f}" placeholder="${f}"></div>`).join(''); if(useExample) setValues(s.example); updatePreview()}function getValues(){const o={};form.querySelectorAll('[data-f]').forEach(inp=>{if(inp.value!=='')o[inp.dataset.f]=inp.value});return o}function setValues(o){form.querySelectorAll('[data-f]').forEach(inp=>{inp.value=o[inp.dataset.f]??''})}function updatePreview(){preview.textContent=JSON.stringify({sheet:current().sheet,record:getValues()},null,2)}form?.addEventListener?.('input',updatePreview);kind.onchange=()=>renderForm(true);blank.onclick=()=>{setValues({});updatePreview()};example.onclick=()=>{setValues(current().example);updatePreview()};submit.onclick=async()=>{const s=current(),record=getValues();try{let r=await LMI.api('data.append',{sheet:s.sheet,record,kind:kind.value});status.className='status good';status.textContent='Saved to '+s.sheet+'. '+JSON.stringify(r).slice(0,120)}catch(e){status.className='status bad';status.textContent=e.message}};loadSchema.onclick=renderKind;LMI.ready('dataEditor',renderKind);</script></body></html>
