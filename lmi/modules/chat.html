<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Chat.LMX</title><link rel="stylesheet" href="../scripts/lmi-theme.css"><script src="../scripts/lmi-module-sdk.js"></script></head><body><main class="lmi-module"><header class="module-head"><div><h1 class="module-title">Chat.LMX</h1><div class="module-sub">Internal message board / compressed relay posts</div></div><button id="refresh" class="btn secondary">Refresh</button></header><section class="module-body"><div class="grid"><div class="card col-4"><h2>New Transmission</h2><div class="field"><label>Board</label><select id="room"></select></div><div class="field"><label>Subject</label><input id="subject"></div><div class="field"><label>Message</label><textarea id="body"></textarea></div><button id="post" class="btn">Post</button><div id="status" class="status"></div></div><div class="card col-8"><h2 id="boardTitle">Board</h2><div id="threads" class="list"></div></div></div></section></main><script>
let ctx,rooms=[];function localPosts(){return JSON.parse(localStorage.getItem('LMI_CHAT_THREADS')||'[]')}function saveLocal(x){localStorage.setItem('LMI_CHAT_THREADS',JSON.stringify(x))}function renderPosts(posts){threads.innerHTML=posts.length?posts.map(t=>`<div class="list-item"><strong>${t.subject||'Untitled'}</strong><div class="muted">${t.author||t.cid||'UNKNOWN'} / ${t.time||t.date||''}</div><div>${String(t.body||'').replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]))}</div></div>`).join(''):'<div class="muted">No transmissions.</div>'}async function loadRooms(){try{let r=await LMI.api('chat.rooms',{});rooms=r.rooms||[];}catch(e){rooms=[{id:'random',title:'Local Board'}];status.textContent=e.message}room.innerHTML=rooms.map(r=>`<option value="${r.id}">${r.title||r.id}</option>`).join('');}async function loadPosts(){boardTitle.textContent=(rooms.find(r=>r.id===room.value)?.title||room.value||'Board');status.textContent='Loading board...';try{let r=await LMI.api('chat.posts',{room:room.value});renderPosts(r.posts||[]);status.className='status good';status.textContent='Relay board loaded.'}catch(e){renderPosts(localPosts());status.className='status warn';status.textContent='Local fallback: '+e.message}}post.onclick=async()=>{const payload={room:room.value,subject:subject.value||'Untitled',body:body.value||''};try{await LMI.api('chat.post',payload);subject.value='';body.value='';await loadPosts();status.className='status good';status.textContent='Transmission posted to relay.'}catch(e){const a=localPosts();a.unshift({...payload,author:ctx?.user?.displayName||'LOCAL',date:new Date().toLocaleString()});saveLocal(a);renderPosts(a);status.className='status warn';status.textContent='Saved locally: '+e.message}};refresh.onclick=loadPosts;room.onchange=loadPosts;LMI.ready('chat',async c=>{ctx=c;await loadRooms();await loadPosts()});
</script></body></html>
