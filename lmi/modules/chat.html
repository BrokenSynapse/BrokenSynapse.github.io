<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Chat.LMX</title><link rel="stylesheet" href="../scripts/lmi-theme.css"><script src="../scripts/lmi-module-sdk.js"></script></head><body><main class="lmi-module"><header class="module-head"><div><h1 class="module-title">Chat.LMX</h1><div class="module-sub">Internal message board / compressed relay posts</div></div><button id="refresh" class="btn secondary">Refresh</button></header><section class="module-body"><div class="grid"><div class="card col-4"><h2>New Transmission</h2><div class="field"><label>Board</label><select id="room"></select></div><div class="field"><label>Subject</label><input id="subject"></div><div class="field"><label>Message</label><textarea id="body"></textarea></div><button id="post" class="btn">Post</button><div id="status" class="status"></div></div><div class="card col-8"><h2 id="boardTitle">Board</h2><div id="posts" class="list panel-scroll" style="max-height:calc(100vh - 165px)"></div></div></div></section></main><script>
let rooms=[];function esc(s){return String(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}async function loadRooms(){try{let r=await LMI.api('chat.rooms',{}, {silent:true});rooms=r.rooms||[]}catch(e){rooms=[{id:'random',board:'Retard',title:'Retard'},{id:'general',board:'General',title:'General'}]}room.innerHTML=rooms.map(r=>`<option value="${r.id}">${r.title||r.board||r.id}</option>`).join('');loadPosts()}async function loadPosts(){const rid=room.value||'random';boardTitle.textContent=room.options[room.selectedIndex]?.textContent||rid;try{let r=await LMI.api('chat.posts',{room:rid});const arr=r.posts||[];posts.innerHTML=arr.map(p=>`<div class="list-item"><strong>${esc(p.subject)}</strong><div class="muted">${esc(p.author||p.cid)} / ${esc(p.time)}</div><p>${esc(p.body)}</p></div>`).join('')||'<div class="muted">No transmissions.</div>';status.textContent=''}catch(e){posts.innerHTML='<div class="muted">No transmissions.</div>';status.className='status warn';status.textContent=e.message}}post.onclick=async()=>{try{await LMI.api('chat.post',{room:room.value,subject:subject.value,body:body.value});subject.value='';body.value='';status.className='status good';status.textContent='Transmission posted.';loadPosts()}catch(e){status.className='status bad';status.textContent=e.message}};refresh.onclick=loadPosts;room.onchange=loadPosts;LMI.ready('chat',loadRooms);</script></body></html>
