<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Chat.LMX</title><link rel="stylesheet" href="../scripts/lmi-theme.css"><script src="../scripts/lmi-module-sdk.js"></script></head><body><main class="lmi-module"><header class="module-head"><div><h1 class="module-title">Chat.LMX</h1><div class="module-sub">Internal message board</div></div><button id="clear" class="btn bad">Clear Local</button></header><section class="module-body"><div class="grid"><div class="card col-5"><h2>New Transmission</h2><div class="field"><label>Subject</label><input id="subject"></div><div class="field"><label>Message</label><textarea id="body"></textarea></div><button id="post" class="btn">Post</button><div id="status" class="status"></div></div><div class="card col-7"><h2>Board</h2><div id="threads" class="list"></div></div></div></section></main><script>
let ctx;function load(){return JSON.parse(localStorage.getItem('LMI_CHAT_THREADS')||'[]')}function save(x){localStorage.setItem('LMI_CHAT_THREADS',JSON.stringify(x))}function render(){const a=load();threads.innerHTML=a.length?a.map(t=>`<div class="list-item"><strong>${t.subject}</strong><div class="muted">${t.author} / ${t.date}</div><div>${t.body}</div></div>`).join(''):'<div class="muted">No local transmissions.</div>'}post.onclick=async()=>{const t={subject:subject.value||'Untitled',body:body.value||'',author:ctx?.user?.displayName||'LOCAL',date:new Date().toLocaleString()};const a=load();a.unshift(t);save(a);render();subject.value='';body.value='';try{await LMI.api('chat.post',t);status.textContent='Posted locally + relayed.'}catch{status.textContent='Posted locally.'}};clear.onclick=()=>{save([]);render()};LMI.ready('chat',c=>{ctx=c;render()});
</script></body></html>
