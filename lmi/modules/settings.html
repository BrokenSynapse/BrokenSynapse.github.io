<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Settings.LMX</title><link rel="stylesheet" href="../scripts/lmi-theme.css"><script src="../scripts/lmi-module-sdk.js"></script></head><body><main class="lmi-module"><header class="module-head"><div><h1 class="module-title">Settings.LMX</h1><div class="module-sub">Local-only relay and shell controls</div></div><span id="user" class="pill">—</span></header><section class="module-body"><div class="grid"><div class="card col-7"><h2>Relay Link Cache</h2><p class="muted">This endpoint is stored only in this browser's localStorage. It is not written to the sheet or any module file.</p><div class="field"><label>LMI API Key / Relay Link</label><input id="relay" type="password" placeholder="https://script.google.com/macros/s/.../exec"></div><div class="row"><button id="save" class="btn">Save to this browser</button><button id="test" class="btn secondary">Test</button><button id="forget" class="btn bad">Forget</button></div><div id="status" class="status"></div></div><div class="card col-5"><h2>Local State</h2><div id="state" class="mono muted"></div></div></div></section></main><script>
function refresh(){document.getElementById('relay').value=localStorage.getItem('LMI_RELAY_URL')||'';document.getElementById('state').textContent=JSON.stringify({hasRelay:!!localStorage.getItem('LMI_RELAY_URL'),savedAt:localStorage.getItem('LMI_RELAY_SAVED_AT'),installedApps:JSON.parse(localStorage.getItem('LMI_INSTALLED_APPS')||'null')},null,2)}
LMI.ready('settings',ctx=>{document.getElementById('user').textContent=ctx.user?.displayName||ctx.user?.tag||'Standalone';refresh();});
document.getElementById('save').onclick=()=>{const v=document.getElementById('relay').value.trim();LMI.setRelayUrl(v); if(!window.parent||window.parent===window){localStorage.setItem('LMI_RELAY_URL',v);localStorage.setItem('LMI_RELAY_SAVED_AT',new Date().toISOString())}refresh();};
document.getElementById('forget').onclick=()=>{LMI.setRelayUrl('');localStorage.removeItem('LMI_RELAY_URL');localStorage.removeItem('LMI_RELAY_SAVED_AT');refresh();};
document.getElementById('test').onclick=async()=>{const st=document.getElementById('status');st.textContent='Testing relay...';try{const r=await LMI.api('ping',{});st.className='status good';st.textContent='Relay answered: '+JSON.stringify(r).slice(0,160)}catch(e){st.className='status bad';st.textContent=e.message}};
document.addEventListener('lmi-relay-status',e=>{const st=document.getElementById('status');st.className='status '+(e.detail.ok?'good':'bad');st.textContent=e.detail.message;refresh();});
</script></body></html>
