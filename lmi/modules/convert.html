<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Convert.LMX</title><link rel="stylesheet" href="../scripts/lmi-theme.css"><script src="../scripts/lmi-module-sdk.js"></script></head><body><main class="lmi-module"><header class="module-head"><div><h1 class="module-title">Convert.LMX</h1><div class="module-sub">Currency, Dinari notation, and cursed unit conversion</div></div></header><section class="module-body"><div class="grid"><div class="card col-6"><h2>Currency</h2><div class="row"><input id="amount" type="number" step="0.001" value="1.003"><select id="from"></select><span>→</span><select id="to"></select><button id="go" class="btn">Convert</button></div><div id="out" class="big-number"></div><div id="dinariFmt" class="pill"></div><div class="muted" style="margin-top:8px">Dinari notation uses <b>D1.123</b>. Local fallback: 1 USD = 7.77 Dinari.</div></div><div class="card col-6"><h2>Units</h2><div class="field"><label>Mode</label><select id="mode"></select></div><div class="row"><input id="uval" type="number" value="1"><button id="ugo" class="btn">Convert</button></div><div id="uout" class="big-number"></div><div id="ulabel" class="muted"></div></div></div></section></main><script>
const rates={DINARI:1,USD:1/7.77,EUR:.118,CRED:1,LSD:1000000,JPY:18.9,GBP:.093,CAD:.174,AUD:.195};const names=Object.keys(rates);const units={
'in-mm':['in','mm',v=>v*25.4], 'mm-in':['mm','in',v=>v/25.4], 'ft-m':['ft','m',v=>v*0.3048], 'm-ft':['m','ft',v=>v/0.3048], 'mi-km':['mi','km',v=>v*1.609344], 'km-mi':['km','mi',v=>v/1.609344],
'lb-kg':['lb','kg',v=>v*0.45359237], 'kg-lb':['kg','lb',v=>v/0.45359237], 'oz-g':['oz','g',v=>v*28.349523125], 'g-oz':['g','oz',v=>v/28.349523125],
'gal-l':['gal','L',v=>v*3.785411784], 'l-gal':['L','gal',v=>v/3.785411784], 'mph-kmh':['mph','km/h',v=>v*1.609344], 'kmh-mph':['km/h','mph',v=>v/1.609344],
'hp-kw':['hp','kW',v=>v*0.745699872], 'kw-hp':['kW','hp',v=>v/0.745699872], 'lbft-nm':['lb-ft','N⋅m',v=>v*1.3558179483], 'nm-lbft':['N⋅m','lb-ft',v=>v/1.3558179483],
'cuin-l':['cu in','L',v=>v*0.016387064], 'l-cuin':['L','cu in',v=>v/0.016387064], 'psi-kpa':['psi','kPa',v=>v*6.894757293], 'kpa-psi':['kPa','psi',v=>v/6.894757293],
'f-c':['°F','°C',v=>(v-32)*5/9], 'c-f':['°C','°F',v=>v*9/5+32]
};function fill(){from.innerHTML=names.map(x=>`<option>${x}</option>`).join('');to.innerHTML=names.map(x=>`<option>${x}</option>`).join('');from.value='DINARI';to.value='USD';mode.innerHTML=Object.entries(units).map(([k,v])=>`<option value="${k}">${v[0]} → ${v[1]}</option>`).join('')}function fmtD(n){return 'D'+Number(n||0).toLocaleString(undefined,{minimumFractionDigits:3,maximumFractionDigits:3})}function conv(){let a=+amount.value||0;let dinari=a/rates[from.value];let r=dinari*rates[to.value];out.textContent=(to.value==='DINARI'?fmtD(r):Number(r).toLocaleString(undefined,{maximumFractionDigits:4})+' '+to.value);dinariFmt.textContent='Dinari base: '+fmtD(dinari)}function unit(){let v=+uval.value||0,[a,b,fn]=units[mode.value];let r=fn(v);uout.textContent=Number(r).toLocaleString(undefined,{maximumFractionDigits:4});ulabel.textContent=`${v} ${a} = ${uout.textContent} ${b}`}go.onclick=conv;ugo.onclick=unit;LMI.ready('convert',()=>{fill();conv();unit()});
</script></body></html>
