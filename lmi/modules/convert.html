<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Convert.LMX</title><link rel="stylesheet" href="../scripts/lmi-theme.css"><script src="../scripts/lmi-module-sdk.js"></script></head><body><main class="lmi-module"><header class="module-head"><div><h1 class="module-title">Convert.LMX</h1><div class="module-sub">Currency, Dinari, and unit conversion</div></div></header><section class="module-body"><div class="grid"><div class="card col-6"><h2>Currency</h2><div class="row"><input id="amount" type="number" value="1"><select id="from"><option>USD</option><option>DINARI</option><option>EUR</option></select><span>→</span><select id="to"><option>DINARI</option><option>USD</option><option>EUR</option></select><button id="go" class="btn">Convert</button></div><div id="out" class="big-number"></div><div class="muted">Local fallback rate: 1 USD = 7.77 Dinari.</div></div><div class="card col-6"><h2>Units</h2><div class="field"><label>Mode</label><select id="mode"><option value="in-mm">in → mm</option><option value="mm-in">mm → in</option><option value="lb-kg">lb → kg</option><option value="kg-lb">kg → lb</option><option value="mph-kmh">mph → km/h</option><option value="kmh-mph">km/h → mph</option></select></div><div class="row"><input id="uval" type="number" value="1"><button id="ugo" class="btn">Convert</button></div><div id="uout" class="big-number"></div></div></div></section></main><script>
const rates={USD:1,DINARI:7.77,EUR:.92};function conv(){let a=+amount.value||0;out.textContent=(a/rates[from.value]*rates[to.value]).toFixed(4)+' '+to.value}go.onclick=conv;conv();function unit(){let v=+uval.value||0,m=mode.value,r=v;if(m==='in-mm')r=v*25.4;if(m==='mm-in')r=v/25.4;if(m==='lb-kg')r=v*.45359237;if(m==='kg-lb')r=v/.45359237;if(m==='mph-kmh')r=v*1.609344;if(m==='kmh-mph')r=v/1.609344;uout.textContent=r.toFixed(4)}ugo.onclick=unit;unit();LMI.ready('convert',async()=>{});
</script></body></html>
