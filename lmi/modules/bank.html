<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Bank.LMX</title><link rel="stylesheet" href="../scripts/lmi-theme.css"><script src="../scripts/lmi-module-sdk.js"></script></head><body><main class="lmi-module"><header class="module-head"><div><h1 class="module-title">Bank.LMX</h1><div class="module-sub">Balance, ledger, and account activity</div></div><button id="refresh" class="btn secondary">Refresh</button></header><section class="module-body"><div class="grid"><div class="card col-4"><h2>Account</h2><div id="acct" class="pill">—</div><div class="bank-balance" id="bal">—</div><div id="owner" class="muted"></div><div id="status" class="status"></div></div><div class="card col-8"><h2>Ledger</h2><div class="table-wrap"><table><thead><tr><th>Date</th><th>Type</th><th>Memo</th><th>Amount</th></tr></thead><tbody id="ledger"></tbody></table></div></div></div></section></main><script>
let ctx;function fmt(n,cur){return Number(n||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})+' '+(cur||'DINARI')}function mock(){return {balance:777.77,currency:'DINARI',accountId:'LOCAL',owner:'Standalone',ledger:[{date:new Date().toLocaleDateString(),type:'local',memo:'Local terminal initialized',amount:777.77}]}}async function load(){status.textContent='Refreshing ledger...';let data;try{data=await LMI.api('bank.getAccount',{});status.className='status good';status.textContent='Ledger synced.'}catch(e){data=mock();status.className='status warn';status.textContent=e.message}acct.textContent=data.accountId||'—';bal.textContent=fmt(data.balance,data.currency);owner.textContent=data.owner||ctx?.user?.displayName||ctx?.user?.tag||'Local';ledger.innerHTML=(data.ledger||[]).slice().reverse().map(x=>`<tr><td>${x.date||''}</td><td>${x.type||''}</td><td>${x.memo||''}</td><td class="${Number(x.amount)<0?'neg':'pos'}">${fmt(x.amount,data.currency)}</td></tr>`).join('')||'<tr><td colspan="4" class="muted">No ledger entries.</td></tr>'}LMI.ready('bank',c=>{ctx=c;load()});refresh.onclick=load;
</script></body></html>
