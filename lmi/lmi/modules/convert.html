<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Convert.LMX</title><link rel="stylesheet" href="../scripts/lmi-theme.css"><script src="../scripts/lmi-module-sdk.js"></script></head><body><main class="lmi-module"><header class="module-head"><div><h1 class="module-title">Convert.LMX</h1><div class="module-sub">Dinari notation, currency, shop math, and weird units</div></div><button id="swap" class="btn secondary">Swap</button></header><section class="module-body"><div class="grid"><div class="card col-6"><h2>Currency</h2><div class="toolbar"><input id="amount" type="number" step="0.001" value="1.123"><select id="from"></select><span>Ôćĺ</span><select id="to"></select><button id="go" class="btn">Convert</button></div><div id="out" class="big-number">ÔÇö</div><div id="base" class="pill">ÔÇö</div><p class="muted">Dinari always renders as <b>D1.123</b>. Fractional precision is three places because the old setup used millidinari-style shop pricing.</p></div><div class="card col-6"><h2>Common Tender Buttons</h2><div class="subgrid" id="quick"></div></div><div class="card col-12"><h2>Units</h2><div class="toolbar"><input id="uval" type="number" value="1"><select id="mode"></select><button id="ugo" class="btn">Convert</button></div><div id="uout" class="big-number">ÔÇö</div><div id="ulabel" class="muted"></div></div></div></section></main><script>
const rates={DINARI:1,USD:1/7.77,EUR:0.1087,GBP:0.093,JPY:16.9,CAD:0.147,AUD:0.166,CRED:1,LCREDIT:1000,SCREDIT:.001,OBOL:.077,CHIT:.01};
const units={
'in Ôćĺ mm':['in','mm',v=>v*25.4],'mm Ôćĺ in':['mm','in',v=>v/25.4],'ft Ôćĺ m':['ft','m',v=>v*0.3048],'m Ôćĺ ft':['m','ft',v=>v/0.3048],'mi Ôćĺ km':['mi','km',v=>v*1.609344],'km Ôćĺ mi':['km','mi',v=>v/1.609344],
'lb Ôćĺ kg':['lb','kg',v=>v*0.45359237],'kg Ôćĺ lb':['kg','lb',v=>v/0.45359237],'oz Ôćĺ g':['oz','g',v=>v*28.349523125],'g Ôćĺ oz':['g','oz',v=>v/28.349523125],'grains Ôćĺ grams':['gr','g',v=>v*0.06479891],'grams Ôćĺ grains':['g','gr',v=>v/0.06479891],
'gal Ôćĺ L':['gal','L',v=>v*3.785411784],'L Ôćĺ gal':['L','gal',v=>v/3.785411784],'qt Ôćĺ L':['qt','L',v=>v*0.946352946],'L Ôćĺ qt':['L','qt',v=>v/0.946352946],
'mph Ôćĺ km/h':['mph','km/h',v=>v*1.609344],'km/h Ôćĺ mph':['km/h','mph',v=>v/1.609344],'hp Ôćĺ kW':['hp','kW',v=>v*0.745699872],'kW Ôćĺ hp':['kW','hp',v=>v/0.745699872],'lb-ft Ôćĺ NÔőům':['lb-ft','NÔőům',v=>v*1.3558179483],'NÔőům Ôćĺ lb-ft':['NÔőům','lb-ft',v=>v/1.3558179483],
'cu in Ôćĺ L':['cu in','L',v=>v*0.016387064],'L Ôćĺ cu in':['L','cu in',v=>v/0.016387064],'psi Ôćĺ kPa':['psi','kPa',v=>v*6.894757293],'kPa Ôćĺ psi':['kPa','psi',v=>v/6.894757293],'┬░F Ôćĺ ┬░C':['┬░F','┬░C',v=>(v-32)*5/9],'┬░C Ôćĺ ┬░F':['┬░C','┬░F',v=>v*9/5+32]
};
function fmtD(n){return 'D'+Number(n||0).toLocaleString(undefined,{minimumFractionDigits:3,maximumFractionDigits:3})}function fmt(n,c){return c==='DINARI'?fmtD(n):Number(n||0).toLocaleString(undefined,{maximumFractionDigits:6})+' '+c}
function fill(){const names=Object.keys(rates);from.innerHTML=names.map(x=>`<option>${x}</option>`).join('');to.innerHTML=from.innerHTML;from.value='DINARI';to.value='USD';mode.innerHTML=Object.keys(units).map(k=>`<option>${k}</option>`).join('');quick.innerHTML=[1,2.49,3.49,7.77,21.99,777].map(v=>`<button class="btn secondary" data-v="${v}">${fmtD(v)}</button>`).join('');quick.querySelectorAll('button').forEach(b=>b.onclick=()=>{amount.value=b.dataset.v;from.value='DINARI';conv()})}
function conv(){const a=+amount.value||0;const din=a/rates[from.value];const r=din*rates[to.value];out.textContent=fmt(r,to.value);base.textContent='Dinari base: '+fmtD(din)}
function unit(){const v=+uval.value||0,[a,b,fn]=units[mode.value];const r=fn(v);uout.textContent=Number(r).toLocaleString(undefined,{maximumFractionDigits:6});ulabel.textContent=`${v} ${a} = ${uout.textContent} ${b}`}
go.onclick=conv;ugo.onclick=unit;swap.onclick=()=>{[from.value,to.value]=[to.value,from.value];conv()};LMI.ready('convert',()=>{fill();conv();unit()});</script></body></html>
