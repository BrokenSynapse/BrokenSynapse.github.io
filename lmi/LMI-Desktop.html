<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>L.M.I. Desktop</title><link rel="stylesheet" href="scripts/lmi-theme.css"><style>
html,body{overflow:hidden}.auth-locked .desktop{display:none}.logged-in .login-screen{display:none}.login-screen{height:100vh;display:flex;align-items:center;justify-content:center;background:#000;padding:20px}.login-stack{width:min(1040px,96vw);display:flex;flex-direction:column;align-items:center;gap:20px}.login-logo{width:min(520px,74vw);filter:drop-shadow(0 0 18px rgba(164,92,255,.7))}.login-panel{width:100%;border:1px solid var(--line);border-left:7px solid var(--accent);background:color-mix(in srgb,var(--panel) 92%,transparent);padding:26px 32px;box-shadow:0 0 40px rgba(164,92,255,.38)}.login-title{margin:0 0 18px;font-size:clamp(19px,2.05vw,30px);white-space:nowrap;letter-spacing:.12em;text-shadow:0 0 10px #fff,0 0 18px var(--accent)}.login-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.relay-row{display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:end}.login-status{min-height:22px;color:#cdbbff;margin-top:14px;font-size:13px}@media(max-width:760px){.login-grid,.relay-row{grid-template-columns:1fr}.login-title{white-space:normal}.login-panel{padding:18px}}.desktop{height:100vh;overflow:hidden;background:radial-gradient(circle at 18% 14%,color-mix(in srgb,var(--accent) 16%,transparent),transparent 21%),linear-gradient(180deg,var(--bg),#020104 68%,#000);}.topbar{height:46px;border-bottom:1px solid var(--line2);display:flex;align-items:center;justify-content:space-between;padding:0 14px;background:color-mix(in srgb,var(--panel2) 96%,transparent);box-shadow:0 0 24px color-mix(in srgb,var(--accent) 25%,transparent);}.brand{letter-spacing:.22em;font-weight:900;text-shadow:0 0 10px #fff,0 0 18px var(--accent)}.operator{font-size:12px;color:#d8c9ff}.workspace{position:relative;height:calc(100vh - 82px);overflow:hidden}.desktop-icon{position:absolute;width:110px;min-height:118px;background:transparent;color:var(--text);border:1px solid transparent;text-align:center;padding:6px}.desktop-icon:hover,.desktop-icon.selected{border-color:var(--line);background:color-mix(in srgb,var(--accent) 12%,transparent);box-shadow:var(--shadow)}.icon-box{display:flex;align-items:center;justify-content:center;margin:0 auto 8px;width:72px;height:72px;border:1px solid var(--line);background:color-mix(in srgb,var(--panel2) 82%,transparent);font-size:27px;font-weight:900;text-shadow:0 0 12px #fff}.desktop-icon strong{display:block;font-size:13px}.desktop-icon em{display:block;color:var(--muted);font-size:10px;font-style:normal}.window-layer{position:absolute;inset:0;pointer-events:none}.lmi-window{position:absolute;border:1px solid var(--line);background:var(--panel);box-shadow:0 18px 70px rgba(0,0,0,.75),0 0 18px color-mix(in srgb,var(--accent) 45%,transparent);display:flex;flex-direction:column;pointer-events:auto;min-width:420px;min-height:280px}.lmi-window.minimized{display:none}.win-titlebar{height:34px;background:var(--panel2);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px;padding-left:10px;user-select:none}.win-title{font-weight:900;letter-spacing:.08em}.win-icon{margin-right:7px}.win-controls{display:flex;height:100%}.win-controls button{width:38px;border:0;border-left:1px solid var(--line);background:var(--panel);color:var(--text)}.win-controls button:hover{background:color-mix(in srgb,var(--accent) 55%,#000)}.win-frame{border:0;width:100%;height:100%;background:#fff;flex:1}.resize-handle{position:absolute;right:0;bottom:0;width:18px;height:18px;cursor:nwse-resize;background:linear-gradient(135deg,transparent 50%,var(--accent) 50%)}.taskbar{height:36px;border-top:1px solid var(--line2);background:color-mix(in srgb,var(--bg) 92%,#000);display:flex;align-items:center;gap:8px;padding:4px 8px}.start-btn,.task-btn{height:28px;border:1px solid var(--line);background:var(--panel2);color:#fff;padding:0 12px}.task-btn.active{background:color-mix(in srgb,var(--accent) 35%,var(--panel))}.clock{margin-left:auto;color:#e6dbff;font-size:12px}.start-menu{position:absolute;left:8px;bottom:40px;width:330px;max-height:70vh;overflow:auto;border:1px solid var(--line);background:color-mix(in srgb,var(--panel) 98%,transparent);box-shadow:0 18px 70px rgba(0,0,0,.75),var(--shadow);padding:8px;z-index:10000}.start-item{width:100%;display:flex;gap:10px;align-items:center;text-align:left;border:1px solid transparent;background:transparent;color:#fff;padding:9px;cursor:pointer}.start-item:hover{border-color:var(--line);background:color-mix(in srgb,var(--accent) 14%,transparent)}.start-item .si{width:34px;height:34px;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;background:var(--panel2);font-weight:900}.start-item em{display:block;color:var(--muted);font-style:normal;font-size:11px}.desktop.wallpapered{background-image:linear-gradient(rgba(0,0,0,.38),rgba(0,0,0,.62)),var(--wallpaper-url)!important;background-size:cover!important;background-position:center!important}</style></head><body class="auth-locked">
<section class="login-screen"><div class="login-stack"><img class="login-logo" src="assets/lmi-logo.png" alt="LMI"><div class="login-panel"><h1 class="login-title">PLEASE SUBMIT AN LMI EMPLOYEE TAG AND HASH</h1><div class="field"><label>LMI API Key / Relay Link</label><div class="relay-row"><input id="relayUrl" type="password" autocomplete="off" placeholder="Paste relay link / endpoint"><button id="saveRelay" class="btn secondary">Cache Locally</button><button id="forgetRelay" class="btn secondary">Forget</button></div></div><div class="login-grid"><div class="field"><label>Employee Tag</label><input id="loginUsername" placeholder="Employee tag"></div><div class="field"><label>Hash</label><input id="loginPassword" type="password" placeholder="Hash"></div></div><div class="row" style="margin-top:12px"><button id="loginButton" class="btn">Submit Tag</button></div><div id="loginStatus" class="login-status">Awaiting credentials...</div></div></div></section>
<main class="desktop"><header class="topbar"><div class="brand">L.M.I. DESKTOP</div><div id="operatorPlate" class="operator">Operator: —</div></header><section class="workspace"><div id="desktopIcons"></div><div id="windowLayer" class="window-layer"></div></section><footer class="taskbar"><button id="startBtn" class="start-btn">LMI</button><div id="startMenu" class="start-menu hidden"></div><div id="taskGroup" class="row"></div><div id="clock" class="clock"></div></footer></main>
<script src="scripts/lmi-config.js"></script><script src="scripts/lmi-api.js"></script><script src="scripts/lmi-auth.js"></script><script src="scripts/lmi-window-manager.js"></script><script src="scripts/lmi-desktop.js"></script></body></html>
