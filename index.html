<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BrokenSynapse</title>

  <style>
    :root {
      --bg: #050505;
      --panel: #111;
      --yellow: #ffd100;
      --yellow-dim: rgba(255, 209, 0, 0.18);
      --text: #f5f5f5;
      --muted: #aaa;
      --border: #2b2b2b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top center, rgba(255, 209, 0, 0.16), transparent 34%),
        linear-gradient(135deg, #020202, #111 55%, #050505);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .launcher {
      width: min(900px, 100%);
      text-align: center;
    }

    .brand {
      margin-bottom: 42px;
    }

    .brand h1 {
      margin: 0;
      color: var(--yellow);
      font-size: clamp(2.5rem, 8vw, 5rem);
      line-height: 0.9;
      font-weight: 900;
      font-style: italic;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-shadow: 0 0 24px rgba(255, 209, 0, 0.18);
    }

    .brand p {
      margin: 14px 0 0;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 2.4px;
      font-size: 0.9rem;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .big-button {
      min-height: 220px;
      border-radius: 26px;
      border: 2px solid var(--yellow);
      background:
        linear-gradient(145deg, var(--yellow-dim), transparent 45%),
        linear-gradient(180deg, #181818, #090909);
      color: var(--text);
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      box-shadow:
        0 22px 55px rgba(0, 0, 0, 0.55),
        0 0 28px rgba(255, 209, 0, 0.08);
      position: relative;
      overflow: hidden;
      transition:
        transform 0.12s ease,
        box-shadow 0.12s ease,
        filter 0.12s ease;
    }

    .big-button::before {
      content: "";
      position: absolute;
      top: 0;
      left: 28px;
      width: 28px;
      height: 100%;
      background: var(--yellow);
      transform: skewX(-18deg);
      box-shadow: 44px 0 0 rgba(255, 209, 0, 0.35);
      opacity: 0.95;
    }

    .big-button::after {
      content: "";
      position: absolute;
      bottom: 0;
      right: 0;
      width: 130px;
      height: 22px;
      background:
        linear-gradient(45deg, #fff 25%, transparent 25%),
        linear-gradient(-45deg, #fff 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #fff 75%),
        linear-gradient(-45deg, transparent 75%, #fff 75%);
      background-color: #000;
      background-size: 22px 22px;
      background-position: 0 0, 0 11px, 11px -11px, -11px 0;
      opacity: 0.9;
    }

    .big-button:hover {
      transform: translateY(-4px);
      filter: brightness(1.08);
      box-shadow:
        0 28px 70px rgba(0, 0, 0, 0.68),
        0 0 42px rgba(255, 209, 0, 0.18);
    }

    .big-button span {
      position: relative;
      z-index: 1;
      color: var(--yellow);
      font-size: clamp(2rem, 5vw, 3.4rem);
      font-weight: 900;
      font-style: italic;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-shadow: 0 3px 0 #000;
    }

    .footer {
      margin-top: 34px;
      color: #777;
      font-size: 0.82rem;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    @media (max-width: 720px) {
      .buttons {
        grid-template-columns: 1fr;
      }

      .big-button {
        min-height: 170px;
      }
    }
  </style>
</head>

<body>
  <main class="launcher">
    <header class="brand">
      <h1>BrokenSynapse</h1>
      <p>Project Launcher</p>
    </header>

    <section class="buttons">
      <a class="big-button" href="bipex.html">
        <span>BIPEX</span>
      </a>

      <a class="big-button" href="aac.html">
        <span>Advance Auto Cards</span>
      </a>
    </section>

    <footer class="footer">
      brokensynapse.us
    </footer>
  </main>
</body>
</html>
