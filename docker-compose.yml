services:
  caddy:
    image: caddy:latest
    container_name: bs-caddy
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./site:/srv/site:ro
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

  api:
    build:
      context: ./api
      args:
        INSTALL_BLENDER: ${INSTALL_BLENDER:-0}
        INSTALL_KN5: ${INSTALL_KN5:-0}
    container_name: bs-api
    restart: unless-stopped
    environment:
      ASSET_ROOT: /site/lmi/assets
      ASSET_URL_PREFIX: /lmi/assets
      PORT: 3000
      DB_PATH: /data/brokensynapse.sqlite
      SHEET_ID: 1Kis40W84qlJVKvC6One9DX1iQvl0V71GL3UYXuZdWQc
      ADMIN_TOKEN: change-me-after-deploy
    volumes:
      - ./site/lmi/assets:/site/lmi/assets
      - ./data:/data
      - ./site:/site
      - ./uploads:/uploads

volumes:
  caddy_data:
  caddy_config:
