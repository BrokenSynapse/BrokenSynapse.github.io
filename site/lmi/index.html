<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>L.M.I. Desktop</title><link rel="stylesheet" href="scripts/lmi-theme.css"><style>
html,body{overflow:hidden}.auth-locked .desktop{display:none}.logged-in .login-screen{display:none}.login-screen{height:100vh;display:flex;align-items:center;justify-content:center;background:#000;padding:20px}.login-stack{width:min(1040px,96vw);display:flex;flex-direction:column;align-items:center;gap:20px}.login-logo{width:min(520px,74vw);filter:drop-shadow(0 0 18px rgba(164,92,255,.7))}.login-panel{width:100%;border:1px solid var(--line);border-left:7px solid var(--accent);background:color-mix(in srgb,var(--panel) 92%,transparent);padding:26px 32px;box-shadow:0 0 40px rgba(164,92,255,.38)}.login-title{margin:0 0 18px;font-size:clamp(19px,2.05vw,30px);white-space:nowrap;letter-spacing:.12em;text-shadow:0 0 10px #fff,0 0 18px var(--accent)}.login-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.relay-row{display:grid;grid-template-columns:1fr auto auto auto;gap:10px;align-items:end}.login-status{min-height:22px;color:#cdbbff;margin-top:14px;font-size:13px}@media(max-width:760px){.login-grid,.relay-row{grid-template-columns:1fr}.login-title{white-space:normal}.login-panel{padding:18px}}.desktop{height:100vh;overflow:hidden;background:radial-gradient(circle at 18% 14%,color-mix(in srgb,var(--accent) 16%,transparent),transparent 21%),linear-gradient(180deg,var(--bg),#020104 68%,#000);}.topbar{height:46px;border-bottom:1px solid var(--line2);display:flex;align-items:center;justify-content:space-between;padding:0 14px;background:color-mix(in srgb,var(--panel2) 96%,transparent);box-shadow:0 0 24px color-mix(in srgb,var(--accent) 25%,transparent);}.brand{letter-spacing:.22em;font-weight:900;text-shadow:0 0 10px #fff,0 0 18px var(--accent)}.operator{font-size:12px;color:#d8c9ff}.workspace{position:relative;height:calc(100vh - 82px);overflow:hidden}#desktopIcons{position:absolute;inset:0;overflow:hidden;pointer-events:auto}.desktop-icon{position:absolute;width:110px;min-height:118px;background:transparent;color:var(--text);border:1px solid transparent;text-align:center;padding:6px}.desktop-icon:hover,.desktop-icon.selected{border-color:var(--line);background:color-mix(in srgb,var(--accent) 12%,transparent);box-shadow:var(--shadow)}.icon-box{display:flex;align-items:center;justify-content:center;margin:0 auto 8px;width:72px;height:72px;border:1px solid var(--line);background:color-mix(in srgb,var(--panel2) 82%,transparent);font-size:27px;font-weight:900;text-shadow:0 0 12px #fff}.desktop-icon strong{display:block;font-size:13px}.desktop-icon em{display:block;color:var(--muted);font-size:10px;font-style:normal}.window-layer{position:absolute;inset:0;pointer-events:none}.lmi-window{position:absolute;border:1px solid var(--line);background:var(--panel);box-shadow:0 18px 70px rgba(0,0,0,.75),0 0 18px color-mix(in srgb,var(--accent) 45%,transparent);display:flex;flex-direction:column;pointer-events:auto;min-width:420px;min-height:280px}.lmi-window.minimized{display:none}.win-titlebar{height:34px;background:var(--panel2);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px;padding-left:10px;user-select:none}.win-title{font-weight:900;letter-spacing:.08em}.win-icon{margin-right:7px}.win-controls{display:flex;height:100%}.win-controls button{width:38px;border:0;border-left:1px solid var(--line);background:var(--panel);color:var(--text)}.win-controls button:hover{background:color-mix(in srgb,var(--accent) 55%,#000)}.win-frame{border:0;width:100%;height:100%;background:#fff;flex:1}.resize-handle{position:absolute;background:transparent;z-index:3}.resize-handle.se{right:0;bottom:0;width:18px;height:18px;cursor:nwse-resize;background:linear-gradient(135deg,transparent 50%,var(--accent) 50%)}.resize-handle.e{right:-4px;top:34px;bottom:18px;width:8px;cursor:ew-resize}.resize-handle.s{left:8px;right:18px;bottom:-4px;height:8px;cursor:ns-resize}.resize-handle.w{left:-4px;top:34px;bottom:8px;width:8px;cursor:ew-resize}.resize-handle.n{left:8px;right:8px;top:-4px;height:8px;cursor:ns-resize}.resize-handle.ne{right:-4px;top:-4px;width:12px;height:12px;cursor:nesw-resize}.resize-handle.nw{left:-4px;top:-4px;width:12px;height:12px;cursor:nwse-resize}.resize-handle.sw{left:-4px;bottom:-4px;width:12px;height:12px;cursor:nesw-resize}.taskbar{height:36px;border-top:1px solid var(--line2);background:color-mix(in srgb,var(--bg) 92%,#000);display:flex;align-items:center;gap:8px;padding:4px 8px}.start-btn,.task-btn{height:28px;border:1px solid var(--line);background:var(--panel2);color:#fff;padding:0 12px}.task-btn.active{background:color-mix(in srgb,var(--accent) 35%,var(--panel))}.clock{margin-left:auto;color:#e6dbff;font-size:12px}.start-menu{position:absolute;left:8px;bottom:40px;width:330px;max-height:70vh;overflow:auto;border:1px solid var(--line);background:color-mix(in srgb,var(--panel) 98%,transparent);box-shadow:0 18px 70px rgba(0,0,0,.75),var(--shadow);padding:8px;z-index:10000}.start-item{width:100%;display:flex;gap:10px;align-items:center;text-align:left;border:1px solid transparent;background:transparent;color:#fff;padding:9px;cursor:pointer}.start-item:hover{border-color:var(--line);background:color-mix(in srgb,var(--accent) 14%,transparent)}.start-item .si{width:34px;height:34px;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;background:var(--panel2);font-weight:900}.start-item em{display:block;color:var(--muted);font-style:normal;font-size:11px}.desktop.wallpapered{background-image:linear-gradient(rgba(0,0,0,.38),rgba(0,0,0,.62)),var(--wallpaper-url)!important;background-size:cover!important;background-position:center!important}
/* Pass 8 desktop controls */
.desktop-icon{touch-action:none;user-select:none}
.resize-handle{position:absolute;background:transparent!important;z-index:9}
.resize-handle.e{right:-7px;top:8px;bottom:8px;width:14px;cursor:ew-resize}
.resize-handle.w{left:-7px;top:8px;bottom:8px;width:14px;cursor:ew-resize}
.resize-handle.s{left:8px;right:8px;bottom:-7px;height:14px;cursor:ns-resize}
.resize-handle.n{left:8px;right:8px;top:-7px;height:14px;cursor:ns-resize}
.resize-handle.se{right:-8px;bottom:-8px;width:22px;height:22px;cursor:nwse-resize;background:transparent!important}
.resize-handle.ne{right:-8px;top:-8px;width:22px;height:22px;cursor:nesw-resize}
.resize-handle.nw{left:-8px;top:-8px;width:22px;height:22px;cursor:nwse-resize}
.resize-handle.sw{left:-8px;bottom:-8px;width:22px;height:22px;cursor:nesw-resize}
.lmi-window:hover{outline:1px solid color-mix(in srgb,var(--accent) 28%,transparent)}
.start-menu{width:390px;max-height:78vh;padding:10px;overflow:auto}
.start-profile{display:grid;grid-template-columns:54px 1fr;gap:12px;align-items:center;border:1px solid var(--line2);background:color-mix(in srgb,var(--panel2) 70%,transparent);padding:10px;margin-bottom:10px}
.start-avatar{width:54px;height:54px;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;background:color-mix(in srgb,var(--accent) 24%,var(--panel));font-weight:900;font-size:19px;box-shadow:var(--shadow)}
.start-profile b{display:block;color:#fff}.start-profile em,.start-profile small{display:block;color:var(--muted);font-style:normal;font-size:11px;line-height:1.35}.start-search-wrap{margin:8px 0}.start-search{width:100%;background:#050209;color:#fff;border:1px solid var(--line);padding:10px 11px}.start-section{display:flex;align-items:center;gap:8px;margin:10px 0 5px;color:#e6d9ff;font-size:11px;text-transform:uppercase;letter-spacing:.12em;font-weight:900}.start-section:after{content:'';height:1px;background:var(--line2);flex:1}.start-list{display:flex;flex-direction:column;gap:3px}.start-empty{border:1px dashed var(--line2);padding:10px;color:var(--muted);font-size:12px}.start-item{border-color:rgba(141,84,255,.18)}

/* Pass 9: full workspace icon movement + border resize affordances */
.workspace{position:relative!important;height:calc(100vh - 82px)!important;overflow:hidden!important;}
#desktopIcons{position:absolute!important;left:0!important;top:0!important;right:0!important;bottom:0!important;width:100%!important;height:100%!important;overflow:hidden!important;}
.desktop-icon{position:absolute!important;touch-action:none!important;user-select:none!important;will-change:left,top;z-index:1;}
.desktop-icon.dragging{z-index:50;box-shadow:0 0 0 1px var(--accent), var(--shadow);}
.lmi-window{resize:none!important;overflow:visible!important;}
.lmi-window.edge-hot{outline:1px solid color-mix(in srgb,var(--accent) 42%,transparent)!important;}
/* Give the invisible resize zones enough meat to catch the cursor without visible corner buttons. */
.resize-handle{background:transparent!important;opacity:0!important;}

/* LMI shell icon sizing / snap QoL */
:root{--lmi-icon-size:72px;--lmi-icon-tile-w:110px;--lmi-icon-tile-h:124px;--lmi-icon-font:27px;--lmi-icon-label:13px}
.desktop-icon{width:var(--lmi-icon-tile-w)!important;min-height:var(--lmi-icon-tile-h)!important;padding:max(4px,calc(var(--lmi-icon-size) * .08))!important}
.icon-box{width:var(--lmi-icon-size)!important;height:var(--lmi-icon-size)!important;font-size:var(--lmi-icon-font)!important;margin-bottom:max(5px,calc(var(--lmi-icon-size) * .10))!important}
.desktop-icon strong{font-size:var(--lmi-icon-label)!important;line-height:1.12;overflow-wrap:anywhere}
.desktop-icon em{font-size:max(8px,calc(var(--lmi-icon-label) * .76))!important;line-height:1.12;max-height:2.25em;overflow:hidden}
.icon-box img{width:100%;height:100%;object-fit:contain;display:block}
body[data-grid-snap="on"] #desktopIcons{background-image:radial-gradient(circle,color-mix(in srgb,var(--accent) 22%,transparent) 0 1px,transparent 1px);background-size:calc(var(--lmi-icon-tile-w) + max(12px,calc(var(--lmi-icon-size) * .22))) calc(var(--lmi-icon-tile-h) + max(10px,calc(var(--lmi-icon-size) * .20)));background-position:0 18px}
