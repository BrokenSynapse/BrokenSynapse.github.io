<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BIPAC.LMX</title><link rel="stylesheet" href="../scripts/lmi-theme.css"><script src="../scripts/lmi-module-sdk.js"></script></head><body><main class="lmi-module"><header class="module-head"><div><h1 class="module-title">BIPAC.LMX</h1><div class="module-sub">Package manager / visible desktop app control</div></div><button id="sync" class="btn secondary">Sync Desktop</button></header><section class="module-body"><div class="card"><h2>Available Packages</h2><div id="apps" class="list"></div><div id="status" class="status"></div></div></section></main><script>

function notifyDesktopRefresh(){
  try{
    if(window.parent && window.parent !== window){
      window.parent.postMessage({type:'LMI_REFRESH_APPS'}, location.origin);
    }
  }catch(e){}
}

let manifest=[],ctx,installedIds=[];async function loadManifest(){try{let r=await LMI.api('getModuleIndex',{});manifest=(r.apps||r.modules||r||[]).map(a=>({id:a.id||a.appId, key:a.k, name:a.nm||a.name, path:a.path, icon:a.ico||a.icon, description:a.desc||a.description}))}catch(e){manifest=await (await fetch('../module-manifest.json',{cache:'no-store'})).json();status.className='status warn';status.textContent='Local manifest: '+e.message}}function localInstalled(){return JSON.parse(localStorage.getItem('LMI_INSTALLED_APPS')||'null')||manifest.map(a=>a.id)}function saveLocal(ids){localStorage.setItem('LMI_INSTALLED_APPS',JSON.stringify(ids));installedIds=ids;LMI.refreshApps(); notifyDesktopRefresh(); notifyDesktopRefresh();render()}function render(){const root=apps;root.innerHTML='';manifest.forEach(a=>{const on=installedIds.includes(a.id)||installedIds.includes(a.key);const d=document.createElement('div');d.className='list-item row';d.innerHTML=`<span class="pill">${a.icon||'□'}</span><div style="flex:1"><strong>${a.name}</strong><div class="muted">${a.description||''}<br>${a.path||''}</div></div><button class="btn ${on?'bad':'good'}">${on?'Uninstall':'Install'}</button>`;d.querySelector('button').onclick=async()=>{try{if(ctx?.session?.mode==='relay'){await LMI.api(on?'uninstallApp':'installApp',{appId:a.id||a.key});status.className='status good';status.textContent=(on?'Uninstalled ':'Installed ')+(a.name||a.id)+' on sheet.';LMI.refreshApps(); notifyDesktopRefresh(); notifyDesktopRefresh();setTimeout(()=>location.reload(),500)}else{let n=localInstalled(); if(on)n=n.filter(x=>x!==a.id); else n.push(a.id); saveLocal([...new Set(n)])}}catch(e){status.className='status bad';status.textContent=e.message}};root.appendChild(d)});}async function init(c){ctx=c;await loadManifest();installedIds=(c.apps||[]).map(a=>a.id);if(!installedIds.length)installedIds=localInstalled();render()}LMI.ready('bipac',init);sync.onclick=()=>{ notifyDesktopRefresh(); }; /* patched live desktop sync */
// old sync handler retained below if present
sync.onclick=()=>{LMI.refreshApps(); notifyDesktopRefresh(); notifyDesktopRefresh();status.textContent='Desktop refreshed.'};
</script></body></html>
