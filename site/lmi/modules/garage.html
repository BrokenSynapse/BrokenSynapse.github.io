<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Garage.LMX</title>
<link rel="stylesheet" href="../scripts/lmi-theme.css">
<script src="../scripts/lmi-module-sdk.js"></script>
<style>
*{box-sizing:border-box}body{margin:0;background:#f4f8ff;color:#071a3a;overflow:hidden;font-family:Inter,system-ui,sans-serif}.garage{height:100vh;display:grid;grid-template-columns:220px minmax(0,1fr);background:linear-gradient(135deg,#f9fcff,#eaf4ff)}.side{background:linear-gradient(180deg,#031d43,#001229);color:white;padding:22px 18px;display:flex;flex-direction:column;gap:20px}.mark{font-size:28px;font-weight:900}.mark:before{content:"";display:block;width:145px;height:32px;margin-bottom:8px;border-top:3px solid white;border-radius:50%;transform:skewX(-18deg)}.nav{display:grid;gap:9px}.nav button{border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:#eef6ff;border-radius:10px;padding:12px;text-align:left;font-weight:800}.nav button.active{background:#0d56cc}.owner{margin-top:auto;border:1px solid rgba(255,255,255,.14);border-radius:14px;padding:14px;background:rgba(255,255,255,.07)}.main{overflow:auto;padding:20px 26px 24px}.search{max-width:760px;background:#fff;border:1px solid #cfe0f4;border-radius:14px;padding:13px 16px;margin-bottom:16px;box-shadow:0 12px 30px rgba(12,42,88,.08)}.search input{width:100%;border:0;background:transparent;outline:0;color:#071a3a;font-size:15px}.hero{display:grid;grid-template-columns:minmax(460px,1fr) 380px;gap:16px}.topcard,.viewer,.summary,.rowcard,.table{background:rgba(255,255,255,.88);border:1px solid #cfe0f4;border-radius:16px;box-shadow:0 16px 34px rgba(12,42,88,.08)}.topcard{grid-column:1/-1;padding:16px;display:flex;align-items:center;justify-content:space-between;gap:14px}.title h1{font:36px Georgia,serif;margin:0}.title span{color:#506383}.actions{display:flex;gap:10px;flex-wrap:wrap}.actions button,.primary{border:0;border-radius:10px;background:#0d56cc;color:white;padding:12px 16px;font-weight:900}.actions button.secondary{background:white;color:#071a3a;border:1px solid #cfe0f4}.viewer{height:430px;position:relative;display:grid;place-items:center;overflow:hidden;background:radial-gradient(circle at 50% 72%,#fff 0,#e3eefb 48%,#c7dbf0 100%)}.viewer:after{content:"";position:absolute;bottom:55px;width:72%;height:56px;border-radius:50%;background:radial-gradient(ellipse,#fff,#9fb7d1);border:1px solid rgba(8,34,70,.2);box-shadow:0 18px 35px rgba(5,25,60,.22)}.vehicle-img{position:relative;z-index:2;max-width:84%;max-height:78%;object-fit:contain;filter:drop-shadow(0 28px 22px rgba(0,0,0,.22))}.placeholder{position:relative;z-index:2;width:min(500px,70%);height:160px;border-radius:48% 52% 20px 20px;background:linear-gradient(160deg,#fefefe,#aebed0 58%,#768ca8);box-shadow:0 28px 22px rgba(0,0,0,.22)}.placeholder:before,.placeholder:after{content:"";position:absolute;bottom:-34px;width:72px;height:72px;border-radius:50%;background:#101b2c;border:12px solid #dfe8f4}.placeholder:before{left:70px}.placeholder:after{right:70px}.badge{position:absolute;z-index:3;top:16px;left:16px;background:#0d56cc;color:white;border-radius:9px;padding:8px 10px;font-weight:900}.hint{position:absolute;z-index:3;bottom:18px;left:50%;transform:translateX(-50%);background:white;border:1px solid #c7d8ec;border-radius:999px;padding:8px 18px;color:#51617a}.summary{padding:18px}.summary h2{font:24px Georgia,serif;margin:0 0 12px}.specs{display:grid;grid-template-columns:1fr 1fr;gap:12px}.spec{border-top:1px solid #d9e6f5;padding-top:10px}.spec span{display:block;color:#687a95;font-size:12px}.spec b{font-size:15px}.status{margin:16px 0;padding:12px;border-radius:10px;background:#e7f8ed;color:#18723d;font-weight:900}.my{margin-top:16px}.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px}.rowcard{padding:10px;text-align:left;color:#061a3f;cursor:pointer}.rowcard.active{outline:2px solid #0d56cc}.rowcard img{width:100%;height:90px;object-fit:contain}.rowcard b{display:block}.table{margin-top:16px;padding:16px;overflow:auto}.table table{width:100%;border-collapse:collapse}.table th,.table td{border-bottom:1px solid #dce8f7;padding:10px;text-align:left}.empty{padding:26px;border:1px dashed #b8cce6;border-radius:14px;background:white;color:#506383}@media(max-width:1060px){.garage{grid-template-columns:1fr}.side{display:none}.hero{grid-template-columns:1fr}.viewer{height:340px}}@media(max-width:700px){.topcard{display:block}.actions{margin-top:12px}.specs{grid-template-columns:1fr}.main{padding:14px}}
</style>
<style>
.vehicle-model{position:relative;z-index:2;width:92%;height:92%;filter:drop-shadow(0 28px 22px rgba(0,0,0,.22))}
model-viewer.vehicle-model-view{width:100%;height:100%;background:transparent}
</style>
</head>
<body>
<main class="garage">
  <aside class="side">
    <div class="mark">Garage.LMX</div>
    <nav class="nav"><button class="active">Overview</button><button>Fueling</button><button>Sessions</button><button>Service</button><button>Documents</button><button>Modifications</button><button>Parts & Inventory</button><button>Reports</button></nav>
    <div class="owner"><b id="owner">LMX Owner</b><br><small id="ownedCount">0 vehicles</small></div>
  </aside>
  <section class="main">
    <div class="search"><input id="q" placeholder="Search Garage.LMX by vehicle, trim, drivetrain, engine, notes..."></div>
    <section id="content"></section>
  </section>
</main>
<script>
const $=id=>document.getElementById(id);let ctx=null,rows=[],shown=[],sel=0;const modelCache=new Map();let modelViewerLoad=null;
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function money(n){return LMI.money.format(n||0)}function norm(s){return String(s||'').toLowerCase()}function vehicleOf(r){return Object.assign({},r.vehicle||{},r)}function vehicleName(v){return [v.manufacturer,v.model].filter(Boolean).join(' ')||v.name||'Vehicle'}function img(v){return LMI.normalizeAssetUrl?LMI.normalizeAssetUrl(v.image||''):v.image||''}function current(){return vehicleOf(shown[sel]||{})}
function specs(v){return [['Powertrain',v.engine||'Unspecified'],['Fuel Type',v.fuel||'Unspecified'],['Drivetrain',v.drivetrain||'--'],['Transmission',v.transmission||'--'],['Mileage',`${Number(v.mileage||0).toLocaleString()} mi`],['Purchase',v.kind||v.purchaseKind||'stored'],['Model Pack',v.modelManifest?'Linked':'None'],['Amount',money(v.amount||v.purchaseAmount||0)]]}
function modelPath(v){return LMI.normalizeAssetUrl?LMI.normalizeAssetUrl(v.modelManifest||''):v.modelManifest||''}
function ensureModelViewer(){if(customElements.get('model-viewer'))return Promise.resolve(true);if(modelViewerLoad)return modelViewerLoad;modelViewerLoad=new Promise(resolve=>{const s=document.createElement('script');s.type='module';s.src='https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js';s.onload=()=>resolve(true);s.onerror=()=>resolve(false);document.head.appendChild(s)});return modelViewerLoad}
async function resolveModel(v){const manifest=modelPath(v);if(!manifest)return {state:'none'};if(modelCache.has(manifest))return modelCache.get(manifest);const pending=fetch(manifest,{cache:'no-store'}).then(r=>r.ok?r.json():null).then(m=>{const glb=m&&m.glb?(LMI.normalizeAssetUrl?LMI.normalizeAssetUrl(m.glb):m.glb):'';return glb?{state:'ready',glb,manifest:m}:{state:'source',manifest:m}}).catch(()=>({state:'source'}));modelCache.set(manifest,pending);return pending}
async function updateModel(v,token){const model=await resolveModel(v);if(token!==sel)return;const mount=document.getElementById('modelMount'),badge=document.getElementById('modelBadge'),hint=document.getElementById('modelHint'),image=document.getElementById('vehicleImage'),placeholder=document.getElementById('vehiclePlaceholder');if(!mount||!badge)return;mount.hidden=true;mount.innerHTML='';if(model.state==='ready'){badge.textContent='3D READY';hint.textContent='Drag to orbit. Scroll to zoom.';const loaded=await ensureModelViewer();if(token!==sel)return;if(loaded){if(image)image.style.display='none';if(placeholder)placeholder.style.display='none';mount.hidden=false;mount.innerHTML=`<model-viewer class="vehicle-model-view" src="${esc(model.glb)}" camera-controls auto-rotate shadow-intensity="0.75" exposure="1"></model-viewer>`}else{badge.textContent='GLB READY'}}else if(model.state==='source'){badge.textContent='SOURCE PACK';hint.textContent='Source pack is stored, but GLB conversion is not ready yet.'}else{badge.textContent='2D PREVIEW';hint.textContent='Upload a vehicle model pack in DataForge for a spinner view.'}}
function apply(){const s=norm(q.value);shown=rows.filter(r=>!s||norm(JSON.stringify(r)).includes(s));if(sel>=shown.length)sel=0;render()}
function render(){ownedCount.textContent=`${rows.length} vehicle${rows.length===1?'':'s'}`;if(!shown.length){content.innerHTML='<div class="empty"><h2>No vehicles in Garage.LMX yet.</h2><p>Buy a vehicle in Fleetline.LMX and it will be delivered here.</p></div>';return}const v=current(),src=img(v);content.innerHTML=`<div class="hero"><div class="topcard"><div class="title"><div>Garage / ${esc(ctx?.user?.tag||'Operator')}</div><h1>${esc(vehicleName(v))}</h1><span>${esc([v.type,v.engine,v.drivetrain].filter(Boolean).join(' / '))}</span></div><div class="actions"><button>Start Travel Session</button><button class="secondary">Open Fueling</button><button class="secondary">View Documents</button><button class="secondary">Modify Vehicle</button></div></div><div class="viewer"><div class="badge" id="modelBadge">${v.modelManifest?'CHECKING MODEL':'2D PREVIEW'}</div><div id="modelMount" class="vehicle-model" hidden></div>${src?`<img id="vehicleImage" class="vehicle-img" src="${esc(src)}" onerror="this.style.display='none'">`:'<div id="vehiclePlaceholder" class="placeholder"></div>'}<div class="hint" id="modelHint">${v.modelManifest?'Checking model manifest...':'Upload a vehicle model pack in DataForge for a spinner view.'}</div></div><aside class="summary"><h2>Vehicle Summary</h2><div class="status">All systems normal</div><div class="specs">${specs(v).map(([a,b])=>`<div class="spec"><span>${esc(a)}</span><b>${esc(b||'--')}</b></div>`).join('')}</div></aside></div><section class="my"><h2>My Vehicles</h2><div class="cards">${shown.map((r,i)=>{const x=vehicleOf(r),xs=img(x);return `<button class="rowcard ${i===sel?'active':''}" data-i="${i}">${xs?`<img src="${esc(xs)}" onerror="this.style.display='none'">`:''}<b>${esc(vehicleName(x))}</b><small>${esc(x.type||x.engine||'Stored')}</small></button>`}).join('')}</div></section><section class="table"><h2>Recent Travel Sessions</h2><table><thead><tr><th>Session</th><th>Date</th><th>Distance</th><th>Duration</th><th>Status</th></tr></thead><tbody><tr><td>Initial delivery inspection</td><td>${esc(v.purchasedAt||'Pending')}</td><td>0.0 mi</td><td>--</td><td>Completed</td></tr></tbody></table></section>`;content.querySelectorAll('[data-i]').forEach(b=>b.onclick=()=>{sel=+b.dataset.i;render()});updateModel(v,sel)}
async function load(){ctx=await LMI.getContext();owner.textContent=ctx.user?.name||ctx.user?.tag||'LMX Owner';try{const r=await LMI.api('garage.list',{}, {label:'Loading Garage.LMX...'});rows=(r.vehicles||[]).map(x=>Object.assign({},x,{vehicle:Object.assign({},x.vehicle||{},{amount:x.amount,mileage:x.mileage,kind:x.kind,purchasedAt:x.purchasedAt})}));shown=rows;render()}catch(e){content.innerHTML=`<div class="empty"><h2>Garage relay fault</h2><p>${esc(e.message)}</p></div>`}}
q.oninput=apply;window.addEventListener('message',e=>{if(e.origin===location.origin&&e.data?.type==='LMI_GARAGE_REFRESH')load()});window.addEventListener('focus',()=>{if(ctx)load()});LMI.ready('garage',load);
</script>
</body>
</html>
