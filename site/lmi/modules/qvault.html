<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>QVault.LMX</title>
<link rel="stylesheet" href="../scripts/lmi-theme.css">
<script src="../scripts/lmi-module-sdk.js"></script>
<style>
*{box-sizing:border-box}body{overflow:hidden}.qv{height:100vh;display:grid;grid-template-rows:auto 1fr;background:var(--bg);color:var(--text)}
.head{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--line);background:#08040d}.head h1{margin:0;font-size:20px;letter-spacing:.12em}.head small{color:var(--muted)}
.layout{min-height:0;display:grid;grid-template-columns:minmax(510px,1fr) 360px;gap:10px;padding:10px}.panel{min-height:0;border:1px solid var(--line2);background:#06030a;display:flex;flex-direction:column;overflow:hidden}.panel h2{margin:0;padding:10px 12px;border-bottom:1px solid var(--line2)}
.board-wrap{min-height:0;overflow:auto;padding:12px}.board{display:grid;grid-template-columns:repeat(9,32px);grid-template-rows:repeat(21,32px);gap:2px;width:max-content;background:#020104;padding:8px;border:1px solid var(--line);box-shadow:var(--shadow)}
.cell{width:32px;height:32px;border:1px solid rgba(141,84,255,.28);background:#090510;position:relative}.cell:hover{outline:1px solid var(--accent2)}
.cell.occ{background:rgba(164,92,255,.24);border-color:var(--accent)}.cell.ghost{background:rgba(136,255,189,.25);border-color:var(--good)}.cell.bad{background:rgba(255,107,154,.25);border-color:var(--bad)}
.tile{position:absolute;inset:3px;background:linear-gradient(180deg,var(--accent),#271044);box-shadow:0 0 10px rgba(164,92,255,.4);display:grid;place-items:center;font-size:10px;font-weight:900;color:white;overflow:hidden}
.side{min-height:0;overflow:auto;padding:10px}.tools{display:grid;grid-template-columns:1fr auto;gap:8px;margin-bottom:8px}.item{border:1px solid var(--line2);background:#090510;padding:8px;margin-bottom:8px;cursor:pointer}.item.active{border-color:var(--accent2);box-shadow:var(--shadow)}.item b{display:block}.item small{color:var(--muted);display:block;line-height:1.35}.shape{display:grid;grid-auto-rows:12px;gap:2px;margin-top:6px;width:max-content}.shape span{border:1px solid rgba(141,84,255,.35);background:#030106}.shape .on{background:var(--accent);box-shadow:0 0 8px rgba(164,92,255,.5)}
.detail{border:1px solid var(--line2);background:#050209;padding:10px;margin-top:10px}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}.status{padding:8px 10px;color:var(--muted);border-top:1px solid var(--line2)}
@media(max-width:980px){body{overflow:auto}.qv{height:auto}.layout{grid-template-columns:1fr}.panel{min-height:360px}}
</style>
</head>
<body>
<main class="qv">
  <header class="head">
    <div><h1>QVault.LMX</h1><small>9 x 21 personal inventory grid</small></div>
    <button id="refresh" class="btn secondary">Refresh</button>
  </header>
  <section class="layout">
    <div class="panel"><h2>Vault Grid</h2><div class="board-wrap"><div id="board" class="board"></div></div><div id="status" class="status">Ready.</div></div>
    <aside class="panel"><h2>Held Items</h2><div class="side"><div class="tools"><input id="q" placeholder="filter inventory"><button id="pack" class="btn secondary">Pack</button></div><div id="items"></div><div id="detail" class="detail muted">Select an item, then click the grid to place it.</div></div></aside>
  </section>
</main>
<script>
(function(){
const W=9,H=21,$=id=>document.getElementById(id),esc=v=>String(v??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[ch]));
let items=[],selected='';
function shapeOf(it){let s=String(it.shape||it.invShape||'1').replace(/[^01]/g,'')||'1';s=s.slice(0,15).padEnd(15,'0');return {s,w:Math.max(1,Math.min(5,Number(it.shapeW||it.invW||5)||5)),h:Math.max(1,Math.min(3,Number(it.shapeH||it.invH||3)||3))};}
function rotOf(it){return ((Number(it.rot||0)%4)+4)%4;}
function rotatedShape(it){const sh=shapeOf(it),rot=rotOf(it),base=[];for(let yy=0;yy<sh.h;yy++)for(let xx=0;xx<sh.w;xx++)if(sh.s[yy*5+xx]==='1')base.push({x:xx,y:yy});let w=rot%2?sh.h:sh.w,h=rot%2?sh.w:sh.h;const cells=base.map(c=>{if(rot===1)return{x:sh.h-1-c.y,y:c.x};if(rot===2)return{x:sh.w-1-c.x,y:sh.h-1-c.y};if(rot===3)return{x:c.y,y:sh.w-1-c.x};return c;});return{w,h,cells};}
function cellsFor(it,x=Number(it.x||0),y=Number(it.y||0)){return rotatedShape(it).cells.map(c=>({x:x+c.x,y:y+c.y}));}
function canPlace(it,x,y){const id=it.id;const occ=new Set();items.filter(i=>i.id!==id&&i.x!==''&&i.y!=='').forEach(i=>cellsFor(i).forEach(c=>occ.add(c.x+','+c.y)));return cellsFor(it,x,y).every(c=>c.x>=0&&c.y>=0&&c.x<W&&c.y<H&&!occ.has(c.x+','+c.y));}
function selectedItem(){return items.find(i=>i.id===selected)||items[0];}
function label(it){return it.name||it.sourceId||it.id||'Item';}
function kind(it){return String(it.kind||it.source||'item').toLowerCase();}
function actionFor(it){const k=kind(it);if(k.includes('weapon'))return 'Equip';if(k.includes('body')||it.source==='bodyMod'||it.source==='mods')return 'Install';if(k.includes('food')||k.includes('drink')||k.includes('pharma')||k.includes('drug'))return 'Use';return 'Inspect';}
function drawShape(it){const sh=rotatedShape(it),on=new Set(sh.cells.map(c=>c.x+','+c.y));return `<div class="shape" style="grid-template-columns:repeat(${sh.w},12px)">${Array.from({length:sh.w*sh.h},(_,i)=>`<span class="${on.has((i%sh.w)+','+Math.floor(i/sh.w))?'on':''}"></span>`).join('')}</div>`;}
function renderBoard(){const occ=new Map();items.filter(i=>i.x!==''&&i.y!=='').forEach(i=>cellsFor(i).forEach((c,idx)=>occ.set(c.x+','+c.y,{it:i,first:idx===0})));let html='';for(let y=0;y<H;y++)for(let x=0;x<W;x++){const o=occ.get(x+','+y);html+=`<div class="cell ${o?'occ':''}" data-x="${x}" data-y="${y}">${o&&o.first?`<div class="tile">${esc(String(label(o.it)).slice(0,2).toUpperCase())}</div>`:''}</div>`}board.innerHTML=html;board.querySelectorAll('.cell').forEach(c=>c.onclick=()=>place(+c.dataset.x,+c.dataset.y));}
function renderItems(){const q=qv.value.trim().toLowerCase();const list=items.filter(i=>!q||JSON.stringify(i).toLowerCase().includes(q));$('items').innerHTML=list.map(i=>`<div class="item ${i.id===selected?'active':''}" data-id="${esc(i.id)}"><b>${esc(label(i))}</b><small>${esc(i.source||'manual')} / ${esc(kind(i))} / qty ${esc(i.qty||1)} / ${esc(i.slots||'?')} slots / rot ${rotOf(i)*90}deg<br>${i.x===''?'unplaced':'at '+i.x+','+i.y}</small>${drawShape(i)}</div>`).join('')||'<div class="muted">No inventory items.</div>';$('items').querySelectorAll('[data-id]').forEach(el=>el.onclick=()=>{selected=el.dataset.id;render();});}
function renderDetail(){const it=selectedItem();if(!it){detail.textContent='No item selected.';return;}selected=it.id;detail.innerHTML=`<b>${esc(label(it))}</b><p>${esc(it.source||'manual')} / ${esc(kind(it))} / rotation ${rotOf(it)*90}deg</p>${drawShape(it)}<div class="actions"><button id="rotate" class="btn secondary">Rotate</button><button id="act" class="btn good">${actionFor(it)}</button><button id="unplace" class="btn secondary">Unplace</button></div><small class="muted">Press R while QVault is focused to rotate the selected item.</small>`;$('rotate').onclick=()=>rotateSelected();$('act').onclick=()=>doAction(it);$('unplace').onclick=()=>move(it,'','');}
function render(){renderBoard();renderItems();renderDetail();}
async function move(it,x,y){it.x=x;it.y=y;render();try{await LMI.api('qvault.move',{id:it.id,x,y,rot:rotOf(it)},{silent:true});status.textContent='Saved placement.';}catch(e){status.textContent='Local placement only: '+e.message;}}
async function place(x,y){const it=selectedItem();if(!it)return;if(!canPlace(it,x,y)){status.textContent='That shape will not fit there.';return;}await move(it,x,y);}
async function rotateSelected(){const it=selectedItem();if(!it)return;it.rot=(rotOf(it)+1)%4;if(it.x!==''&&it.y!==''&&!canPlace(it,Number(it.x),Number(it.y))){it.x='';it.y='';status.textContent='Rotated item no longer fit there, so it was unplaced.';}else status.textContent='Rotated '+label(it)+' to '+(rotOf(it)*90)+'deg.';await move(it,it.x,it.y);}
async function doAction(it){try{const act=actionFor(it);if(act==='Install'){const data=it.data||{};const slots=String(data.validSlots||data.slot||'').split(/[;,|]/).map(x=>x.trim()).filter(Boolean);await LMI.api('body.install',{mid:data.mid||it.sourceId,name:data.nm||data.name||it.name,slot:slots[0]||'body',note:'Installed from QVault',image:data.img||data.image||''},{label:'Installing body mod...'});}await LMI.api('qvault.action',{id:it.id,action:act.toLowerCase()},{label:'Updating QVault item...'});status.textContent=act+' marked for '+label(it)+'.';}catch(e){status.textContent=e.message;}}
async function load(){try{const r=await LMI.api('qvault.list',{}, {label:'Loading QVault...'});items=r.items||[];selected=items[0]?.id||'';status.textContent='Loaded '+items.length+' inventory item(s).';}catch(e){items=JSON.parse(localStorage.getItem('LMI_QVAULT_LOCAL')||'[]');status.textContent='Local fallback: '+e.message;}render();}
function autopack(){let x=0,y=0;for(const it of items){if(it.x!==''&&it.y!=='')continue;let placed=false;for(y=0;y<H&&!placed;y++)for(x=0;x<W&&!placed;x++)if(canPlace(it,x,y)){it.x=x;it.y=y;placed=true;LMI.api('qvault.move',{id:it.id,x,y},{silent:true}).catch(()=>{});}}render();}
const qv=$('q');qv.oninput=renderItems;refresh.onclick=load;pack.onclick=autopack;document.addEventListener('keydown',ev=>{if(ev.key.toLowerCase()==='r'&&!/input|textarea|select/i.test(ev.target.tagName)){ev.preventDefault();rotateSelected();}});LMI.ready('qvault',load);
})();
</script>
</body>
</html>
