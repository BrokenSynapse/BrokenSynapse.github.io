<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DataForge.LMX</title>
<link rel="stylesheet" href="../scripts/lmi-theme.css">
<script src="../scripts/lmi-module-sdk.js"></script>
<style>
.df-grid{display:grid;grid-template-columns:320px minmax(0,1fr);gap:12px}.shape-editor{border:1px solid var(--line2);background:#050209;padding:10px;margin:8px 0}.shape-grid{display:grid;grid-template-columns:repeat(5,34px);grid-auto-rows:34px;gap:4px;margin:8px 0}.shape-cell{border:1px solid var(--line2);background:#090510;color:var(--muted);cursor:pointer}.shape-cell.on{background:var(--accent);border-color:var(--accent2);box-shadow:var(--shadow)}.stack-row{display:grid;grid-template-columns:1fr 150px;gap:8px;align-items:end}.subgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:10px}.output{max-height:260px;overflow:auto}@media(max-width:900px){.df-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<main class="lmi-module">
  <header class="module-head">
    <div><h1 class="module-title">DataForge.LMX</h1><div class="module-sub">Sheet-entry formatter with inventory geometry for carried items</div></div>
    <button id="loadSchema" class="btn secondary">Reload Schema</button>
  </header>
  <section class="module-body">
    <div class="df-grid">
      <div class="card">
        <h2>Entry Type</h2>
        <div class="field"><label>Document section / sheet</label><select id="kind"></select></div>
        <div id="hint" class="muted"></div>
        <div class="row" style="margin-top:12px"><button id="blank" class="btn secondary">Blank</button><button id="example" class="btn secondary">Example</button><button id="submit" class="btn good">Append / Save</button></div>
        <div id="status" class="status"></div>
      </div>
      <div class="card">
        <h2 id="formTitle">Form</h2>
        <div id="form" class="subgrid"></div>
        <div id="shapeWrap" class="shape-editor" hidden>
          <h3>QVault Shape</h3>
          <div class="muted">Draw the footprint this item takes in the inventory. The editor is 5x3; QVault uses the occupied cells.</div>
          <div id="shapeGrid" class="shape-grid"></div>
          <div class="stack-row">
            <label><input type="checkbox" id="isStackable"> isStackable</label>
            <label>maxStack<input id="maxStack" type="number" min="1" step="1" value="1"></label>
          </div>
          <div class="muted">Occupied slots: <b id="slotCount">1</b></div>
        </div>
        <h3>Preview Blob</h3>
        <pre id="preview" class="output"></pre>
      </div>
    </div>
  </section>
</main>
<script>
const schemas={
character:{label:'Character / Core Profile',sheet:'core',hint:'Creates or updates a login/customer profile. tag + hash are the login fields.',fields:['cid','tag','hash','cn','pt','pos','ph','disc','pnote','al','th','wp','av','occ','bid','cur','st','note'],example:{cid:'c_ultima',tag:'Ultima',hash:'777',cn:'Ultima Leviathus',pt:'Employee',pos:'CEO',disc:0,al:'Admin',th:'Purple',bid:'ACC-ULTIMA',cur:'LGD',st:'Active'}},
posItem:{label:'POS Item / Catalog',sheet:'catalog',inventory:true,hint:'Adds an item the POS can sell. Purchases land in QVault instead of being auto-used.',fields:['iid','pn','upc','nm','mfg','cents','q','c1','c2','c3','img','desc','itemKind'],example:{iid:'item_redbull_peach',pn:'RBPeach8',upc:'',nm:'Red Bull Peach Edition 12oz',mfg:'Red Bull',cents:249,q:'Best',c1:'Food',c2:'Drink',c3:'Energy Drink',itemKind:'food',desc:'Peach edition energy drink.',invShape:'100000000000000',isStackable:'TRUE',maxStack:12}},
pharmaItem:{label:'Pharma Item / Compound Marketplace',sheet:'pharmaItems',inventory:true,hint:'Adds a PHARMA.LMX storefront entry. Purchases land in QVault as usable inventory.',fields:['pid','sku','nm','company','category','publicOutletTier','form','quantity','labelUse','priceCents','buyable','subscription','purityGrade','workUtility','shiftCompatibility','dependency','tolerance','withdrawal','abuseLoop','supportNeed','requiredRatings','disclaimers','warnings','effects','sideEffects','interactions','tags','structure','img','desc','itemKind'],example:{pid:'trcxgn',sku:'TRCXGN-24',nm:'Tricoxagin',company:'Leviathan Medical Exchange',category:'Romantic Compatibility / Recreational Affinity',publicOutletTier:'Logged Purchase',form:'violet sealed tablets',quantity:'30-count sealed-unit pack',labelUse:'Take one sealed unit before planned intimacy or romantic bonding activity.',priceCents:14990,buyable:'TRUE',subscription:'TRUE',purityGrade:'LMEX-White',dependency:2,tolerance:3,withdrawal:0,abuseLoop:7,supportNeed:6,tags:'affinity,relationship,recreational',structure:'fictional_stylized',itemKind:'pharma',desc:'For when love is real but chemistry is not.',invShape:'100000000000000',isStackable:'TRUE',maxStack:30}},
vehicle:{label:'Vehicle',sheet:'vehicles',hint:'Adds a dealership vehicle. Vehicles intentionally do not use QVault item geometry.',fields:['vid','type','mfg','model','paint','eng','fuel','trans','drive','hp','tq','z60','cents','img','extra','extraCents','desc'],example:{vid:'roadkill4x4',type:'Heavy Utility',mfg:'Atlas',model:'Roadkill 4x4',paint:'Industrial Black',eng:'CNG V8',fuel:'CNG',trans:'A10HT',drive:'4x4',hp:680,tq:1200,cents:18499900,desc:'CNG heavy utility truck.'}},
bodyMod:{label:'Body Mod / Support-Rated Mod',sheet:'mods',inventory:true,hint:'Adds a body mod as an item first. QVault can later mark it for install.',fields:['mid','slot','nm','cat','st','mfg','desc','fx','img','cost','validSlots','supportType','lmexCertified','cardiovascularOutput','pressureTolerance','renalClearance','hepaticProcessing','thermalLoad','neuralBuffer','sleepState','glucoseElectrolyte','supportNotes','itemKind'],example:{mid:'triphasic_myocardium',nm:'Triphasic Myocardial Phenotype',slot:'torso.chest.heart',cat:'Genetic / Cardiovascular',st:'Available',mfg:'LMEX',desc:'Genetically expressed triphasic high-pressure cardiac architecture.',fx:'+Cardiovascular Output +Pressure Tolerance',img:'/lmi/assets/body/mods/triphasic_myocardium.png',cost:9999999,validSlots:'torso.chest.heart,systems.cardiovascular',supportType:'biomod',lmexCertified:'TRUE',cardiovascularOutput:5,pressureTolerance:5,thermalLoad:2,glucoseElectrolyte:1,itemKind:'bodyMod',invShape:'111001100000000',isStackable:'FALSE',maxStack:1}},
bodySlot:{label:'Body Slot',sheet:'bodySlots',hint:'Adds a selectable install location to BodyMods.LMX.',fields:['slot','label','parentSlot','region','ord','note','category','accepts','blocks'],example:{slot:'subdermal.armor',label:'Armor',parentSlot:'subdermal',region:'subdermal',ord:80,note:'Subdermal armor location'}},
app:{label:'BIPAC App',sheet:'dictApps',hint:'Adds a module to the package manager / desktop manifest.',fields:['k','id','nm','path','ico','desc','w','h','min'],example:{k:'qv',id:'qvault',nm:'QVault.LMX',path:'modules/qvault.html',ico:'QV',desc:'Inventory grid',w:980,h:760,min:'FALSE'}},
theme:{label:'Theme',sheet:'themes',hint:'Stores a named theme preset.',fields:['id','name','bg','panel','panel2','text','muted','line','line2','accent','accent2','good','bad','warn','wallpaper'],example:{id:'purpleWhite',name:'LMI Purple White',bg:'#020104',panel:'#08050d',panel2:'#12091f',text:'#ffffff',muted:'#b8a8d6',line:'#8d54ff',line2:'#5b2ea6',accent:'#a45cff',accent2:'#ffffff',good:'#88ffbd',bad:'#ff6b9a',warn:'#ffd166'}}
};
const $=id=>document.getElementById(id);let shape='100000000000000';
function current(){return schemas[kind.value]}
function renderKind(){kind.innerHTML=Object.entries(schemas).map(([k,s])=>`<option value="${k}">${s.label}</option>`).join('');renderForm(true)}
function renderShape(){shapeWrap.hidden=!current().inventory;shapeGrid.innerHTML=Array.from({length:15},(_,i)=>`<button type="button" class="shape-cell ${shape[i]==='1'?'on':''}" data-i="${i}"></button>`).join('');shapeGrid.querySelectorAll('[data-i]').forEach(b=>b.onclick=()=>{const i=+b.dataset.i;shape=shape.slice(0,i)+(shape[i]==='1'?'0':'1')+shape.slice(i+1);if(!shape.includes('1'))shape='100000000000000';renderShape();updatePreview();});slotCount.textContent=String([...shape].filter(x=>x==='1').length)}
function renderForm(useExample=false){const s=current();formTitle.textContent=s.label;hint.textContent=s.hint;form.innerHTML=s.fields.map(f=>`<div class="field"><label>${f}</label><input data-f="${f}" placeholder="${f}"></div>`).join('');shape=s.example?.invShape||'100000000000000';isStackable.checked=String(s.example?.isStackable||'FALSE').toUpperCase()==='TRUE';maxStack.value=s.example?.maxStack||1;renderShape();if(useExample)setValues(s.example);updatePreview()}
function getValues(){const o={};form.querySelectorAll('[data-f]').forEach(inp=>{if(inp.value!=='')o[inp.dataset.f]=inp.value});if(current().inventory){o.invShape=shape;o.invW=5;o.invH=3;o.invSlots=[...shape].filter(x=>x==='1').length;o.isStackable=isStackable.checked?'TRUE':'FALSE';o.maxStack=maxStack.value||1;}return o}
function setValues(o){form.querySelectorAll('[data-f]').forEach(inp=>{inp.value=o?.[inp.dataset.f]??''});if(o?.invShape)shape=String(o.invShape).replace(/[^01]/g,'').slice(0,15).padEnd(15,'0');isStackable.checked=String(o?.isStackable||'FALSE').toUpperCase()==='TRUE';maxStack.value=o?.maxStack||1;renderShape()}
function updatePreview(){preview.textContent=JSON.stringify({sheet:current().sheet,record:getValues()},null,2)}
form.addEventListener('input',updatePreview);isStackable.onchange=updatePreview;maxStack.oninput=updatePreview;kind.onchange=()=>renderForm(true);blank.onclick=()=>{setValues({});updatePreview()};example.onclick=()=>{setValues(current().example);updatePreview()};submit.onclick=async()=>{const s=current(),record=getValues();try{let r=await LMI.api('data.append',{sheet:s.sheet,record,kind:kind.value});status.className='status good';status.textContent='Saved to '+s.sheet+'. '+(record.nm||record.name||record.pn||record.sku||record.iid||record.mid||record.pid||'record');if(s.sheet==='catalog')parent.postMessage({type:'LMI_DATAFORGE_SAVED',sheet:'catalog'},location.origin)}catch(e){status.className='status bad';status.textContent=e.message}};loadSchema.onclick=renderKind;LMI.ready('dataEditor',renderKind);
</script>
</body>
</html>
